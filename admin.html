<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>CaptaNET - Panel</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    .tab-btn {
      padding: 10px 20px;
      cursor: pointer;
      border: 1px solid #ccc;
      background: #f5f5f5;
      margin-right: 10px;
    }
    .tab-btn.active {
      background: #ddd;
      font-weight: bold;
    }
    .tab-content {
      display: none;
      margin-top: 20px;
    }
  </style>
</head>

<body>
  <h2>CaptaNET</h2>

  <!-- BOTONES DE PESTAÑAS -->
  <div id="tabs" style="margin-bottom: 20px;">
    <button id="tab_admin" class="tab-btn" onclick="mostrarTab('admin')">Panel Admin</button>
    <button id="tab_contenido" class="tab-btn" onclick="mostrarTab('contenido')">Contenido</button>
  </div>

  <!-- ============================
       TAB: PANEL ADMIN
       ============================ -->
  <div id="admin" class="tab-content">

    <h3>Panel de Administración</h3>
    <p>Bienvenido, administrador.</p>

    <hr>

    <!-- LISTA DE USUARIOS -->
    <h3>Usuarios registrados</h3>
    <button onclick="cargarUsuarios()">Actualizar lista</button>
    <ul id="lista_usuarios"></ul>

    <hr>

    <!-- CREAR USUARIO -->
    <div style="border: 1px solid #ccc; padding: 20px; max-width: 400px;">
      <h3>Crear nuevo usuario</h3>

      <label>Email</label>
      <input id="new_email" type="email" style="width: 100%; margin-bottom: 10px;">

      <label>Username</label>
      <input id="new_username" type="text" style="width: 100%; margin-bottom: 10px;">

      <label>Contraseña</label>
      <input id="new_password_create" type="password" style="width: 100%; margin-bottom: 10px;">

      <label>¿Es admin?</label>
      <select id="new_is_admin" style="width: 100%; margin-bottom: 10px;">
        <option value="false">No</option>
        <option value="true">Sí</option>
      </select>

      <button onclick="crearUsuario()" style="width: 100%;">Crear usuario</button>
      <p id="create_result" style="font-weight: bold;"></p>
    </div>

    <hr>

    <!-- EDITAR USUARIO -->
    <div style="border: 1px solid #ccc; padding: 20px; max-width: 400px;">
      <h3>Editar usuario</h3>

      <label>ID del usuario</label>
      <input id="edit_id" type="text" style="width: 100%; margin-bottom: 10px;">

      <label>Nuevo email</label>
      <input id="edit_email" type="email" style="width: 100%; margin-bottom: 10px;">

      <label>Nuevo username</label>
      <input id="edit_username" type="text" style="width: 100%; margin-bottom: 10px;">

      <button onclick="editarUsuario()" style="width: 100%;">Guardar cambios</button>
      <p id="edit_result" style="font-weight: bold;"></p>
    </div>

    <hr>

    <!-- CAMBIAR CONTRASEÑA -->
    <div style="border: 1px solid #ccc; padding: 20px; max-width: 400px;">
      <h3>Cambiar contraseña</h3>

      <label>ID del usuario</label>
      <input id="pw_id" type="text" style="width: 100%; margin-bottom: 10px;">

      <label>Nueva contraseña</label>
      <input id="pw_new" type="password" style="width: 100%; margin-bottom: 10px;">

      <button onclick="changePassword()" style="width: 100%;">Cambiar contraseña</button>
      <p id="pw_result" style="font-weight: bold;"></p>
    </div>

    <hr>

    <!-- ELIMINAR USUARIO -->
    <div style="border: 1px solid #ccc; padding: 20px; max-width: 400px;">
      <h3>Eliminar usuario</h3>

      <label>ID del usuario</label>
      <input id="delete_id" type="text" style="width: 100%; margin-bottom: 10px;">

      <button onclick="eliminarUsuario()" style="width: 100%;">Eliminar usuario</button>
      <p id="delete_result" style="font-weight: bold;"></p>
    </div>

  </div>

  <!-- ============================
       TAB: CONTENIDO
       ============================ -->
  <div id="contenido" class="tab-content">

    <h3>Contenido público (requiere login)</h3>

    <div style="border: 1px solid #ccc; padding: 20px; max-width: 500px;">
      <h3>Seleccionar contenido</h3>

      <label>Categoría</label>
      <select id="categoria" style="width: 100%; margin-bottom: 10px;" onchange="cargarLigas()">
        <option value="">Selecciona categoría</option>
      </select>

      <label>Competición</label>
      <select id="liga" style="width: 100%; margin-bottom: 10px;" onchange="cargarGrupos()">
        <option value="">Selecciona competición</option>
      </select>

      <label>Grupo</label>
      <select id="grupo" style="width: 100%; margin-bottom: 10px;" onchange="cargarEquipos()">
        <option value="">Selecciona grupo</option>
      </select>

      <label>Equipo</label>
      <select id="equipo" style="width: 100%; margin-bottom: 10px;" onchange="cargarJugadores()">
        <option value="">Selecciona equipo</option>
      </select>

      <label>Jugador</label>
      <select id="jugador" style="width: 100%; margin-bottom: 10px;">
        <option value="">Selecciona jugador</option>
      </select>
    </div>

  </div>

  <hr>
  <button onclick="logout()">Cerrar sesión</button>

  <script>
    const supabaseClient = supabase.createClient(
      "https://bnqoisjvboytiphiwosj.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJucW9pc2p2Ym95dGlwaGl3b3NqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2MDgwMTcsImV4cCI6MjA5OTE4NDAxN30.RpTr0Z17ZRFwTpBvsmNwyqtEm0nLVWxM96mxaLxDbes"
    );

    // ============================
    // PROTEGER PÁGINA Y MOSTRAR TABS
    // ============================
    async function protegerPagina() {
      const { data: session } = await supabaseClient.auth.getSession();

      if (!session.session) {
        window.location.href = "index.html";
        return;
      }

      const userId = session.session.user.id;

      const { data: profile } = await supabaseClient
        .from("profiles")
        .select("is_admin")
        .eq("id", userId)
        .single();

      if (profile.is_admin) {
        document.getElementById("tab_admin").style.display = "inline-block";
      } else {
        document.getElementById("tab_admin").style.display = "none";
      }

      mostrarTab("contenido");
      cargarCategorias();
    }

    protegerPagina();

    // ============================
    // CAMBIO DE PESTAÑAS
    // ============================
    function mostrarTab(tab) {
      document.querySelectorAll(".tab-content").forEach(div => div.style.display = "none");
      document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.remove("active"));

      document.getElementById(tab).style.display = "block";
      document.getElementById("tab_" + tab).classList.add("active");
    }

    // ============================
    // FUNCIONES PANEL ADMIN
    // ============================
    async function cargarUsuarios() {
      const lista = document.getElementById("lista_usuarios");
      lista.innerHTML = "Cargando...";

      const { data } = await supabaseClient.from("profiles").select("*");

      lista.innerHTML = "";
      data.forEach(u => {
        const li = document.createElement("li");
        li.textContent = `${u.username} — ${u.email} — ID: ${u.id}`;
        li.onclick = () => {
          document.getElementById("edit_id").value = u.id;
          document.getElementById("pw_id").value = u.id;
          document.getElementById("delete_id").value = u.id;
        };
        lista.appendChild(li);
      });
    }

    async function crearUsuario() {
      const email = new_email.value.trim();
      const username = new_username.value.trim();
      const password = new_password_create.value.trim();
      const is_admin = new_is_admin.value === "true";

      const { data: authUser, error: authError } = await supabaseClient.auth.admin.createUser({
        email,
        password,
        email_confirm: true
      });

      if (authError) {
        create_result.textContent = authError.message;
        create_result.style.color = "red";
        return;
      }

      await supabaseClient.from("profiles").insert({
        id: authUser.user.id,
        email,
        username,
        is_admin
      });

      create_result.textContent = "Usuario creado.";
      create_result.style.color = "green";
      cargarUsuarios();
    }

    async function editarUsuario() {
      const id = edit_id.value.trim();
      const email = edit_email.value.trim();
      const username = edit_username.value.trim();

      await supabaseClient.from("profiles").update({ email, username }).eq("id", id);

      edit_result.textContent = "Usuario actualizado.";
      edit_result.style.color = "green";
      cargarUsuarios();
    }

    async function changePassword() {
      const user_id = pw_id.value.trim();
      const new_password = pw_new.value.trim();

      const { error } = await supabaseClient.functions.invoke("change-password", {
        body: { user_id, new_password }
      });

      if (error) {
        pw_result.textContent = error.message;
        pw_result.style.color = "red";
        return;
      }

      pw_result.textContent = "Contraseña cambiada.";
      pw_result.style.color = "green";
    }

    async function eliminarUsuario() {
      const id = delete_id.value.trim();

      await supabaseClient.auth.admin.deleteUser(id);
      await supabaseClient.from("profiles").delete().eq("id", id);

      delete_result.textContent = "Usuario eliminado.";
      delete_result.style.color = "green";
      cargarUsuarios();
    }

    // ============================
    // CONTENIDO PÚBLICO
    // ============================
    async function cargarCategorias() {
      const { data } = await supabaseClient.from("categorias").select("*").order("nombre");

      categoria.innerHTML = '<option value="">Selecciona categoría</option>';
      data.forEach(c => categoria.innerHTML += `<option value="${c.id}">${c.nombre}</option>`);
    }

    async function cargarLigas() {
      const categoriaId = categoria.value;

      const { data } = await supabaseClient
        .from("ligas")
        .select("*")
        .eq("categoria_id", categoriaId)
        .order("nombre");

      liga.innerHTML = '<option value="">Selecciona competición</option>';
      data.forEach(l => liga.innerHTML += `<option value="${l.id}">${l.nombre}</option>`);

      grupo.innerHTML = '<option value="">Selecciona grupo</option>';
      equipo.innerHTML = '<option value="">Selecciona equipo</option>';
      jugador.innerHTML = '<option value="">Selecciona jugador</option>';
    }

    async function cargarGrupos() {
      const ligaId = liga.value;

      const { data } = await supabaseClient
        .from("ligas")
        .select("grupo")
        .eq("id", ligaId)
        .single();

      grupo.innerHTML = '<option value="">Selecciona grupo</option>';

      if (data.grupo.includes(",")) {
        data.grupo.split(",").map(g => g.trim()).forEach(g => {
          grupo.innerHTML += `<option value="${g}">${g}</option>`;
        });
      } else {
        grupo.innerHTML += `<option value="${data.grupo}">${data.grupo}</option>`;
      }

      equipo.innerHTML = '<option value="">Selecciona equipo</option>';
      jugador.innerHTML = '<option value="">Selecciona jugador</option>';
    }

    async function cargarEquipos() {
      const ligaId = liga.value;

      const { data } = await supabaseClient
        .from("equipos")
        .select("*")
        .eq("liga_id", ligaId)
        .order("nombre");

      equipo.innerHTML = '<option value="">Selecciona equipo</option>';
      data.forEach(e => equipo.innerHTML += `<option value="${e.id}">${e.nombre}</option>`);

      jugador.innerHTML = '<option value="">Selecciona jugador</option>';
    }

    async function cargarJugadores() {
      const equipoId = equipo.value;

      const { data } = await supabaseClient
        .from("jugadores")
        .select("*")
        .eq("equipo_id", equipoId)
        .order("nombre");

      jugador.innerHTML = '<option value="">Selecciona jugador</option>';
      data.forEach(j => jugador.innerHTML += `<option value="${j.id}">${j.nombre}</option>`);
    }

    // ============================
    // LOGOUT
    // ============================
    async function logout() {
      await supabaseClient.auth.signOut();
      window.location.href = "index.html";
    }
  </script>

</body>
</html>
