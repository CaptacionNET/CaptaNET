<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>CaptaNET - Panel</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://unpkg.com/tabulator-tables@5.6.2/dist/css/tabulator.min.css" rel="stylesheet">
  <script src="https://unpkg.com/tabulator-tables@5.6.2/dist/js/tabulator.min.js"></script>

  <style>
    .tab-btn {
      padding: 10px 20px;
      cursor: pointer;
      border: 1px solid #ccc;
      background: #f5f5f5;
      margin-right: 10px;
    }
    .tab-btn.active {
      background: #ddd;
      font-weight: bold;
    }
    .tab-content {
      display: none;
      margin-top: 20px;
    }
    #universal-table {
      margin-top: 20px;
    }
  </style>
</head>

<body>
  <h2>CaptaNET</h2>

  <div style="margin-bottom:20px;">
    <button onclick="irVisor()">Visor de usuario</button>
    <button onclick="logout()">Cerrar sesión</button>
  </div>

  <div id="tabs" style="margin-bottom: 20px;">
    <button id="tab_admin" class="tab-btn" onclick="mostrarTab('admin')">Panel Admin</button>
    <button id="tab_contenido" class="tab-btn" onclick="mostrarTab('contenido')">Contenido</button>
    <button id="tab_editor" class="tab-btn" onclick="mostrarTab('editor')">Editor de tablas (Excel Web)</button>
  </div>

  <div id="admin" class="tab-content">

    <h3>Panel de Administración</h3>
    <p>Bienvenido, administrador.</p>

    <hr>

    <h3>Usuarios registrados</h3>
    <button onclick="cargarUsuarios()">Actualizar lista</button>
    <ul id="lista_usuarios"></ul>

    <hr>

<div style="border: 1px solid #ccc; padding: 20px; max-width: 400px;">
  <h3>Crear nuevo usuario</h3>

  <label>Email</label>
  <input id="new_email" type="email" style="width: 100%; margin-bottom: 10px;">

  <label>Username</label>
  <input id="new_username" type="text" style="width: 100%; margin-bottom: 10px;">

  <label>Nombre</label>
  <input id="new_nombre" type="text" style="width: 100%; margin-bottom: 10px;">

  <label>Contraseña</label>
  <input id="new_password_create" type="password" style="width: 100%; margin-bottom: 10px;">

  <label>¿Es admin?</label>
  <select id="new_is_admin" style="width: 100%; margin-bottom: 10px;">
    <option value="false">No</option>
    <option value="true">Sí</option>
  </select>

  <label>Club</label>
  <select id="new_club_id" style="width: 100%; margin-bottom: 10px;">
  </select>

  <button onclick="crearUsuario()" style="width: 100%;">Crear usuario</button>
  <p id="create_result" style="font-weight: bold;"></p>
</div>

    <hr>

    <div style="border: 1px solid #ccc; padding: 20px; max-width: 400px;">
      <h3>Editar usuario</h3>

      <label>ID del usuario</label>
      <input id="edit_id" type="text" style="width: 100%; margin-bottom: 10px;">

      <label>Nuevo email</label>
      <input id="edit_email" type="email" style="width: 100%; margin-bottom: 10px;">

      <label>Nuevo username</label>
      <input id="edit_username" type="text" style="width: 100%; margin-bottom: 10px;">

      <button onclick="editarUsuario()" style="width: 100%;">Guardar cambios</button>
      <p id="edit_result" style="font-weight: bold;"></p>
    </div>

    <hr>

    <div style="border: 1px solid #ccc; padding: 20px; max-width: 400px;">
      <h3>Cambiar contraseña</h3>

      <label>ID del usuario</label>
      <input id="pw_id" type="text" style="width: 100%; margin-bottom: 10px;">

      <label>Nueva contraseña</label>
