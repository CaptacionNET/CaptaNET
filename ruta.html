<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CaptaNET - Ruta</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--primary:#2563eb;--bg:#f5f6fa;--card:#fff;--border:#e2e4eb;--text:#1f2430;--muted:#6b7280;}
*{box-sizing:border-box;}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);}
#topbar{display:flex;justify-content:space-between;align-items:center;padding:14px 24px;background:var(--card);border-bottom:1px solid var(--border);flex-wrap:wrap;gap:10px;}
#topbar .brand{font-weight:700;font-size:18px;color:var(--primary);}
button{background:var(--primary);color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:14px;}
button:hover{opacity:.9;}
button.secondary{background:#fff;color:var(--text);border:1px solid var(--border);}
button.secondary.active{background:#eff6ff;color:var(--primary);border-color:var(--primary);font-weight:700;}
button.danger{background:#fff;color:#dc2626;border:1px solid #fecaca;}
button:disabled{opacity:.5;cursor:default;}
input,select,textarea{padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:14px;font-family:inherit;}
label{font-size:12px;color:var(--muted);display:block;margin-bottom:4px;}

.sub-tabs{display:flex;gap:6px;margin:16px 24px 0;}
.sub-tab{padding:8px 18px;border:1px solid var(--border);background:#fff;border-radius:8px 8px 0 0;cursor:pointer;font-size:14px;font-weight:600;}
.sub-tab.active{background:var(--primary);color:#fff;border-color:var(--primary);}

.contenedor{margin:0 24px 24px;background:var(--card);border:1px solid var(--border);border-radius:0 10px 10px 10px;padding:20px;}
.filtros{display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin-bottom:16px;}
.filtros .campo select{min-width:180px;}

.partido{border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.partido .equipos{flex:1;min-width:200px;font-weight:600;}
.partido .meta{color:var(--muted);font-size:13px;}
.partido .resultado{font-weight:700;color:var(--primary);}
.partido-clic{cursor:pointer;}
.partido-clic:hover{border-color:var(--primary);}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;}
.chip{font-size:11px;color:var(--muted);background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:1px 9px;}
.obj-linea{color:var(--text);font-size:12px;margin-top:4px;}

.vacio{color:var(--muted);font-size:14px;padding:20px 4px;text-align:center;}
.status{font-weight:600;color:var(--muted);margin:10px 0 0;font-size:13px;}

/* Tabla de "Mis partidos": limpia y alineada, con escudos junto a cada equipo. */
.ruta-tabla-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:8px;}
table.ruta-tabla{width:100%;border-collapse:collapse;font-size:13px;}
.ruta-tabla th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--muted);padding:9px 12px;background:var(--bg);border-bottom:1px solid var(--border);white-space:nowrap;}
.ruta-tabla td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle;white-space:nowrap;}
.ruta-tabla tbody tr{cursor:pointer;}
.ruta-tabla tbody tr:hover td{background:#f8fafc;}
.ruta-tabla tbody tr:last-child td{border-bottom:0;}
.ruta-tabla .rt-partido{font-weight:600;}
.ruta-tabla .rt-escudo{width:20px;height:20px;object-fit:contain;vertical-align:middle;margin:0 5px;}
.ruta-tabla .rt-vs{color:var(--muted);font-weight:400;margin:0 2px;}
.ruta-tabla .rt-obj{max-width:240px;overflow:hidden;text-overflow:ellipsis;color:var(--text);}
.ruta-tabla td.rt-centro{text-align:center;}

.detalle-cab{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
.alineaciones{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:14px;}
.alin-col h4{margin:0 0 6px;font-size:14px;}
.grupo-tit{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;margin:12px 0 4px;letter-spacing:.03em;}
.jug-fila{display:flex;align-items:center;gap:8px;padding:5px 0;border-top:1px solid var(--border);font-size:13px;}
.jug-fila .dorsal{width:26px;height:26px;flex-shrink:0;border-radius:6px;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;}
.jug-fila .nombre{flex:1;min-width:0;}
.jug-fila .anio{color:var(--muted);font-weight:400;}
.jug-fila.es-titular .dorsal{background:#dbeafe;border-color:var(--primary);color:var(--primary);}
.badge-fuente{font-size:11px;color:var(--muted);background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:2px 10px;}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:200;padding:20px;}
.modal-box{background:#fff;border-radius:10px;padding:24px;width:100%;max-width:440px;box-shadow:0 20px 50px rgba(0,0,0,.3);max-height:90vh;overflow-y:auto;}
.modal-box h3{margin:0 0 14px;}
.modal-box .field{margin-bottom:12px;}

@media (max-width:800px){
  #topbar{padding:12px 16px;}
  .sub-tabs{margin:12px;}
  .contenedor{margin:0 12px 24px;}
  .filtros .campo,.filtros .campo select{width:100%;min-width:0;}
  .alineaciones{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<div id="topbar">
  <div class="brand">CaptaNET · Ruta</div>
  <div style="display:flex;gap:10px;flex-wrap:wrap;">
    <button class="secondary" onclick="atras()">← Atrás</button>
    <button class="secondary" onclick="window.location.href='visor.html'">Visor</button>
    <button class="secondary" onclick="window.location.href='jugadores.html'">Informes</button>
    <button class="secondary" onclick="window.location.href='equipos.html'">Equipos</button>

    <button class="secondary" onclick="window.location.href='gestion_pruebas.html'">Pruebas</button>

</div>

<div class="sub-tabs">

</div>

<!-- HORARIOS -->
<div class="contenedor" id="seccion_horarios">
  <div class="filtros">
    <div class="campo">
      <label>Modalidad</label>
      <select id="f_modalidad" onchange="onModalidadChange()"><option value="">-</option></select>
    </div>
    <div class="campo">
      <label>Competición</label>
      <select id="f_competicion" onchange="onCompeticionChange()"><option value="">-</option></select>

    <div class="campo" id="campo_grupo" style="display:none;">
      <label>Grupo</label>
      <select id="f_grupo" onchange="onGrupoChange()"></select>
    </div>
    <div class="campo">
      <label>Jornada</label>
      <select id="f_jornada" onchange="cargarPartidos()"><option value="">-</option></select>
    </div>

<!-- MI RUTA -->
<div class="contenedor" id="seccion_ruta" style="display:none;">
  <div id="ruta_lista_wrap">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px;">
      <h2 id="ruta_titulo" style="margin:0;font-size:18px;">Mis partidos</h2>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">

    <div id="ruta_lista"></div>

  <div id="ruta_detalle" style="display:none;"></div>
</div>

<!-- MODAL OBJETIVOS (al añadir desde Horarios) -->
<div class="modal-overlay" id="modal_objetivos">
  <div class="modal-box">
    <h3>Añadir a mi ruta</h3>
    <p id="mo_partido" style="color:var(--muted);font-size:13px;margin:-8px 0 14px;"></p>
    <div class="field">
      <label>Objetivos del partido <span style="color:var(--muted);">(¿por qué vas?)</span></label>
      <textarea id="mo_objetivos" style="width:100%;min-height:90px;" placeholder="Ej. ver al 9 del rival y al central zurdo local."></textarea>
    </div>

      <button class="secondary" onclick="cerrarModalObjetivos()">Cancelar</button>
      <button id="mo_btn" onclick="confirmarAnadirRuta()">Añadir a mi ruta</button>
    </div>
  </div>
</div>

<!-- MODAL PARTIDO MANUAL -->
<div class="modal-overlay" id="modal_manual">
  <div class="modal-box">
    <h3>Añadir partido manual</h3>
    <p style="color:var(--muted);font-size:12px;margin:-8px 0 14px;">Para amistosos o partidos que no están en la FFCV.</p>
    <div class="field">
      <label>Equipo local</label>

    <div class="field">

    <div style="display:flex;gap:12px;">
      <div class="field" style="flex:1;">
        <label>Fecha</label>
        <input id="mm_fecha" type="date" style="width:100%;">
      </div>

        <label>Hora</label>
        <input id="mm_hora" type="time" style="width:100%;">
      </div>
    </div>
    <div class="field">
      <label>Campo</label>
      <input id="mm_campo" type="text" style="width:100%;">
    </div>
    <div class="field">
      <label>Objetivos del partido <span style="color:var(--muted);">(¿por qué vas?)</span></label>
      <textarea id="mm_objetivos" style="width:100%;min-height:70px;"></textarea>
    </div>
    <p id="mm_status" style="font-size:13px;color:var(--muted);min-height:18px;"></p>
    <div style="display:flex;gap:10px;justify-content:flex-end;">
      <button class="secondary" onclick="cerrarModalManual()">Cancelar</button>
      <button id="mm_btn" onclick="guardarManual()">Añadir</button>
    </div>
  </div>
</div>

<!-- MODAL INFORME (ventana emergente con la ficha de Informes) -->
<div class="modal-overlay" id="modal_informe">
  <div style="background:#fff;border-radius:10px;width:100%;max-width:520px;height:85vh;max-height:85vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 50px rgba(0,0,0,.3);">
    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border-bottom:1px solid var(--border);flex-shrink:0;">
      <strong id="mi_titulo" style="font-size:15px;">Informe del jugador</strong>
      <button class="secondary" onclick="cerrarInformeModal()" style="font-size:18px;padding:2px 12px;line-height:1;">✕</button>
    </div>
    <iframe id="informe_iframe" title="Informe del jugador" style="flex:1;width:100%;border:0;"></iframe>
  </div>
</div>

<script>
const client = supabase.createClient(
  "https://bnqoisjvboytiphiwosj.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJucW9pc2p2Ym95dGlwaGl3b3NqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2MDgwMTcsImV4cCI6MjA5OTE4NDAxN30.RpTr0Z17ZRFwTpBvsmNwyqtEm0nLVWxM96mxaLxDbes"
);

let miClubId = null;
let miNombre = "";
let miUserId = null;
let esAdmin = false, esClubAdmin = false;
let rutaCache = [];
let ojeadorNombre = {};
let catalogo = { cod_temporada: null, competiciones: [] };
let gruposActuales = [];
let partidoPendiente = null;   // partido que se va a añadir desde Horarios (a la espera de objetivos)

function escapeHtml(s) {
  return (s ?? "").toString()
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&#039;");
}

async function protegerPagina() {
  const { data: session } = await client.auth.getSession();
  if (!session.session) { window.location.href = "index.html"; return false; }
  miUserId = session.session.user.id;
  const { data: perfil } = await client
    .from("profiles").select("is_admin, is_club_admin, club_id, nombre, username").eq("id", session.session.user.id).single();
  miClubId = perfil?.club_id || null;
  miNombre = perfil?.nombre || perfil?.username || "";
  esAdmin = !!perfil?.is_admin;
  esClubAdmin = !!perfil?.is_club_admin;
  if (perfil?.is_admin) document.getElementById("btn_admin").style.display = "inline-block";
  if (perfil?.is_club_admin) document.getElementById("btn_equipo").style.display = "inline-block";
  return true;
}

function atras() {
  if (window.history.length > 1) window.history.back();
  else window.location.href = "visor.html";
}
async function logout() { await client.auth.signOut(); window.location.href = "index.html"; }

async function mensajeError(error) {
  if (!error) return "";
  if (error.context && typeof error.context.json === "function") {
    try { const b = await error.context.json(); if (b?.error) return typeof b.error === "string" ? b.error : JSON.stringify(b.error); } catch (e) {}
  }
  return error.message || "Error desconocido";
}

async function ffcv(accion, extra = {}) {
  const { data, error } = await client.functions.invoke("ruta-ffcv", { body: { accion, ...extra } });
  if (error) throw new Error(await mensajeError(error));
  if (data && data.error) throw new Error(data.error);
  return data;
}

function cambiarSeccion(nombre) {
  document.getElementById("seccion_horarios").style.display = nombre === "horarios" ? "block" : "none";
  document.getElementById("seccion_ruta").style.display = nombre === "ruta" ? "block" : "none";
  document.getElementById("tab_horarios").classList.toggle("active", nombre === "horarios");
  document.getElementById("tab_ruta").classList.toggle("active", nombre === "ruta");
  if (nombre === "ruta") cargarRuta();
}

// ---------------- fechas ----------------
function fechaFfcvAIso(f) { // "23/08/2025" o "23-08-2025" -> "2025-08-23"
  const m = (f || "").match(/^(\d{2})[\/\-](\d{2})[\/\-](\d{4})$/);
  return m ? `${m[3]}-${m[2]}-${m[1]}` : null;
}
function parseFechaJornada(f) { // "23-08-2025" -> Date (medianoche local)
  const iso = fechaFfcvAIso(f);
  return iso ? new Date(iso + "T00:00:00") : null;
}

// ---------------- HORARIOS ----------------
async function cargarCatalogo() {
  const s = document.getElementById("horarios_status");
  s.textContent = "Cargando competiciones de la FFCV…";
  try {
    catalogo = await ffcv("catalogo");
    const modalidades = [...new Set((catalogo.competiciones || []).map(c => c.modalidad))].sort();
    const sel = document.getElementById("f_modalidad");
    sel.innerHTML = '<option value="">-</option>' + modalidades.map(m => `<option value="${escapeHtml(m)}">${escapeHtml(m)}</option>`).join("");
    s.textContent = catalogo.temporada ? `Temporada ${catalogo.temporada}. Elige modalidad, competición y jornada.` : "No hay competiciones publicadas ahora mismo en la FFCV.";
  } catch (e) { s.textContent = "Error cargando competiciones: " + e.message; }
}

function onModalidadChange() {
  const mod = document.getElementById("f_modalidad").value;
  const sel = document.getElementById("f_competicion");
  const comps = (catalogo.competiciones || []).filter(c => c.modalidad === mod);
  sel.innerHTML = '<option value="">-</option>' + comps.map(c => `<option value="${c.codigo}">${escapeHtml(c.nombre)}</option>`).join("");
  document.getElementById("campo_grupo").style.display = "none";
  document.getElementById("f_jornada").innerHTML = '<option value="">-</option>';
  document.getElementById("horarios_lista").innerHTML = "";
}

async function onCompeticionChange() {
  const codComp = document.getElementById("f_competicion").value;
  const s = document.getElementById("horarios_status");
  document.getElementById("horarios_lista").innerHTML = "";
  document.getElementById("f_jornada").innerHTML = '<option value="">-</option>';
  if (!codComp) return;
  s.textContent = "Cargando grupos…";
  try {
    gruposActuales = (await ffcv("grupos", { cod_competicion: codComp })).grupos || [];
    const campoGrupo = document.getElementById("campo_grupo");
    const selGrupo = document.getElementById("f_grupo");
    if (gruposActuales.length > 1) {
      selGrupo.innerHTML = gruposActuales.map(g => `<option value="${g.codigo}">${escapeHtml(g.nombre)}</option>`).join("");
      campoGrupo.style.display = "block";
    } else {
      campoGrupo.style.display = "none";
    }
    await cargarJornadas();
  } catch (e) { s.textContent = "Error cargando grupos: " + e.message; }
}

function grupoSeleccionado() {
  if (!gruposActuales.length) return null;
  if (gruposActuales.length === 1) return gruposActuales[0];
  const cod = document.getElementById("f_grupo").value;
  return gruposActuales.find(g => g.codigo === cod) || gruposActuales[0];
}

async function cargarJornadas() {
  const codComp = document.getElementById("f_competicion").value;
  const g = grupoSeleccionado();
  const s = document.getElementById("horarios_status");
  const sel = document.getElementById("f_jornada");
  if (!codComp || !g) return;
  s.textContent = "Cargando jornadas…";
  try {
    const jornadas = (await ffcv("jornadas", { cod_competicion: codComp, cod_grupo: g.codigo })).jornadas || [];
    if (!jornadas.length) { sel.innerHTML = '<option value="">-</option>'; s.textContent = "Esta competición aún no tiene jornadas publicadas."; return; }
    sel.innerHTML = jornadas.map(j => {
      const fecha = j.fecha ? " · " + j.fecha.replace(/-/g, "/") : "";
      return `<option value="${escapeHtml(j.codjornada)}">Jornada ${escapeHtml(j.codjornada)}${fecha}</option>`;
    }).join("");
    // precargar la próxima jornada disponible (primera cuya fecha es hoy o futura)
    const hoy = new Date(); hoy.setHours(0, 0, 0, 0);
    let idx = jornadas.findIndex(j => { const f = parseFechaJornada(j.fecha); return f && f >= hoy; });
    if (idx < 0) idx = jornadas.length - 1;
    sel.value = jornadas[idx].codjornada;
    s.textContent = "";
    await cargarPartidos();
  } catch (e) { s.textContent = "Error cargando jornadas: " + e.message; }
}

async function onGrupoChange() {
  document.getElementById("horarios_lista").innerHTML = "";
  await cargarJornadas();
}

async function cargarPartidos() {
  const codComp = document.getElementById("f_competicion").value;
  const jornada = document.getElementById("f_jornada").value;
  const g = grupoSeleccionado();
  const cont = document.getElementById("horarios_lista");
  const s = document.getElementById("horarios_status");
  if (!codComp || !g || !jornada) { cont.innerHTML = ""; return; }
  s.textContent = "Cargando partidos…";
  cont.innerHTML = "";
  try {
    const d = await ffcv("partidos", {
      cod_temporada: catalogo.cod_temporada, cod_competicion: codComp, cod_grupo: g.codigo, cod_jornada: jornada
    });
    const partidos = d.partidos || [];
    if (!partidos.length) { s.textContent = "No hay partidos en esta jornada."; return; }
    s.textContent = "";
    const modalidad = document.getElementById("f_modalidad").value;
    const nombreComp = document.getElementById("f_competicion").selectedOptions[0]?.textContent || "";
    cont.innerHTML = "";
    partidos.forEach(p => {
      const div = document.createElement("div");
      div.className = "partido";
      div.innerHTML =
        `<div class="equipos">${escapeHtml(p.local)} <span style="color:var(--muted);font-weight:400;">vs</span> ${escapeHtml(p.visitante)}</div>` +
        `<div class="meta">${escapeHtml(p.fecha || "")} ${escapeHtml(p.hora || "")}${p.campo ? " · " + escapeHtml(p.campo) : ""}</div>` +
        (p.jugado ? `<div class="resultado">${escapeHtml(p.resultado)}</div>` : "");
      const btn = document.createElement("button");
      btn.className = "secondary";
      btn.style.cssText = "font-size:12px;padding:6px 10px;";
      btn.textContent = "+ A mi ruta";
      btn.onclick = () => abrirModalObjetivos(p, modalidad, nombreComp, g, codComp, jornada);
      div.appendChild(btn);
      cont.appendChild(div);
    });
  } catch (e) { s.textContent = "Error cargando partidos: " + e.message; }
}

// ---------------- añadir desde Horarios (con objetivos) ----------------
function abrirModalObjetivos(p, modalidad, nombreComp, grupo, codComp, jornada) {
  partidoPendiente = {
    club_id: miClubId,
    cod_partido: p.cod_partido,
    es_manual: false,
    cod_equipo_local: p.cod_equipo_local || null,
    cod_equipo_visitante: p.cod_equipo_visitante || null,
    local: p.local, visitante: p.visitante,
    escudo_local: p.escudo_local || null, escudo_visitante: p.escudo_visitante || null,
    fecha: fechaFfcvAIso(p.fecha), hora: p.hora || null, campo: p.campo || null,
    competicion: nombreComp || null, categoria: modalidad || null, grupo: grupo.nombre || null,
    alineacion: { ctx: { cod_temporada: catalogo.cod_temporada, cod_competicion: codComp, cod_grupo: grupo.codigo, cod_jornada: jornada } }
  };
  document.getElementById("mo_partido").textContent = `${p.local} vs ${p.visitante}`;
  document.getElementById("mo_objetivos").value = "";
  document.getElementById("mo_status").textContent = "";
  document.getElementById("modal_objetivos").style.display = "flex";
}
function cerrarModalObjetivos() { document.getElementById("modal_objetivos").style.display = "none"; partidoPendiente = null; }

async function confirmarAnadirRuta() {
  if (!partidoPendiente) return;
  const btn = document.getElementById("mo_btn");
  const s = document.getElementById("mo_status");
  btn.disabled = true;
  const registro = { ...partidoPendiente, objetivos: document.getElementById("mo_objetivos").value.trim() || null };
  const { error } = await client.from("ruta_partidos").insert(registro);
  btn.disabled = false;
  if (error) {
    s.textContent = /duplicate|unique|23505/i.test(error.message) ? "Ese partido ya está en tu ruta." : "Error: " + error.message;
    return;
  }
  cerrarModalObjetivos();
  document.getElementById("horarios_status").textContent = "Añadido a tu ruta.";
}

// ---------------- MI RUTA ----------------
const puedeVerTodas = () => esAdmin || esClubAdmin;

async function cargarRuta() {
  document.getElementById("ruta_lista_wrap").style.display = "block";
  document.getElementById("ruta_detalle").style.display = "none";
  document.getElementById("ruta_titulo").textContent = puedeVerTodas() ? "Partidos del club" : "Mis partidos";

  // La RLS decide qué filas llegan: el ojeador ve solo las suyas; el admin del
  // club (o global) ve las de todos sus ojeadores.
  const { data, error } = await client.from("ruta_partidos").select("*")
    .order("fecha", { ascending: true, nullsFirst: false }).order("hora", { ascending: true, nullsFirst: true });
  if (error) { document.getElementById("ruta_lista").innerHTML = `<p class="vacio">Error: ${escapeHtml(error.message)}</p>`; return; }
  rutaCache = data || [];

  // Nombres de cada ojeador (para mostrarlos y para el filtro).
  ojeadorNombre = {};
  const userIds = [...new Set(rutaCache.map(r => r.user_id).filter(Boolean))];
  if (userIds.length) {
    const { data: profs } = await client.from("profiles").select("id, nombre, username").in("id", userIds);
    (profs || []).forEach(p => { ojeadorNombre[p.id] = p.nombre || p.username || "Ojeador"; });
  }
  if (miUserId) ojeadorNombre[miUserId] = ojeadorNombre[miUserId] || miNombre || "Yo";

  // Filtro por ojeador (solo para quien puede ver las de todos).
  const sel = document.getElementById("filtro_ojeador");
  if (puedeVerTodas() && userIds.length > 1) {
    const previo = sel.value;
    sel.style.display = "";
    sel.innerHTML = '<option value="">Todos los ojeadores</option>' +
      userIds.map(id => `<option value="${id}">${escapeHtml(ojeadorNombre[id] || "Ojeador")}</option>`).join("");
    if ([...sel.options].some(o => o.value === previo)) sel.value = previo;
  } else {
    sel.style.display = "none";
    sel.innerHTML = "";
  }

  renderRuta();
}

function renderRuta() {
  const cont = document.getElementById("ruta_lista");
  const filtro = document.getElementById("filtro_ojeador").value;
  const filas = filtro ? rutaCache.filter(r => r.user_id === filtro) : rutaCache;

  cont.className = "";
  if (!filas.length) {
    cont.innerHTML = `<p class="vacio">${rutaCache.length ? "Ningún partido para ese ojeador." : "Aún no hay partidos en la ruta. Añádelos desde Horarios o crea uno manual."}</p>`;
    return;
  }

  const escudo = (url) => url ? `<img class="rt-escudo" src="${escapeHtml(url)}" onerror="this.style.visibility='hidden';">` : "";

  const filasHtml = filas.map(rp => {
    const fecha = rp.fecha ? new Date(rp.fecha + "T00:00:00").toLocaleDateString("es-ES") : "—";
    const partido =
      `${escapeHtml(rp.local || "")}${escudo(rp.escudo_local)}<span class="rt-vs">vs</span>${escudo(rp.escudo_visitante)}${escapeHtml(rp.visitante || "")}` +
      (rp.es_manual ? ' <span class="badge-fuente">manual</span>' : "");
    return `<tr onclick="abrirDetalle('${rp.id}')">
      <td>${fecha}</td>
      <td>${escapeHtml(rp.hora || "—")}</td>
      <td>${escapeHtml(rp.categoria || "—")}</td>
      <td class="rt-partido">${partido}</td>
      <td>${escapeHtml(rp.campo || "—")}</td>
      <td>${escapeHtml(rp.competicion || "—")}</td>
      <td>${escapeHtml(rp.grupo || "—")}</td>
      <td>${escapeHtml(ojeadorNombre[rp.user_id] || miNombre || "—")}</td>
      <td class="rt-obj" title="${escapeHtml(rp.objetivos || "")}">${escapeHtml(rp.objetivos || "—")}</td>
      <td class="rt-centro"><button class="secondary" style="font-size:12px;padding:5px 12px;" onclick="event.stopPropagation();abrirDetalle('${rp.id}')">Abrir</button></td>
    </tr>`;
  }).join("");

  cont.innerHTML =
    `<div class="ruta-tabla-wrap"><table class="ruta-tabla">
      <thead><tr>
        <th>Fecha</th><th>Hora</th><th>Categoría</th><th>Partido</th><th>Campo</th>
        <th>Liga</th><th>Grupo</th><th>Ojeador</th><th>Objetivos</th><th>Acciones</th>
      </tr></thead>
      <tbody>${filasHtml}</tbody>
    </table></div>`;
}

let detalleActual = null;
let detalleAlineacion = null;   // { fuente, jugadores_local, jugadores_visitante, mapaId, mapaAnio }

async function abrirDetalle(id, autoAlineacion = false) {
  const { data: rp, error } = await client.from("ruta_partidos").select("*").eq("id", id).single();
  if (error || !rp) return;
  detalleActual = rp;
  detalleAlineacion = null;

  // Si el admin abre la ruta de OTRO ojeador, es solo lectura (la RLS no le
  // deja escribir): se ocultan editar/eliminar y se marca de quién es.
  const soloLectura = !!(rp.user_id && miUserId && rp.user_id !== miUserId);
  detalleActual.soloLectura = soloLectura;

  document.getElementById("ruta_lista_wrap").style.display = "none";
  const cont = document.getElementById("ruta_detalle");
  cont.style.display = "block";
  const fecha = rp.fecha ? new Date(rp.fecha + "T00:00:00").toLocaleDateString("es-ES") : "Sin fecha";
  const linea2 = [fecha + (rp.hora ? " · " + rp.hora : ""), rp.campo, rp.categoria, rp.competicion, rp.grupo].filter(Boolean).map(escapeHtml).join(" · ");
  const volverTxt = puedeVerTodas() ? "← Volver a los partidos" : "← Volver a mi ruta";

  cont.innerHTML = `
    <div class="detalle-cab">
      <button class="secondary" onclick="cargarRuta()">${volverTxt}</button>
      ${soloLectura ? "" : `<button class="danger" style="font-size:12px;padding:6px 12px;" onclick="eliminarPartido('${rp.id}')">Eliminar partido</button>`}
    </div>
    <h2 style="margin:0 0 2px;">${escapeHtml(rp.local || "")} vs ${escapeHtml(rp.visitante || "")}</h2>
    <p style="color:var(--muted);font-size:13px;margin:0 0 6px;">${linea2}</p>
    ${soloLectura ? `<p style="color:var(--muted);font-size:12px;margin:0 0 6px;">👤 Ruta de ${escapeHtml(ojeadorNombre[rp.user_id] || "otro ojeador")} · solo lectura</p>` : ""}
    <div id="d_alineaciones_wrap" style="margin-top:14px;">
      ${rp.es_manual
        ? '<p class="vacio">Los partidos manuales no tienen plantillas de la FFCV.</p>'
        : '<button class="secondary" onclick="cargarAlineaciones()">Ver plantillas y titulares</button>'}
    </div>
  `;
  if (autoAlineacion && !rp.es_manual) cargarAlineaciones();
}

async function cargarAlineaciones(refrescar = false) {
  if (!detalleActual) return;
  const wrap = document.getElementById("d_alineaciones_wrap");
  wrap.innerHTML = '<p class="status">Cargando plantillas… (puede tardar unos segundos)</p>';
  const ctx = (detalleActual.alineacion && detalleActual.alineacion.ctx) || {};
  try {
    const d = await ffcv("detalle_partido", {
      cod_partido: detalleActual.cod_partido,
      cod_equipo_local: detalleActual.cod_equipo_local, cod_equipo_visitante: detalleActual.cod_equipo_visitante,
      cod_temporada: ctx.cod_temporada, cod_competicion: ctx.cod_competicion, cod_grupo: ctx.cod_grupo, cod_jornada: ctx.cod_jornada,
      refrescar,
    });
    // resolver qué codjugadores existen en nuestra base (para enlazar Informes y sacar el año)
    const todos = [...(d.jugadores_local || []), ...(d.jugadores_visitante || [])].map(j => j.codjugador).filter(Boolean);
    const mapaId = {}, mapaAnio = {};
    if (todos.length) {
      const { data: jugs } = await client.from("jugadores").select("id, cod_ffcv, fecha_nacimiento").in("cod_ffcv", todos);
      (jugs || []).forEach(j => {
        mapaId[j.cod_ffcv] = j.id;
        if (j.fecha_nacimiento) mapaAnio[j.cod_ffcv] = new Date(j.fecha_nacimiento).getFullYear();
      });
    }
    detalleAlineacion = { ...d, mapaId, mapaAnio };
    renderAlineaciones();
  } catch (e) {
    wrap.innerHTML = `<p class="status">Error cargando plantillas: ${escapeHtml(e.message)}</p><button class="secondary" onclick="cargarAlineaciones()">Reintentar</button>`;
  }
}

function dorsalNum(d) { const n = parseInt(d, 10); return isNaN(n) ? 9999 : n; }

function esTitular(lado, j) {
  const m = (detalleActual.alineacion && detalleActual.alineacion.marcas && detalleActual.alineacion.marcas[lado]) || {};
  if (Object.prototype.hasOwnProperty.call(m, j.codjugador)) return !!m[j.codjugador];
  // sin marca del ojeador: si el acta ya trae titulares reales, se respetan; si es plantilla, nadie es titular
  return detalleAlineacion.fuente === "acta" ? !!j.titular : false;
}

function renderAlineaciones() {
  const d = detalleAlineacion;
  const wrap = document.getElementById("d_alineaciones_wrap");
  const fuenteTxt = d.fuente === "acta"
    ? (d.cerrada ? "Alineaciones del acta (partido finalizado)." : "🔴 Alineación en directo del acta (subida por el club).")
    : "Dorsales precargados del último partido. Marca tú los titulares y subirán arriba.";

  const filaJug = (lado, j) => {
    const tit = esTitular(lado, j);
    const anio = d.mapaAnio[j.codjugador];
    const idJug = d.mapaId[j.codjugador];
    const informe = idJug
      ? `<span onclick="abrirInformeModal('${idJug}')" title="Hacer informe" style="cursor:pointer;">📝</span>`
      : `<span title="No está en la base de datos" style="color:var(--border);">📝</span>`;
    return `<div class="jug-fila ${tit ? "es-titular" : ""}">
      <span class="dorsal">${escapeHtml(j.dorsal || "-")}</span>
      <span class="nombre">${escapeHtml(j.nombre)}${anio ? ` <span class="anio">(${anio})</span>` : ""}${j.capitan ? " ©" : ""}${j.portero ? " 🧤" : ""}</span>
      <label style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted);cursor:pointer;">
        <input type="checkbox" ${tit ? "checked" : ""} ${detalleActual.soloLectura ? "disabled" : ""} onchange="toggleTitular('${lado}','${escapeHtml(j.codjugador)}',this.checked)"> titular
      </label>
      ${informe}
    </div>`;
  };

  const columna = (titulo, jugadores, lado) => {
    const lista = (jugadores || []).slice();
    const titulares = lista.filter(j => esTitular(lado, j)).sort((a, b) => dorsalNum(a.dorsal) - dorsalNum(b.dorsal));
    const suplentes = lista.filter(j => !esTitular(lado, j)).sort((a, b) => dorsalNum(a.dorsal) - dorsalNum(b.dorsal));
    const esquema = d["esquema_" + lado];
    return `<div class="alin-col">
      <h4>${escapeHtml(titulo)}${esquema ? ` <span style="color:var(--muted);font-weight:400;">${escapeHtml(esquema)}</span>` : ""}</h4>
      <div class="grupo-tit">Titulares (${titulares.length})</div>
      ${titulares.map(j => filaJug(lado, j)).join("") || '<p style="color:var(--muted);font-size:12px;margin:4px 0;">Marca abajo quién es titular.</p>'}
      <div class="grupo-tit">Suplentes (${suplentes.length})</div>
      ${suplentes.map(j => filaJug(lado, j)).join("") || '<p style="color:var(--muted);font-size:12px;margin:4px 0;">—</p>'}
    </div>`;
  };

  wrap.innerHTML =
    `<div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;">
       <p class="status" style="margin:0;">${fuenteTxt}</p>
       <button class="secondary" style="font-size:12px;padding:6px 10px;" onclick="cargarAlineaciones(true)">↻ Actualizar (en directo)</button>
     </div>
     <div class="alineaciones">` +
    columna(detalleActual.local || "Local", d.jugadores_local, "local") +
    columna(detalleActual.visitante || "Visitante", d.jugadores_visitante, "visitante") +
    `</div>`;
}

let marcasTimeout = null;
function toggleTitular(lado, codjugador, marcado) {
  if (detalleActual.soloLectura) return;
  if (!detalleActual.alineacion) detalleActual.alineacion = {};
  if (!detalleActual.alineacion.marcas) detalleActual.alineacion.marcas = {};
  if (!detalleActual.alineacion.marcas[lado]) detalleActual.alineacion.marcas[lado] = {};
  detalleActual.alineacion.marcas[lado][codjugador] = marcado;
  renderAlineaciones();
  clearTimeout(marcasTimeout);
  marcasTimeout = setTimeout(guardarMarcas, 500);
}
async function guardarMarcas() {
  if (!detalleActual) return;
  await client.from("ruta_partidos").update({ alineacion: detalleActual.alineacion }).eq("id", detalleActual.id);
}

async function eliminarPartido(id) {
  if (!confirm("¿Eliminar este partido de tu ruta? No se puede deshacer.")) return;
  const { error } = await client.from("ruta_partidos").delete().eq("id", id);
  if (error) { alert("Error eliminando: " + error.message); return; }
  cargarRuta();
}

// El informe se abre en una ventana emergente (la propia página de Informes
// embebida), para no salir del partido — sobre todo en móvil viendo el
// partido en directo. La X cierra y vuelve a las alineaciones.
function abrirInformeModal(jugadorId) {
  // Nombre del jugador para la cabecera del pop-up (la ficha embebida ya no la muestra).
  let nombre = "";
  if (detalleAlineacion) {
    const cod = Object.keys(detalleAlineacion.mapaId || {}).find(c => detalleAlineacion.mapaId[c] === jugadorId);
    const todos = [...(detalleAlineacion.jugadores_local || []), ...(detalleAlineacion.jugadores_visitante || [])];
    const j = cod ? todos.find(x => x.codjugador === cod) : null;
    nombre = j ? j.nombre : "";
  }
  document.getElementById("mi_titulo").textContent = nombre ? "Informe · " + nombre : "Informe del jugador";
  document.getElementById("informe_iframe").src = "jugadores.html?jugador_id=" + encodeURIComponent(jugadorId) + "&modal=1";
  document.getElementById("modal_informe").style.display = "flex";
}
function cerrarInformeModal() {
  document.getElementById("modal_informe").style.display = "none";
  document.getElementById("informe_iframe").src = "about:blank";
}

// ---------------- MODAL MANUAL ----------------
function abrirModalManual() {
  ["mm_local", "mm_visitante", "mm_fecha", "mm_hora", "mm_campo", "mm_objetivos"].forEach(id => document.getElementById(id).value = "");
  document.getElementById("mm_status").textContent = "";
  document.getElementById("modal_manual").style.display = "flex";
}
function cerrarModalManual() { document.getElementById("modal_manual").style.display = "none"; }

async function guardarManual() {
  const local = document.getElementById("mm_local").value.trim();
  const visitante = document.getElementById("mm_visitante").value.trim();
  const s = document.getElementById("mm_status");
  if (!local || !visitante) { s.textContent = "Pon al menos los dos equipos."; return; }
  const btn = document.getElementById("mm_btn");
  btn.disabled = true;
  const registro = {
    club_id: miClubId, es_manual: true,
    local, visitante,
    fecha: document.getElementById("mm_fecha").value || null,
    hora: document.getElementById("mm_hora").value || null,
    campo: document.getElementById("mm_campo").value.trim() || null,
    objetivos: document.getElementById("mm_objetivos").value.trim() || null,
  };
  const { error } = await client.from("ruta_partidos").insert(registro);
  btn.disabled = false;
  if (error) { s.textContent = "Error: " + error.message; return; }
  cerrarModalManual();
  cargarRuta();
}

document.addEventListener("DOMContentLoaded", async () => {
  const ok = await protegerPagina();
  if (!ok) return;
  // Si venimos de un informe ("volver al partido"), abrir directamente ese partido.
  const partidoId = new URLSearchParams(window.location.search).get("partido");
  if (partidoId) {
    cambiarSeccion("ruta");
    await abrirDetalle(partidoId, true);
    cargarCatalogo();
    return;
  }
  await cargarCatalogo();
});
</script>
