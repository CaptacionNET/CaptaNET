<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CaptaNET - Ruta</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--primary:#2563eb;--bg:#f5f6fa;--card:#fff;--border:#e2e4eb;--text:#1f2430;--muted:#6b7280;}
*{box-sizing:border-box;}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);}
#topbar{display:flex;justify-content:space-between;align-items:center;padding:14px 24px;background:var(--card);border-bottom:1px solid var(--border);flex-wrap:wrap;gap:10px;}
#topbar .brand{font-weight:700;font-size:18px;color:var(--primary);}
button{background:var(--primary);color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:14px;}
button:hover{opacity:.9;}
button.secondary{background:#fff;color:var(--text);border:1px solid var(--border);}
button.secondary.active{background:#eff6ff;color:var(--primary);border-color:var(--primary);font-weight:700;}
button.danger{background:#fff;color:#dc2626;border:1px solid #fecaca;}
button:disabled{opacity:.5;cursor:default;}
input,select,textarea{padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:14px;font-family:inherit;}
label{font-size:12px;color:var(--muted);display:block;margin-bottom:4px;}

.sub-tabs{display:flex;gap:6px;margin:16px 24px 0;}
.sub-tab{padding:8px 18px;border:1px solid var(--border);background:#fff;border-radius:8px 8px 0 0;cursor:pointer;font-size:14px;font-weight:600;}
.sub-tab.active{background:var(--primary);color:#fff;border-color:var(--primary);}

.contenedor{margin:0 24px 24px;background:var(--card);border:1px solid var(--border);border-radius:0 10px 10px 10px;padding:20px;}
.filtros{display:flex;gap:12px;flex-wrap:wrap;align-items:end;margin-bottom:16px;}
.filtros .campo select{min-width:180px;}

.partido{border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.partido .equipos{flex:1;min-width:200px;font-weight:600;}
.partido .meta{color:var(--muted);font-size:13px;}
.partido .resultado{font-weight:700;color:var(--primary);}
.partido-clic{cursor:pointer;}
.partido-clic:hover{border-color:var(--primary);}
.chips{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;}
.chip{font-size:11px;color:var(--muted);background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:1px 9px;}
.obj-linea{color:var(--text);font-size:12px;margin-top:4px;}

.vacio{color:var(--muted);font-size:14px;padding:20px 4px;text-align:center;}
.status{font-weight:600;color:var(--muted);margin:10px 0 0;font-size:13px;}

/* Tabla de "Mis partidos": limpia y alineada, con escudos junto a cada equipo. */
.ruta-tabla-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:8px;}
table.ruta-tabla{width:100%;border-collapse:collapse;font-size:13px;}
.ruta-tabla th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--muted);padding:9px 12px;background:var(--bg);border-bottom:1px solid var(--border);white-space:nowrap;}
.ruta-tabla td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle;white-space:nowrap;}
.ruta-tabla tbody tr{cursor:pointer;}
.ruta-tabla tbody tr:hover td{background:#f8fafc;}
.ruta-tabla tbody tr:last-child td{border-bottom:0;}
.ruta-tabla .rt-partido{font-weight:600;}
.ruta-tabla .rt-escudo{width:20px;height:20px;object-fit:contain;vertical-align:middle;margin:0 5px;}
.ruta-tabla .rt-vs{color:var(--muted);font-weight:400;margin:0 2px;}
.ruta-tabla .rt-obj{max-width:240px;overflow:hidden;text-overflow:ellipsis;color:var(--text);}
.ruta-tabla td.rt-centro{text-align:center;}

.detalle-cab{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px;}
.alineaciones{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:14px;}
.alin-col h4{margin:0 0 6px;font-size:14px;}
.grupo-tit{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;margin:12px 0 4px;letter-spacing:.03em;}
.jug-fila{display:flex;align-items:center;gap:8px;padding:5px 0;border-top:1px solid var(--border);font-size:13px;}
.jug-fila .dorsal{width:26px;height:26px;flex-shrink:0;border-radius:6px;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;}
.jug-fila .nombre{flex:1;min-width:0;}
.jug-fila .anio{color:var(--muted);font-weight:400;}
.jug-fila.es-titular .dorsal{background:#dbeafe;border-color:var(--primary);color:var(--primary);}
.badge-fuente{font-size:11px;color:var(--muted);background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:2px 10px;}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:200;padding:20px;}
.modal-box{background:#fff;border-radius:10px;padding:24px;width:100%;max-width:440px;box-shadow:0 20px 50px rgba(0,0,0,.3);max-height:90vh;overflow-y:auto;}
.modal-box h3{margin:0 0 14px;}
.modal-box .field{margin-bottom:12px;}

@media (max-width:800px){
  #topbar{padding:12px 16px;}
  .sub-tabs{margin:12px;}
  .contenedor{margin:0 12px 24px;}
  .filtros .campo,.filtros .campo select{width:100%;min-width:0;}
  .alineaciones{grid-template-columns:1fr;}
}
</style>
</head>

<script>
const client = supabase.createClient(
  "https://bnqoisjvboytiphiwosj.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJucW9pc2p2Ym95dGlwaGl3b3NqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2MDgwMTcsImV4cCI6MjA5OTE4NDAxN30.RpTr0Z17ZRFwTpBvsmNwyqtEm0nLVWxM96mxaLxDbes"
);

let miClubId = null;
let miNombre = "";
let miUserId = null;
let esAdmin = false, esClubAdmin = false;
let rutaCache = [];
let ojeadorNombre = {};
let catalogo = { cod_temporada: null, competiciones: [] };
let gruposActuales = [];
let partidoPendiente = null;   // partido que se va a añadir desde Horarios (a la espera de objetivos)

function escapeHtml(s) {
  return (s ?? "").toString()
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&#039;");
}

async function protegerPagina() {
  const { data: session } = await client.auth.getSession();
  if (!session.session) { window.location.href = "index.html"; return false; }
  miUserId = session.session.user.id;
  const { data: perfil, error } = await client
    .from("profiles").select("is_admin, is_club_admin, club_id, nombre, username, clubs(escudo_url)").eq("id", session.session.user.id).single();
  if (error) {
    document.body.insertAdjacentHTML("afterbegin", `<p style="background:#fef2f2;color:#dc2626;border-bottom:1px solid #fecaca;padding:10px 24px;margin:0;font-size:14px;">Error cargando tu perfil: ${error.message}</p>`);
    return false;
  }
  miClubId = perfil?.club_id || null;
  miNombre = perfil?.nombre || perfil?.username || "";
  esAdmin = !!perfil?.is_admin;
  esClubAdmin = !!perfil?.is_club_admin;
  if (perfil?.is_admin) document.getElementById("btn_admin").style.display = "inline-block";
  if (perfil?.is_club_admin) document.getElementById("btn_equipo").style.display = "inline-block";
  if (perfil?.clubs?.escudo_url) {
    const img = document.getElementById("brand_escudo");
    img.src = perfil.clubs.escudo_url;
    img.style.display = "inline-block";
  }
  return true;
}

function atras() {
  if (window.history.length > 1) window.history.back();
  else window.location.href = "visor.html";
}
async function logout() { await client.auth.signOut(); window.location.href = "index.html"; }

async function mensajeError(error) {
  if (!error) return "";
  if (error.context && typeof error.context.json === "function") {
    try { const b = await error.context.json(); if (b?.error) return typeof b.error === "string" ? b.error : JSON.stringify(b.error); } catch (e) {}
  }
  return error.message || "Error desconocido";
}

async function ffcv(accion, extra = {}) {
  const { data, error } = await client.functions.invoke("ruta-ffcv", { body: { accion, ...extra } });
  if (error) throw new Error(await mensajeError(error));
  if (data && data.error) throw new Error(data.error);
  return data;
}

function normalizarTexto(s) {
  return (s || "").toString().normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
}

// Las ligas se agrupan en secciones reales por categoría de edad (de mayor
// a menor), y dentro de cada una, alfabético. Se usa el nombre de categoría
// que da la propia FFCV por competición (categoria_edad_ffcv, p.ej.
// "Querubines") cuando existe, porque es más fiable que adivinar por el
// nombre de la liga: "Escola de Gegants" no menciona ninguna edad en su
// nombre, pero la FFCV la cataloga como "Querubines". Si no hay ese dato
// (liga creada a mano, o pendiente de la próxima importación), se sigue
// adivinando por el nombre de la liga como hasta ahora.
// Las claves de texto están recortadas a la raíz común entre castellano y
// valenciano (la FFCV nombra algunas ligas en valenciano: "Cadet", "Benjamí",
// "Querubí", sin la "e"/"n" final del castellano "Cadete", "Benjamín", "Querubín").
const ORDEN_EDAD_LIGAS = ["AMATEUR", "JUVENIL", "CADETE", "INFANTIL", "ALEVIN", "BENJAMIN", "PREBENJAMIN", "QUERUBIN"];
const ETIQUETA_EDAD_LIGAS = {
  AMATEUR: "AMATEUR", JUVENIL: "JUVENILES", CADETE: "CADETES", INFANTIL: "INFANTILES",
  ALEVIN: "ALEVINES", BENJAMIN: "BENJAMINES", PREBENJAMIN: "PREBENJAMINES", QUERUBIN: "QUERUBINES"
};
function edadDeLiga(nombreLiga, categoriaEdadFfcv) {
  const nombreN = normalizarTexto(nombreLiga);
  if (nombreN.includes("gegant")) return "QUERUBIN"; // "Escola de Gegants" (F5) = Querubines
  const n = normalizarTexto(categoriaEdadFfcv) || nombreN;
  if (n.includes("querubi")) return "QUERUBIN";
  if (n.includes("prebenjami")) return "PREBENJAMIN";
  if (n.includes("benjami")) return "BENJAMIN";
  if (n.includes("alevi")) return "ALEVIN";
  if (n.includes("infantil")) return "INFANTIL";
  if (n.includes("cadet")) return "CADETE";
  if (n.includes("juvenil")) return "JUVENIL";
  return "AMATEUR";
}

function cambiarSeccion(nombre) {
  document.getElementById("seccion_horarios").style.display = nombre === "horarios" ? "block" : "none";
  document.getElementById("seccion_ruta").style.display = nombre === "ruta" ? "block" : "none";
  document.getElementById("tab_horarios").classList.toggle("active", nombre === "horarios");
  document.getElementById("tab_ruta").classList.toggle("active", nombre === "ruta");
  if (nombre === "ruta") cargarRuta();
}

// ---------------- fechas ----------------
function fechaFfcvAIso(f) { // "23/08/2025" o "23-08-2025" -> "2025-08-23"
  const m = (f || "").match(/^(\d{2})[\/\-](\d{2})[\/\-](\d{4})$/);
  return m ? `${m[3]}-${m[2]}-${m[1]}` : null;
}
function parseFechaJornada(f) { // "23-08-2025" -> Date (medianoche local)
  const iso = fechaFfcvAIso(f);
  return iso ? new Date(iso + "T00:00:00") : null;
}

// ---------------- HORARIOS ----------------
async function cargarCatalogo() {
  const s = document.getElementById("horarios_status");
  s.textContent = "Cargando competiciones de la FFCV…";
  try {
    catalogo = await ffcv("catalogo");
    const modalidades = [...new Set((catalogo.competiciones || []).map(c => c.modalidad))].sort();
    const sel = document.getElementById("f_modalidad");
    sel.innerHTML = '<option value="">-</option>' + modalidades.map(m => `<option value="${escapeHtml(m)}">${escapeHtml(m)}</option>`).join("");
    s.textContent = catalogo.temporada ? `Temporada ${catalogo.temporada}. Elige modalidad, competición y jornada.` : "No hay competiciones publicadas ahora mismo en la FFCV.";
  } catch (e) { s.textContent = "Error cargando competiciones: " + e.message; }
}

function onModalidadChange() {
  const mod = document.getElementById("f_modalidad").value;
  const sel = document.getElementById("f_competicion");
  const comps = (catalogo.competiciones || []).filter(c => c.modalidad === mod);
  sel.innerHTML = '<option value="">-</option>' + comps.map(c => `<option value="${c.codigo}">${escapeHtml(c.nombre)}</option>`).join("");
  document.getElementById("campo_grupo").style.display = "none";
  document.getElementById("f_jornada").innerHTML = '<option value="">-</option>';
  document.getElementById("horarios_lista").innerHTML = "";
}

async function onCompeticionChange() {
  const codComp = document.getElementById("f_competicion").value;
  const s = document.getElementById("horarios_status");
  document.getElementById("horarios_lista").innerHTML = "";
  document.getElementById("f_jornada").innerHTML = '<option value="">-</option>';
  if (!codComp) return;
  s.textContent = "Cargando grupos…";
  try {
    gruposActuales = (await ffcv("grupos", { cod_competicion: codComp })).grupos || [];
    const campoGrupo = document.getElementById("campo_grupo");
    const selGrupo = document.getElementById("f_grupo");
    if (gruposActuales.length > 1) {
      selGrupo.innerHTML = gruposActuales.map(g => `<option value="${g.codigo}">${escapeHtml(g.nombre)}</option>`).join("");
      campoGrupo.style.display = "block";
    } else {
      campoGrupo.style.display = "none";
    }
    await cargarJornadas();
  } catch (e) { s.textContent = "Error cargando grupos: " + e.message; }
}

function grupoSeleccionado() {
  if (!gruposActuales.length) return null;
  if (gruposActuales.length === 1) return gruposActuales[0];
  const cod = document.getElementById("f_grupo").value;
  return gruposActuales.find(g => g.codigo === cod) || gruposActuales[0];
}

async function cargarJornadas() {
  const codComp = document.getElementById("f_competicion").value;
  const g = grupoSeleccionado();
  const s = document.getElementById("horarios_status");
  const sel = document.getElementById("f_jornada");
  if (!codComp || !g) return;
  s.textContent = "Cargando jornadas…";
  try {
    const jornadas = (await ffcv("jornadas", { cod_competicion: codComp, cod_grupo: g.codigo })).jornadas || [];
    if (!jornadas.length) { sel.innerHTML = '<option value="">-</option>'; s.textContent = "Esta competición aún no tiene jornadas publicadas."; return; }
    sel.innerHTML = jornadas.map(j => {
      const fecha = j.fecha ? " · " + j.fecha.replace(/-/g, "/") : "";
      return `<option value="${escapeHtml(j.codjornada)}">Jornada ${escapeHtml(j.codjornada)}${fecha}</option>`;
    }).join("");
    // precargar la próxima jornada disponible (primera cuya fecha es hoy o futura)
    const hoy = new Date(); hoy.setHours(0, 0, 0, 0);
    let idx = jornadas.findIndex(j => { const f = parseFechaJornada(j.fecha); return f && f >= hoy; });
    if (idx < 0) idx = jornadas.length - 1;
    sel.value = jornadas[idx].codjornada;
    s.textContent = "";
    await cargarPartidos();
  } catch (e) { s.textContent = "Error cargando jornadas: " + e.message; }
}

async function onGrupoChange() {
  document.getElementById("horarios_lista").innerHTML = "";
  await cargarJornadas();
}

async function cargarPartidos() {
  const codComp = document.getElementById("f_competicion").value;
  const jornada = document.getElementById("f_jornada").value;
  const g = grupoSeleccionado();
  const cont = document.getElementById("horarios_lista");
  const s = document.getElementById("horarios_status");
  if (!codComp || !g || !jornada) { cont.innerHTML = ""; return; }
  s.textContent = "Cargando partidos…";
  cont.innerHTML = "";
  try {
    const d = await ffcv("partidos", {
      cod_temporada: catalogo.cod_temporada, cod_competicion: codComp, cod_grupo: g.codigo, cod_jornada: jornada
    });
    const partidos = d.partidos || [];
    if (!partidos.length) { s.textContent = "No hay partidos en esta jornada."; return; }
    s.textContent = "";
    const modalidad = document.getElementById("f_modalidad").value;
    const nombreComp = document.getElementById("f_competicion").selectedOptions[0]?.textContent || "";
    cont.innerHTML = "";
    partidos.forEach(p => {
      const div = document.createElement("div");
      div.className = "partido";
      const centro = p.jugado
        ? `<span class="resultado">${escapeHtml(p.resultado)}</span>`
        : `<span style="color:var(--muted);font-weight:400;">vs</span>`;
      div.innerHTML =
        `<div class="equipos">${escapeHtml(p.local)} ${centro} ${escapeHtml(p.visitante)}</div>` +
        `<div class="meta">${escapeHtml(p.fecha || "")} ${escapeHtml(p.hora || "")}${p.campo ? " · " + escapeHtml(p.campo) : ""}</div>`;
      const btnVer = document.createElement("button");
      btnVer.className = "secondary";
      btnVer.style.cssText = "font-size:12px;padding:6px 10px;";
      btnVer.textContent = "Ver partido";
      btnVer.onclick = () => abrirVerPartido(p, modalidad, nombreComp, g, codComp, jornada);
      const btnRuta = document.createElement("button");
      btnRuta.className = "secondary";
      btnRuta.style.cssText = "font-size:12px;padding:6px 10px;";
      btnRuta.textContent = "+ A mi ruta";
      btnRuta.onclick = () => abrirModalObjetivos(p, modalidad, nombreComp, g, codComp, jornada);
      div.appendChild(btnVer);
      div.appendChild(btnRuta);
      cont.appendChild(div);
    });
  } catch (e) { s.textContent = "Error cargando partidos: " + e.message; }
}

// ---------------- Buscar por campo (todas las categorías/ligas activas) ----------------
// A diferencia de los filtros de arriba (una competición+grupo+jornada a
// la vez), esto consulta la tabla ruta_partidos_activos, que un cron
// mantiene actualizada recorriendo las ~726 grupos F11/F8 en segundo
// plano (ver ruta/8_funcion_ruta_refrescar_activos.ts) — recorrerlos en
// caliente en cada búsqueda tarda varios minutos, así que no es viable.
let modoHorarios = "competicion";

function cambiarModoHorarios(modo) {
  modoHorarios = modo;
  document.getElementById("modo_competicion").classList.toggle("active", modo === "competicion");
  document.getElementById("modo_campo").classList.toggle("active", modo === "campo");
  document.getElementById("bloque_competicion").style.display = modo === "competicion" ? "block" : "none";
  document.getElementById("bloque_campo").style.display = modo === "campo" ? "block" : "none";
  document.getElementById("horarios_lista").innerHTML = "";
  document.getElementById("horarios_status").textContent = "";
  document.getElementById("campo_selector_instalaciones").innerHTML = "";
  document.getElementById("campo_resultados_dia").innerHTML = "";
}

let busquedaCampoTimeout = null;
function onBuscarCampoInput() {
  clearTimeout(busquedaCampoTimeout);
  busquedaCampoTimeout = setTimeout(buscarPorCampo, 300);
}

// Flujo: 1) buscar por texto (+ modalidad opcional) -> 2) si hay varias
// instalaciones distintas que coinciden, elegir una -> 3) ver sus partidos
// agrupados por día, empezando por los próximos 7 días (puede haber
// 40-50 partidos en un mismo campo en un fin de semana con varios subcampos).
let campoBusquedaResultados = [];
let campoSeleccionado = null;   // { claves: Set<string>, etiqueta }
let campoMostrarTodos = false;

async function buscarPorCampo() {
  const termino = document.getElementById("f_campo_busqueda").value.trim();
  const modalidad = document.getElementById("f_campo_modalidad").value;
  const selectorCont = document.getElementById("campo_selector_instalaciones");
  const resultadosCont = document.getElementById("campo_resultados_dia");
  const s = document.getElementById("horarios_status");

  campoSeleccionado = null;
  campoMostrarTodos = false;
  resultadosCont.innerHTML = "";

  if (termino.length < 2) {
    selectorCont.innerHTML = "";
    s.textContent = termino.length ? "Escribe al menos 2 letras." : "";
    return;
  }

  s.textContent = "Buscando...";
  const terminoNorm = normalizarTexto(termino);
  let query = client.from("ruta_partidos_activos").select("*").ilike("campo_normalizado", `%${terminoNorm}%`);
  if (modalidad) query = query.eq("modalidad", modalidad);
  const { data, error } = await query.order("fecha", { ascending: true }).order("hora", { ascending: true }).limit(500);

  if (error) { s.textContent = "Error buscando: " + error.message; selectorCont.innerHTML = ""; return; }
  campoBusquedaResultados = data || [];
  if (!campoBusquedaResultados.length) { s.textContent = `Sin partidos en campos que coincidan con "${termino}".`; selectorCont.innerHTML = ""; return; }
  s.textContent = "";

  const instalaciones = agruparInstalaciones(campoBusquedaResultados);
  if (instalaciones.size === 1) {
    const [, info] = [...instalaciones.entries()][0];
    seleccionarInstalacion(info.claves, info.etiqueta);
    return;
  }
  renderSelectorInstalaciones(instalaciones);
}

// Quita el sufijo de subcampo del texto ORIGINAL (con mayúsculas/acentos,
// a diferencia de campo_normalizado) para mostrar un nombre limpio de la
// instalación, sin dar a entender que es un campo/subcampo concreto.
function nombreInstalacion(campo) {
  let t = (campo || "").trim();
  t = t.replace(/\bf-?\d+(-\d+)?\b/gi, " ");
  t = t.replace(/\bcampo\s+(?!de\b|del\b|la\b|el\b|los\b|las\b|en\b)[a-z0-9]{1,3}\b/gi, " ");
  return t.replace(/\s+/g, " ").trim();
}

// Agrupa primero por campo_normalizado exacto, y luego fusiona claves
// donde una es prefijo de la otra: la propia FFCV no escribe el nombre
// de una instalación siempre igual (p.ej. "... Castellón" en un partido
// y "... Castellon de la Plana" en otro del mismo campo), así que exigir
// coincidencia exacta deja instalaciones idénticas separadas.
function agruparInstalaciones(filas) {
  const porClave = new Map();
  filas.forEach(fila => {
    const clave = fila.campo_normalizado || "";
    if (!porClave.has(clave)) porClave.set(clave, []);
    porClave.get(clave).push(fila);
  });

  const claves = [...porClave.keys()].sort((a, b) => a.length - b.length);
  const fusionadas = new Set();
  const resultado = new Map();

  claves.forEach(clave => {
    if (fusionadas.has(clave)) return;
    const clavesGrupo = new Set([clave]);
    let filasGrupo = [...porClave.get(clave)];

    claves.forEach(otra => {
      if (otra === clave || fusionadas.has(otra)) return;
      const relacionadas = clave.length >= 6 && (otra.startsWith(clave) || clave.startsWith(otra));
      if (relacionadas) {
        clavesGrupo.add(otra);
        filasGrupo = filasGrupo.concat(porClave.get(otra));
        fusionadas.add(otra);
      }
    });

    fusionadas.add(clave);
    resultado.set(clave, { claves: clavesGrupo, etiqueta: nombreInstalacion(filasGrupo[0].campo) || "(sin nombre)", count: filasGrupo.length });
  });

  return resultado;
}

function renderSelectorInstalaciones(instalaciones) {
  const cont = document.getElementById("campo_selector_instalaciones");
  cont.innerHTML = `<p class="meta" style="margin:8px 0;">${instalaciones.size} instalaciones encontradas — elige una:</p>`;
  [...instalaciones.entries()]
    .sort((a, b) => b[1].count - a[1].count)
    .forEach(([, info]) => {
      const div = document.createElement("div");
      div.className = "partido partido-clic";
      div.innerHTML = `<div class="equipos">${escapeHtml(info.etiqueta)}</div><div class="meta">${info.count} partido${info.count === 1 ? "" : "s"}</div>`;
      div.onclick = () => seleccionarInstalacion(info.claves, info.etiqueta);
      cont.appendChild(div);
    });
}

function seleccionarInstalacion(claves, etiqueta) {
  campoSeleccionado = { claves, etiqueta };
  campoMostrarTodos = false;
  document.getElementById("campo_selector_instalaciones").innerHTML = "";
  renderResultadosCampo();
}

function volverASelectorCampos() {
  campoSeleccionado = null;
  document.getElementById("campo_resultados_dia").innerHTML = "";
  renderSelectorInstalaciones(agruparInstalaciones(campoBusquedaResultados));
}

function diasDesdeHoy(fechaIso) {
  if (!fechaIso) return null;
  const hoy = new Date(); hoy.setHours(0, 0, 0, 0);
  const f = new Date(fechaIso + "T00:00:00");
  return Math.round((f - hoy) / 86400000);
}

function etiquetaDia(fechaIso) {
  const dias = diasDesdeHoy(fechaIso);
  const f = new Date(fechaIso + "T00:00:00");
  const diasSemana = ["Domingo", "Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado"];
  const fechaCorta = f.toLocaleDateString("es-ES", { day: "2-digit", month: "2-digit" });
  if (dias === 0) return `Hoy · ${fechaCorta}`;
  if (dias === 1) return `Mañana · ${fechaCorta}`;
  return `${diasSemana[f.getDay()]} ${fechaCorta}`;
}

function renderResultadosCampo() {
  const cont = document.getElementById("campo_resultados_dia");
  if (!campoSeleccionado) { cont.innerHTML = ""; return; }

  const filas = campoBusquedaResultados.filter(f => campoSeleccionado.claves.has(f.campo_normalizado || ""));
  const proximos = filas.filter(f => { const d = diasDesdeHoy(f.fecha); return d !== null && d >= 0 && d <= 6; });
  const restoCount = filas.length - proximos.length;
  const mostrar = campoMostrarTodos ? filas : proximos;

  cont.innerHTML = `<div class="fila-flex" style="justify-content:space-between;margin:14px 0 6px;">
    <b>${escapeHtml(campoSeleccionado.etiqueta)}</b>
    <a onclick="volverASelectorCampos()" style="cursor:pointer;color:var(--primary);font-size:13px;">← Elegir otro campo</a>
  </div>`;

  if (!mostrar.length) {
    cont.insertAdjacentHTML("beforeend", `<p class="vacio">${campoMostrarTodos ? "Sin partidos." : "Sin partidos en los próximos 7 días en este campo."}</p>`);
  } else {
    let diaActual = null;
    mostrar.forEach(fila => {
      if (fila.fecha !== diaActual) {
        diaActual = fila.fecha;
        cont.insertAdjacentHTML("beforeend", `<div class="grupo-tit" style="margin-top:14px;">${escapeHtml(etiquetaDia(fila.fecha))}</div>`);
      }
      cont.appendChild(crearFilaPartidoActivo(fila));
    });
  }

  if (!campoMostrarTodos && restoCount > 0) {
    const btn = document.createElement("button");
    btn.className = "secondary";
    btn.style.cssText = "margin-top:12px;font-size:13px;";
    btn.textContent = `Ver también ${restoCount} partido${restoCount === 1 ? "" : "s"} fuera de los próximos 7 días`;
    btn.onclick = () => { campoMostrarTodos = true; renderResultadosCampo(); };
    cont.appendChild(btn);
  }
}

// abrirVerPartido/abrirModalObjetivos esperan la forma de "partidos" (fecha
// en DD/MM/YYYY, como la da la FFCV en vivo), no la de la tabla.
function crearFilaPartidoActivo(fila) {
  const div = document.createElement("div");
  div.className = "partido";
  const centro = fila.jugado
    ? `<span class="resultado">${escapeHtml(fila.resultado || "")}</span>`
    : `<span style="color:var(--muted);font-weight:400;">vs</span>`;
  const chipTexto = [fila.modalidad, fila.competicion_nombre].filter(Boolean).join(" · ");
  div.innerHTML =
    `<div class="equipos">${escapeHtml(fila.local)} ${centro} ${escapeHtml(fila.visitante)}` +
    (chipTexto ? ` <span class="chip">${escapeHtml(chipTexto)}</span>` : "") + `</div>` +
    `<div class="meta">${fila.hora ? fila.hora.slice(0, 5) : ""}${fila.campo ? " · " + escapeHtml(fila.campo) : ""}</div>`;

  const pAdaptado = {
    cod_partido: fila.cod_partido, local: fila.local, visitante: fila.visitante,
    cod_equipo_local: fila.cod_equipo_local, cod_equipo_visitante: fila.cod_equipo_visitante,
    escudo_local: fila.escudo_local, escudo_visitante: fila.escudo_visitante,
    fecha: fila.fecha ? fila.fecha.split("-").reverse().join("/") : "",
    hora: fila.hora, campo: fila.campo, resultado: fila.resultado, jugado: fila.jugado,
  };
  const grupoAdaptado = { codigo: fila.grupo_codigo, nombre: fila.grupo_nombre };

  const btnVer = document.createElement("button");
  btnVer.className = "secondary";
  btnVer.style.cssText = "font-size:12px;padding:6px 10px;";
  btnVer.textContent = "Ver partido";
  btnVer.onclick = () => abrirVerPartido(pAdaptado, fila.modalidad, fila.competicion_nombre, grupoAdaptado, fila.competicion_codigo, fila.jornada);

  const btnRuta = document.createElement("button");
  btnRuta.className = "secondary";
  btnRuta.style.cssText = "font-size:12px;padding:6px 10px;";
  btnRuta.textContent = "+ A mi ruta";
  btnRuta.onclick = () => abrirModalObjetivos(pAdaptado, fila.modalidad, fila.competicion_nombre, grupoAdaptado, fila.competicion_codigo, fila.jornada);

  div.appendChild(btnVer);
  div.appendChild(btnRuta);
  return div;
}

// ---------------- Ver partido (previa con plantillas, o acta si ya acabó) ----------------
// A diferencia de "Mi ruta", aquí no hay ninguna fila guardada en la BD:
// es solo una consulta de lectura a la FFCV, así que no hay checkboxes de
// titular ni nada que se pueda editar/guardar.
let verPartidoActual = null;   // contexto del último "Ver partido" abierto, para poder reintentar sin volver a serializar nada

async function abrirVerPartido(p, modalidad, nombreComp, grupo, codComp, jornada) {
  verPartidoActual = { p, modalidad, nombreComp, grupo, codComp, jornada };

  document.getElementById("vp_titulo").textContent = `${p.local} vs ${p.visitante}`;
  document.getElementById("vp_meta").textContent =
    [p.fecha, p.hora, p.campo, modalidad, nombreComp, grupo?.nombre].filter(Boolean).join(" · ") +
    (p.jugado ? " · Resultado: " + p.resultado : "");
  document.getElementById("vp_contenido").innerHTML = '<p class="status">Cargando plantillas…</p>';
  document.getElementById("modal_ver_partido").style.display = "flex";

  if (!p.cod_equipo_local && !p.cod_equipo_visitante) {
    document.getElementById("vp_contenido").innerHTML = '<p class="vacio">Este partido no tiene equipos de la FFCV enlazados, así que no hay plantilla disponible.</p>';
    return;
  }

  try {
    const d = await ffcv("detalle_partido", {
      cod_partido: p.cod_partido,
      cod_equipo_local: p.cod_equipo_local, cod_equipo_visitante: p.cod_equipo_visitante,
      cod_temporada: catalogo.cod_temporada, cod_competicion: codComp, cod_grupo: grupo.codigo, cod_jornada: jornada,
    });
    document.getElementById("vp_contenido").innerHTML = renderVerPartidoAlineaciones(d, p.local, p.visitante);
  } catch (e) {
    document.getElementById("vp_contenido").innerHTML =
      `<p class="status">Error cargando plantillas: ${escapeHtml(e.message)}</p>` +
      `<button class="secondary" onclick="reintentarVerPartido()">Reintentar</button>`;
  }
}

function reintentarVerPartido() {
  if (!verPartidoActual) return;
  const { p, modalidad, nombreComp, grupo, codComp, jornada } = verPartidoActual;
  abrirVerPartido(p, modalidad, nombreComp, grupo, codComp, jornada);
}

function cerrarVerPartido() {
  document.getElementById("modal_ver_partido").style.display = "none";
  verPartidoActual = null;
}

function renderVerPartidoAlineaciones(d, localNombre, visitanteNombre) {
  const fuenteTxt = d.fuente === "acta"
    ? (d.cerrada ? "Alineaciones del acta (partido finalizado)." : "🔴 Alineación en directo del acta (subida por el club).")
    : "Plantilla de cada equipo (todavía no hay alineación confirmada para este partido).";

  const filaJug = (j) => `<div class="jug-fila ${j.titular ? "es-titular" : ""}">
    <span class="dorsal">${escapeHtml(j.dorsal || "-")}</span>
    <span class="nombre">${escapeHtml(j.nombre)}${j.capitan ? " ©" : ""}${j.portero ? " 🧤" : ""}</span>
  </div>`;

  const columna = (titulo, jugadores, esquema) => {
    const lista = (jugadores || []).slice().sort((a, b) => dorsalNum(a.dorsal) - dorsalNum(b.dorsal));
    const cab = `<h4>${escapeHtml(titulo)}${esquema ? ` <span style="color:var(--muted);font-weight:400;">${escapeHtml(esquema)}</span>` : ""}</h4>`;

    if (d.fuente === "acta") {
      const titulares = lista.filter(j => j.titular);
      const suplentes = lista.filter(j => !j.titular);
      return `<div class="alin-col">${cab}
        <div class="grupo-tit">Titulares (${titulares.length})</div>
        ${titulares.map(filaJug).join("") || '<p style="color:var(--muted);font-size:12px;margin:4px 0;">—</p>'}
        <div class="grupo-tit">Suplentes (${suplentes.length})</div>
        ${suplentes.map(filaJug).join("") || '<p style="color:var(--muted);font-size:12px;margin:4px 0;">—</p>'}
      </div>`;
    }
    return `<div class="alin-col">${cab}
      <div class="grupo-tit">Plantilla (${lista.length})</div>
      ${lista.map(filaJug).join("") || '<p style="color:var(--muted);font-size:12px;margin:4px 0;">Sin datos de plantilla.</p>'}
    </div>`;
  };

  return `<p class="status" style="margin:0 0 10px;">${fuenteTxt}</p>
    <div class="alineaciones">
      ${columna(localNombre, d.jugadores_local, d.esquema_local)}
      ${columna(visitanteNombre, d.jugadores_visitante, d.esquema_visitante)}
    </div>`;
}

// ---------------- añadir desde Horarios (con objetivos) ----------------
function abrirModalObjetivos(p, modalidad, nombreComp, grupo, codComp, jornada) {
  partidoPendiente = {
    club_id: miClubId,
    cod_partido: p.cod_partido,
    es_manual: false,
    cod_equipo_local: p.cod_equipo_local || null,
    cod_equipo_visitante: p.cod_equipo_visitante || null,
    local: p.local, visitante: p.visitante,
    escudo_local: p.escudo_local || null, escudo_visitante: p.escudo_visitante || null,
    fecha: fechaFfcvAIso(p.fecha), hora: p.hora || null, campo: p.campo || null,
    competicion: nombreComp || null, categoria: modalidad || null, grupo: grupo.nombre || null,
    alineacion: { ctx: { cod_temporada: catalogo.cod_temporada, cod_competicion: codComp, cod_grupo: grupo.codigo, cod_jornada: jornada } }
  };
  document.getElementById("mo_partido").textContent = `${p.local} vs ${p.visitante}`;
  document.getElementById("mo_objetivos").value = "";
  document.getElementById("mo_status").textContent = "";
  document.getElementById("modal_objetivos").style.display = "flex";
}
function cerrarModalObjetivos() { document.getElementById("modal_objetivos").style.display = "none"; partidoPendiente = null; }

async function confirmarAnadirRuta() {
  if (!partidoPendiente) return;
  const btn = document.getElementById("mo_btn");
  const s = document.getElementById("mo_status");
  btn.disabled = true;
  const registro = { ...partidoPendiente, objetivos: document.getElementById("mo_objetivos").value.trim() || null };
  const { error } = await client.from("ruta_partidos").insert(registro);
  btn.disabled = false;
  if (error) {
    s.textContent = /duplicate|unique|23505/i.test(error.message) ? "Ese partido ya está en tu ruta." : "Error: " + error.message;
    return;
  }
  cerrarModalObjetivos();
  document.getElementById("horarios_status").textContent = "Añadido a tu ruta.";
}

// ---------------- MI RUTA ----------------
const puedeVerTodas = () => esAdmin || esClubAdmin;

async function cargarRuta() {
  document.getElementById("ruta_lista_wrap").style.display = "block";
  document.getElementById("ruta_detalle").style.display = "none";
  document.getElementById("ruta_titulo").textContent = puedeVerTodas() ? "Partidos del club" : "Mis partidos";

  // La RLS decide qué filas llegan: el ojeador ve solo las suyas; el admin del
  // club (o global) ve las de todos sus ojeadores.
  const { data, error } = await client.from("ruta_partidos").select("*")
    .order("fecha", { ascending: true, nullsFirst: false }).order("hora", { ascending: true, nullsFirst: true });
  if (error) { document.getElementById("ruta_lista").innerHTML = `<p class="vacio">Error: ${escapeHtml(error.message)}</p>`; return; }
  rutaCache = data || [];

  // Nombres de cada ojeador (para mostrarlos y para el filtro).
  ojeadorNombre = {};
  const userIds = [...new Set(rutaCache.map(r => r.user_id).filter(Boolean))];
  if (userIds.length) {
    const { data: profs } = await client.from("profiles").select("id, nombre, username").in("id", userIds);
    (profs || []).forEach(p => { ojeadorNombre[p.id] = p.nombre || p.username || "Ojeador"; });
  }
  if (miUserId) ojeadorNombre[miUserId] = ojeadorNombre[miUserId] || miNombre || "Yo";

  // Filtro por ojeador (solo para quien puede ver las de todos).
  const sel = document.getElementById("filtro_ojeador");
  if (puedeVerTodas() && userIds.length > 1) {
    const previo = sel.value;
    sel.style.display = "";
    sel.innerHTML = '<option value="">Todos los ojeadores</option>' +
      userIds.map(id => `<option value="${id}">${escapeHtml(ojeadorNombre[id] || "Ojeador")}</option>`).join("");
    if ([...sel.options].some(o => o.value === previo)) sel.value = previo;
  } else {
    sel.style.display = "none";
    sel.innerHTML = "";
  }

  renderRuta();
}

function renderRuta() {
  const cont = document.getElementById("ruta_lista");
  const filtro = document.getElementById("filtro_ojeador").value;
  const filas = filtro ? rutaCache.filter(r => r.user_id === filtro) : rutaCache;

  cont.className = "";
  if (!filas.length) {
    cont.innerHTML = `<p class="vacio">${rutaCache.length ? "Ningún partido para ese ojeador." : "Aún no hay partidos en la ruta. Añádelos desde Horarios o crea uno manual."}</p>`;
    return;
  }

  const escudo = (url) => url ? `<img class="rt-escudo" src="${escapeHtml(url)}" onerror="this.style.visibility='hidden';">` : "";

  const filasHtml = filas.map(rp => {
    const fecha = rp.fecha ? new Date(rp.fecha + "T00:00:00").toLocaleDateString("es-ES") : "—";
    const partido =
      `${escapeHtml(rp.local || "")}${escudo(rp.escudo_local)}<span class="rt-vs">vs</span>${escudo(rp.escudo_visitante)}${escapeHtml(rp.visitante || "")}` +
      (rp.es_manual ? ' <span class="badge-fuente">manual</span>' : "");
    const esMio = !miUserId || rp.user_id === miUserId;
    return `<tr onclick="abrirDetalle('${rp.id}')">
      <td class="rt-centro" style="white-space:nowrap;">
        <button class="secondary" style="font-size:12px;padding:5px 12px;" onclick="event.stopPropagation();abrirDetalle('${rp.id}')">Abrir</button>
        ${esMio ? `<button class="danger" style="font-size:12px;padding:5px 12px;margin-left:6px;" onclick="event.stopPropagation();eliminarPartido('${rp.id}')">Eliminar</button>` : ""}
      </td>
      <td>${escapeHtml(ojeadorNombre[rp.user_id] || miNombre || "—")}</td>
      <td>${fecha}</td>
      <td>${escapeHtml(rp.hora || "—")}</td>
      <td class="rt-partido">${partido}</td>
      <td>${escapeHtml(rp.campo || "—")}</td>
      <td>${escapeHtml(rp.competicion || "—")}</td>
      <td>${escapeHtml(rp.grupo || "—")}</td>
      <td class="rt-obj" title="${escapeHtml(rp.objetivos || "")}">${escapeHtml(rp.objetivos || "—")}</td>
    </tr>`;
  }).join("");

  cont.innerHTML =
    `<div class="ruta-tabla-wrap"><table class="ruta-tabla">
      <thead><tr>
        <th>Acciones</th><th>Ojeador</th><th>Fecha</th><th>Hora</th><th>Partido</th>
        <th>Campo</th><th>Liga</th><th>Grupo</th><th>Objetivos</th>
      </tr></thead>
      <tbody>${filasHtml}</tbody>
    </table></div>`;
}

let detalleActual = null;
let detalleAlineacion = null;   // { fuente, jugadores_local, jugadores_visitante, mapaId, mapaAnio }

async function abrirDetalle(id, autoAlineacion = false) {
  const { data: rp, error } = await client.from("ruta_partidos").select("*").eq("id", id).single();
  if (error || !rp) return;
  detalleActual = rp;
  detalleAlineacion = null;

  // Si el admin abre la ruta de OTRO ojeador, es solo lectura (la RLS no le
  // deja escribir): se ocultan editar/eliminar y se marca de quién es.
  const soloLectura = !!(rp.user_id && miUserId && rp.user_id !== miUserId);
  detalleActual.soloLectura = soloLectura;

  document.getElementById("ruta_lista_wrap").style.display = "none";
  const cont = document.getElementById("ruta_detalle");
  cont.style.display = "block";
  const fecha = rp.fecha ? new Date(rp.fecha + "T00:00:00").toLocaleDateString("es-ES") : "Sin fecha";
  const linea2 = [fecha + (rp.hora ? " · " + rp.hora : ""), rp.campo, rp.categoria, rp.competicion, rp.grupo].filter(Boolean).map(escapeHtml).join(" · ");
  const volverTxt = puedeVerTodas() ? "← Volver a los partidos" : "← Volver a mi ruta";

  cont.innerHTML = `
    <div class="detalle-cab">
      <button class="secondary" onclick="cargarRuta()">${volverTxt}</button>
      ${soloLectura ? "" : `<button class="danger" style="font-size:12px;padding:6px 12px;" onclick="eliminarPartido('${rp.id}')">Eliminar partido</button>`}
    </div>
    <h2 style="margin:0 0 2px;">${escapeHtml(rp.local || "")} vs ${escapeHtml(rp.visitante || "")}</h2>
    <p style="color:var(--muted);font-size:13px;margin:0 0 6px;">${linea2}</p>
    ${soloLectura ? `<p style="color:var(--muted);font-size:12px;margin:0 0 6px;">👤 Ruta de ${escapeHtml(ojeadorNombre[rp.user_id] || "otro ojeador")} · solo lectura</p>` : ""}

    <label>Objetivos del partido <span style="color:var(--muted);">(¿por qué vas?)</span></label>
    <textarea id="d_objetivos" style="width:100%;min-height:70px;" ${soloLectura ? "disabled" : ""} oninput="guardarObjetivosDebounced()">${escapeHtml(rp.objetivos || "")}</textarea>
    <p id="d_objetivos_status" style="font-size:12px;color:var(--muted);margin:4px 0 0;"></p>

    <div id="d_alineaciones_wrap" style="margin-top:14px;">
      ${(rp.cod_equipo_local || rp.cod_equipo_visitante)
        ? '<button class="secondary" onclick="cargarAlineaciones()">Ver plantillas y titulares</button>'
        : '<p class="vacio">Este partido no tiene equipos de la FFCV enlazados, así que no hay plantilla.</p>'}
    </div>
  `;
  if (autoAlineacion && (rp.cod_equipo_local || rp.cod_equipo_visitante)) cargarAlineaciones();
}

let objetivosTimeout = null;
function guardarObjetivosDebounced() {
  clearTimeout(objetivosTimeout);
  objetivosTimeout = setTimeout(guardarObjetivos, 600);
}
async function guardarObjetivos() {
  if (!detalleActual || detalleActual.soloLectura) return;
  const status = document.getElementById("d_objetivos_status");
  const valor = document.getElementById("d_objetivos").value.trim() || null;
  const { error } = await client.from("ruta_partidos").update({ objetivos: valor }).eq("id", detalleActual.id);
  status.textContent = error ? "Error guardando: " + error.message : "Guardado.";
  detalleActual.objetivos = valor;
}

async function cargarAlineaciones(refrescar = false) {
  if (!detalleActual) return;
  const wrap = document.getElementById("d_alineaciones_wrap");
  wrap.innerHTML = '<p class="status">Cargando plantillas… (puede tardar unos segundos)</p>';
  const ctx = (detalleActual.alineacion && detalleActual.alineacion.ctx) || {};
  try {
    const d = await ffcv("detalle_partido", {
      cod_partido: detalleActual.cod_partido,
      cod_equipo_local: detalleActual.cod_equipo_local, cod_equipo_visitante: detalleActual.cod_equipo_visitante,
      cod_temporada: ctx.cod_temporada, cod_competicion: ctx.cod_competicion, cod_grupo: ctx.cod_grupo, cod_jornada: ctx.cod_jornada,
      refrescar,
    });
    // resolver qué codjugadores existen en nuestra base (para enlazar Informes,
    // sacar el año, y el nombre completo real — la FFCV a veces da en el acta
    // el nombre deportivo corto, p.ej. "Navarro" en vez de "NAVARRO PÉREZ,
    // JAVIER"; si el jugador ya está importado, usamos nuestro nombre bueno).
    const todos = [...(d.jugadores_local || []), ...(d.jugadores_visitante || [])].map(j => j.codjugador).filter(Boolean);
    const mapaId = {}, mapaAnio = {}, mapaNombre = {};
    if (todos.length) {
      const { data: jugs } = await client.from("jugadores").select("id, cod_ffcv, fecha_nacimiento, nombre").in("cod_ffcv", todos);
      (jugs || []).forEach(j => {
        mapaId[j.cod_ffcv] = j.id;
        if (j.fecha_nacimiento) mapaAnio[j.cod_ffcv] = new Date(j.fecha_nacimiento).getFullYear();
        if (j.nombre) mapaNombre[j.cod_ffcv] = j.nombre;
      });
    }
    detalleAlineacion = { ...d, mapaId, mapaAnio, mapaNombre };
    renderAlineaciones();
  } catch (e) {
    wrap.innerHTML = `<p class="status">Error cargando plantillas: ${escapeHtml(e.message)}</p><button class="secondary" onclick="cargarAlineaciones()">Reintentar</button>`;
  }
}

function dorsalNum(d) { const n = parseInt(d, 10); return isNaN(n) ? 9999 : n; }

function esTitular(lado, j) {
  const m = (detalleActual.alineacion && detalleActual.alineacion.marcas && detalleActual.alineacion.marcas[lado]) || {};
  if (Object.prototype.hasOwnProperty.call(m, j.codjugador)) return !!m[j.codjugador];
  // sin marca del ojeador: si el acta ya trae titulares reales, se respetan; si es plantilla, nadie es titular
  return detalleAlineacion.fuente === "acta" ? !!j.titular : false;
}

function renderAlineaciones() {
  const d = detalleAlineacion;
  const wrap = document.getElementById("d_alineaciones_wrap");
  const fuenteTxt = d.fuente === "acta"
    ? (d.cerrada ? "Alineaciones del acta (partido finalizado)." : "🔴 Alineación en directo del acta (subida por el club).")
    : "Dorsales precargados del último partido. Marca tú los titulares y subirán arriba.";

  const filaJug = (lado, j) => {
    const tit = esTitular(lado, j);
    const anio = d.mapaAnio[j.codjugador];
    const idJug = d.mapaId[j.codjugador];
    // Preferimos el nombre completo de nuestra base (si ya está importado) al
    // nombre deportivo corto que a veces da el acta de la FFCV.
    const nombre = d.mapaNombre[j.codjugador] || j.nombre;
    const informe = idJug
      ? `<span onclick="abrirInformeModal('${idJug}')" title="Hacer informe" style="cursor:pointer;">📝</span>`
      : `<span title="No está en la base de datos" style="color:var(--border);">📝</span>`;
    return `<div class="jug-fila ${tit ? "es-titular" : ""}">
      <span class="dorsal">${escapeHtml(j.dorsal || "-")}</span>
      <span class="nombre">${escapeHtml(nombre)}${anio ? ` <span class="anio">(${anio})</span>` : ""}${j.capitan ? " ©" : ""}${j.portero ? " 🧤" : ""}</span>
      <label style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted);cursor:pointer;">
        <input type="checkbox" ${tit ? "checked" : ""} ${detalleActual.soloLectura ? "disabled" : ""} onchange="toggleTitular('${lado}','${escapeHtml(j.codjugador)}',this.checked)"> titular
      </label>
      ${informe}
    </div>`;
  };

  const columna = (titulo, jugadores, lado) => {
    const lista = (jugadores || []).slice();
    const titulares = lista.filter(j => esTitular(lado, j)).sort((a, b) => dorsalNum(a.dorsal) - dorsalNum(b.dorsal));
    const suplentes = lista.filter(j => !esTitular(lado, j)).sort((a, b) => dorsalNum(a.dorsal) - dorsalNum(b.dorsal));
    const esquema = d["esquema_" + lado];
    return `<div class="alin-col">
      <h4>${escapeHtml(titulo)}${esquema ? ` <span style="color:var(--muted);font-weight:400;">${escapeHtml(esquema)}</span>` : ""}</h4>
      <div class="grupo-tit">Titulares (${titulares.length})</div>
      ${titulares.map(j => filaJug(lado, j)).join("") || '<p style="color:var(--muted);font-size:12px;margin:4px 0;">Marca abajo quién es titular.</p>'}
      <div class="grupo-tit">Suplentes (${suplentes.length})</div>
      ${suplentes.map(j => filaJug(lado, j)).join("") || '<p style="color:var(--muted);font-size:12px;margin:4px 0;">—</p>'}
    </div>`;
  };

  wrap.innerHTML =
    `<div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;">
       <p class="status" style="margin:0;">${fuenteTxt}</p>
       <button class="secondary" style="font-size:12px;padding:6px 10px;" onclick="cargarAlineaciones(true)">↻ Actualizar (en directo)</button>
     </div>
     <div class="alineaciones">` +
    columna(detalleActual.local || "Local", d.jugadores_local, "local") +
    columna(detalleActual.visitante || "Visitante", d.jugadores_visitante, "visitante") +
    `</div>`;
}

let marcasTimeout = null;
function toggleTitular(lado, codjugador, marcado) {
  if (detalleActual.soloLectura) return;
  if (!detalleActual.alineacion) detalleActual.alineacion = {};
  if (!detalleActual.alineacion.marcas) detalleActual.alineacion.marcas = {};
  if (!detalleActual.alineacion.marcas[lado]) detalleActual.alineacion.marcas[lado] = {};
  detalleActual.alineacion.marcas[lado][codjugador] = marcado;
  renderAlineaciones();
  clearTimeout(marcasTimeout);
  marcasTimeout = setTimeout(guardarMarcas, 500);
}
async function guardarMarcas() {
  if (!detalleActual) return;
  await client.from("ruta_partidos").update({ alineacion: detalleActual.alineacion }).eq("id", detalleActual.id);
}

async function eliminarPartido(id) {
  if (!confirm("¿Eliminar este partido de tu ruta? No se puede deshacer.")) return;
  const { error } = await client.from("ruta_partidos").delete().eq("id", id);
  if (error) { alert("Error eliminando: " + error.message); return; }
  cargarRuta();
}

// El informe se abre en una ventana emergente (la propia página de Informes
// embebida), para no salir del partido — sobre todo en móvil viendo el
// partido en directo. La X cierra y vuelve a las alineaciones.
function abrirInformeModal(jugadorId) {
  // Nombre del jugador para la cabecera del pop-up (la ficha embebida ya no la muestra).
  let nombre = "";
  if (detalleAlineacion) {
    const cod = Object.keys(detalleAlineacion.mapaId || {}).find(c => detalleAlineacion.mapaId[c] === jugadorId);
    const todos = [...(detalleAlineacion.jugadores_local || []), ...(detalleAlineacion.jugadores_visitante || [])];
    const j = cod ? todos.find(x => x.codjugador === cod) : null;
    nombre = cod && detalleAlineacion.mapaNombre[cod] ? detalleAlineacion.mapaNombre[cod] : (j ? j.nombre : "");
  }
  document.getElementById("mi_titulo").textContent = nombre ? "Informe · " + nombre : "Informe del jugador";
  document.getElementById("informe_iframe").src = "jugadores.html?jugador_id=" + encodeURIComponent(jugadorId) + "&modal=1";
  document.getElementById("modal_informe").style.display = "flex";
}
function cerrarInformeModal() {
  document.getElementById("modal_informe").style.display = "none";
  document.getElementById("informe_iframe").src = "about:blank";
}

// ---------------- MODAL MANUAL ----------------
// Para que el partido manual pueda mostrar la plantilla real, primero se
// elige la categoría (edad) y luego se busca el equipo entre los ya
// importados de esa categoría — así queda enlazado a su cod_ffcv real,
// igual que un partido añadido desde Horarios.
let temporadaActivaId = null;
let ligasIdsPorEdadManual = {};       // { CADETE: [ligaId, ...], ... }
let equiposCategoriaManual = [];      // equipos de la categoría elegida

async function abrirModalManual() {
  ["mm_fecha", "mm_hora", "mm_campo", "mm_objetivos", "mm_local_buscar", "mm_visitante_buscar"].forEach(id => document.getElementById(id).value = "");
  document.getElementById("mm_categoria").value = "";
  document.getElementById("mm_equipos_wrap").style.display = "none";
  equiposCategoriaManual = [];
  document.getElementById("mm_local_datalist").innerHTML = "";
  document.getElementById("mm_visitante_datalist").innerHTML = "";
  document.getElementById("mm_status").textContent = "";
  document.getElementById("modal_manual").style.display = "flex";
  await cargarCategoriasManual();
}
function cerrarModalManual() { document.getElementById("modal_manual").style.display = "none"; }

async function cargarCategoriasManual() {
  const sel = document.getElementById("mm_categoria");
  const s = document.getElementById("mm_categoria_status");
  sel.innerHTML = '<option value="">Selecciona categoría…</option>';
  s.textContent = "Cargando categorías…";
  try {
    if (!temporadaActivaId) {
      const { data: temp } = await client.from("temporadas").select("id").eq("activa", true).maybeSingle();
      temporadaActivaId = temp?.id || null;
    }
    if (!temporadaActivaId) { s.textContent = "No hay temporada activa."; return; }

    const { data: cats } = await client.from("categorias").select("id").eq("temporada_id", temporadaActivaId);
    const catIds = (cats || []).map(c => c.id);
    if (!catIds.length) { s.textContent = "No hay categorías en la temporada activa."; return; }

    const { data: ligas } = await client.from("ligas").select("id, nombre, categoria_edad_ffcv").in("categoria_id", catIds);

    ligasIdsPorEdadManual = {};
    (ligas || []).forEach(l => {
      const edad = edadDeLiga(l.nombre, l.categoria_edad_ffcv);
      if (!ligasIdsPorEdadManual[edad]) ligasIdsPorEdadManual[edad] = [];
      ligasIdsPorEdadManual[edad].push(l.id);
    });

    const edadesPresentes = ORDEN_EDAD_LIGAS.filter(e => ligasIdsPorEdadManual[e]?.length);
    sel.innerHTML = '<option value="">Selecciona categoría…</option>' +
      edadesPresentes.map(e => `<option value="${e}">${ETIQUETA_EDAD_LIGAS[e]}</option>`).join("");
    s.textContent = "";
  } catch (e) {
    s.textContent = "Error cargando categorías: " + e.message;
  }
}

async function onCategoriaManualChange() {
  const edad = document.getElementById("mm_categoria").value;
  const wrap = document.getElementById("mm_equipos_wrap");
  const s = document.getElementById("mm_categoria_status");
  document.getElementById("mm_local_buscar").value = "";
  document.getElementById("mm_visitante_buscar").value = "";

  if (!edad) { wrap.style.display = "none"; equiposCategoriaManual = []; return; }

  const ligaIds = ligasIdsPorEdadManual[edad] || [];
  s.textContent = "Cargando equipos…";
  try {
    const { data: grupos } = await client.from("grupos").select("id").in("liga_id", ligaIds);
    const grupoIds = (grupos || []).map(g => g.id);
    if (!grupoIds.length) { equiposCategoriaManual = []; s.textContent = "Sin equipos importados en esta categoría."; wrap.style.display = "block"; return; }

    const equipos = await fetchPorIdsGrupo(grupoIds);
    equiposCategoriaManual = equipos.sort((a, b) => a.nombre.localeCompare(b.nombre));
    poblarDatalistsManual();
    s.textContent = `${equiposCategoriaManual.length} equipos disponibles para buscar. Si no encuentras uno, escribe su nombre igualmente.`;
    wrap.style.display = "block";
  } catch (e) {
    s.textContent = "Error cargando equipos: " + e.message;
    wrap.style.display = "block";
  }
}

// Trocea los grupoIds (por si son muchos) para no generar una URL demasiado larga.
async function fetchPorIdsGrupo(grupoIds) {
  const lotes = [];
  for (let i = 0; i < grupoIds.length; i += 200) lotes.push(grupoIds.slice(i, i + 200));
  const resultados = await Promise.all(lotes.map(lote =>
    client.from("equipos").select("id, nombre, cod_ffcv, escudo_url").in("grupo_id", lote).then(r => r.data || [])));
  return resultados.flat();
}

// Autocompletado nativo del navegador (<datalist>): el navegador se
// encarga de filtrar mientras escribes y de rellenar el campo al elegir
// una sugerencia, sin ningún JavaScript propio de por medio para el
// clic — así no depende de nada que pueda fallar. El equipo elegido se
// resuelve más tarde, al guardar, comparando el texto final con esta
// misma lista por nombre exacto.
function poblarDatalistsManual() {
  const opciones = equiposCategoriaManual.map(e => `<option value="${escapeHtml(e.nombre)}">`).join("");
  document.getElementById("mm_local_datalist").innerHTML = opciones;
  document.getElementById("mm_visitante_datalist").innerHTML = opciones;
}

async function guardarManual() {
  const local = document.getElementById("mm_local_buscar").value.trim();
  const visitante = document.getElementById("mm_visitante_buscar").value.trim();
  const s = document.getElementById("mm_status");
  if (!local || !visitante) { s.textContent = "Pon al menos los dos equipos."; return; }
  const btn = document.getElementById("mm_btn");
  btn.disabled = true;
  const categoriaEdad = document.getElementById("mm_categoria").value;
  const equipoLocal = equiposCategoriaManual.find(e => e.nombre === local);
  const equipoVisitante = equiposCategoriaManual.find(e => e.nombre === visitante);
  const registro = {
    club_id: miClubId, es_manual: true,
    local, visitante,
    categoria: categoriaEdad ? ETIQUETA_EDAD_LIGAS[categoriaEdad] : null,
    cod_equipo_local: equipoLocal?.cod_ffcv || null,
    cod_equipo_visitante: equipoVisitante?.cod_ffcv || null,
    escudo_local: equipoLocal?.escudo_url || null,
    escudo_visitante: equipoVisitante?.escudo_url || null,
    fecha: document.getElementById("mm_fecha").value || null,
    hora: document.getElementById("mm_hora").value || null,
    campo: document.getElementById("mm_campo").value.trim() || null,
    objetivos: document.getElementById("mm_objetivos").value.trim() || null,
  };
  const { error } = await client.from("ruta_partidos").insert(registro);
  btn.disabled = false;
  if (error) { s.textContent = "Error: " + error.message; return; }
  cerrarModalManual();
  cargarRuta();
}

document.addEventListener("DOMContentLoaded", async () => {
  const ok = await protegerPagina();
  if (!ok) return;
  // Si venimos de un informe ("volver al partido"), abrir directamente ese partido.
  const partidoId = new URLSearchParams(window.location.search).get("partido");
  if (partidoId) {
    cambiarSeccion("ruta");
    await abrirDetalle(partidoId, true);
    cargarCatalogo();
    return;
  }
  await cargarCatalogo();
});
</script>
</body>
</html>
