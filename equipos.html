<style>
:root{--primary:#2563eb;--bg:#f5f6fa;--card:#fff;--border:#e2e4eb;--text:#1f2430;--muted:#6b7280;}
*{box-sizing:border-box;}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);}
#topbar{display:flex;justify-content:space-between;align-items:center;padding:14px 24px;background:var(--card);border-bottom:1px solid var(--border);flex-wrap:wrap;gap:10px;}
#topbar .brand{font-weight:700;font-size:18px;color:var(--primary);}
button{background:var(--primary);color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:14px;}
button:hover{opacity:.9;}
button.secondary{background:#fff;color:var(--text);border:1px solid var(--border);}
button.secondary.active{background:#eff6ff;color:var(--primary);border-color:var(--primary);font-weight:700;}
input,select{padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:14px;font-family:inherit;}
.barra{display:flex;gap:10px;align-items:center;flex-wrap:wrap;padding:16px 24px;}
.barra input{flex:1;min-width:220px;max-width:420px;}
.clubes-detectados{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.clubes-detectados .etiqueta{color:var(--muted);font-size:12px;}
.club-pill{padding:6px 12px;border:1px solid var(--border);border-radius:999px;background:#fff;color:var(--text);cursor:pointer;font-size:13px;}
.club-pill:hover{border-color:var(--primary);}
.club-pill.active{background:var(--primary);color:#fff;border-color:var(--primary);}
.seccion-titulo{margin:20px 24px 8px;font-size:13px;font-weight:700;letter-spacing:.04em;color:var(--muted);text-transform:uppercase;}
.seccion-titulo:first-child{margin-top:0;}
.resultados{margin:0 24px 8px;display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;}
.resultado{border:1px solid var(--border);border-radius:8px;padding:10px 12px;background:var(--card);cursor:pointer;}
.resultado:hover{border-color:var(--primary);}
.resultado .nombre{font-weight:600;font-size:14px;}
.resultado .meta{color:var(--muted);font-size:12px;margin-top:2px;}
.aviso{margin:24px;color:var(--muted);font-size:14px;}
.detalle-cab{display:flex;align-items:center;flex-wrap:wrap;gap:14px;margin:16px 24px;}
.detalle-cab h2{margin:0 0 4px;font-size:20px;}
.detalle-cab p{margin:0;color:var(--muted);font-size:13px;}
.escudo{width:56px;height:56px;object-fit:contain;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:4px;}
.tabla-scroll{margin:0 24px 24px;overflow-x:auto;}
.badge{display:inline-block;font-size:10px;font-weight:700;text-transform:uppercase;padding:2px 7px;border-radius:4px;}
.badge-descartar{background:#fee2e2;color:#b91c1c;}
.badge-seguir{background:#f1f5f9;color:#475569;}
.badge-interesante{background:#fef3c7;color:#a8791f;}
.badge-firmar{background:#dbeafe;color:#1d4ed8;}
.badge-firmado{background:#dcfce7;color:#15803d;}
@media (max-width:700px){
  #topbar{padding:12px 16px;}
  .barra{padding:12px;}
  .resultados{margin:0 12px 8px;}
  .seccion-titulo{margin:16px 12px 6px;}
  .detalle-cab,.tabla-scroll{margin-left:12px;margin-right:12px;}
}
</style>
</head>
<body>

<div id="topbar">
  <div class="brand"><img id="brand_escudo" style="display:none;height:26px;width:26px;object-fit:contain;border-radius:4px;vertical-align:middle;margin-right:6px;">CaptaNET · Equipos</div>
  <div style="display:flex;gap:10px;flex-wrap:wrap;">

    <button class="secondary" onclick="window.location.href='visor.html'">Visor</button>

    <button class="secondary" onclick="window.location.href='gestion_pruebas.html'">Pruebas</button>

    <div>
      <h2 id="d_nombre"></h2>

    </div>

</div>

<script>
const client = supabase.createClient(
  "https://bnqoisjvboytiphiwosj.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJucW9pc2p2Ym95dGlwaGl3b3NqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2MDgwMTcsImV4cCI6MjA5OTE4NDAxN30.RpTr0Z17ZRFwTpBvsmNwyqtEm0nLVWxM96mxaLxDbes"
);

// Búsqueda sin distinguir acentos ni orden de palabras (igual que en visor/jugadores).
function normalizarTexto(s) {
  return (s || "").toString().normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
}

// Mismo criterio de categoría de edad que en visor.html: se usa el nombre de
// categoría que da la propia FFCV por competición (categoria_edad_ffcv,
// p.ej. "Querubines") cuando existe, porque es más fiable que adivinar por
// el nombre de la liga ("Escola de Gegants" no menciona ninguna edad, pero
// la FFCV la cataloga como "Querubines"). Si no hay ese dato, se adivina
// por el nombre de la liga.
const ORDEN_EDAD_LIGAS = ["AMATEUR", "JUVENIL", "CADETE", "INFANTIL", "ALEVIN", "BENJAMIN", "PREBENJAMIN", "QUERUBIN"];
const ETIQUETA_EDAD_LIGAS = {
  AMATEUR: "AMATEUR", JUVENIL: "JUVENILES", CADETE: "CADETES", INFANTIL: "INFANTILES",
  ALEVIN: "ALEVINES", BENJAMIN: "BENJAMINES", PREBENJAMIN: "PREBENJAMINES", QUERUBIN: "QUERUBINES"
};
function edadDeLiga(nombreLiga, categoriaEdadFfcv) {
  const nombreN = normalizarTexto(nombreLiga);
  if (nombreN.includes("gegant")) return "QUERUBIN"; // "Escola de Gegants" (F5) = Querubines
  const n = normalizarTexto(categoriaEdadFfcv) || nombreN;
  if (n.includes("querubi")) return "QUERUBIN";
  if (n.includes("prebenjami")) return "PREBENJAMIN";
  if (n.includes("benjami")) return "BENJAMIN";
  if (n.includes("alevi")) return "ALEVIN";
  if (n.includes("infantil")) return "INFANTIL";
  if (n.includes("cadet")) return "CADETE";
  if (n.includes("juvenil")) return "JUVENIL";
  return "AMATEUR";
}
function edadDeEquipo(e) {
  return edadDeLiga(e.grupos?.ligas?.nombre, e.grupos?.ligas?.categoria_edad_ffcv);
}
// Se agrupa primero por sección de edad (Amateur, Juvenil, Cadete...) y,
// dentro de cada sección, por nombre de equipo.
function ordenarEquipos(equipos) {
  return [...equipos].sort((a, b) => {
    const ra = ORDEN_EDAD_LIGAS.indexOf(edadDeEquipo(a));
    const rb = ORDEN_EDAD_LIGAS.indexOf(edadDeEquipo(b));
    if (ra !== rb) return ra - rb;
    const n = a.nombre.localeCompare(b.nombre);
    if (n !== 0) return n;
    const catA = a.grupos?.ligas?.categorias?.nombre || "";
    const catB = b.grupos?.ligas?.categorias?.nombre || "";
    const c = catA.localeCompare(catB);
    if (c !== 0) return c;
    const ligaA = a.grupos?.ligas?.nombre || "";
    const ligaB = b.grupos?.ligas?.nombre || "";
    const l = ligaA.localeCompare(ligaB);
    if (l !== 0) return l;
    return (a.grupos?.nombre || "").localeCompare(b.grupos?.nombre || "");
  });
}

// Nombre "de club" para agrupar en los chips: quita el sufijo de equipo
// ('A', 'B'...) que usa la FFCV para distinguir los distintos conjuntos
// de un mismo club (p.ej. "Mislata C.F. 'B'" -> "Mislata C.F.").
function nombreBaseClub(nombre) {
  return (nombre || "").replace(/\s+['"’][A-Za-z]['"’]\s*$/, "").trim();
}

// Junta nombres de club "parecidos" en un solo chip: el mismo club a veces
// se registra con pequeñas variaciones (puntuación, mayúsculas, una palabra
// de más al final, p.ej. "C.F. Inter San José Valencia" y "CF INTER SAN
// JOSE"). Se consideran el mismo club si, palabra a palabra en el mismo
// orden, uno es el principio del otro. Esto NO junta clubes distintos que
// solo comparten una palabra (p.ej. la localidad "Mislata"), porque ahí la
// primera palabra que cambia ya rompe el prefijo ("Mislata C.F." no es
// prefijo de "C.F. Rovella Mislata": empiezan por palabras distintas).
function tokensClub(nombreBase) {
  return normalizarTexto(nombreBase).replace(/['".,]/g, "").split(/\s+/).filter(Boolean);
}
function esPrefijoDePalabras(a, b) {
  return a.length <= b.length && a.every((palabra, i) => palabra === b[i]);
}
function nombresDeClubParecidos(baseA, baseB) {
  if (baseA === baseB) return true;
  const ta = tokensClub(baseA), tb = tokensClub(baseB);
  return esPrefijoDePalabras(ta, tb) || esPrefijoDePalabras(tb, ta);
}
function agruparClubesParecidos(basesUnicas) {
  const grupos = [];
  basesUnicas.forEach(base => {
    const grupo = grupos.find(g => g.variantes.some(v => nombresDeClubParecidos(v, base)));
    if (grupo) {
      grupo.variantes.push(base);
      if (base.length > grupo.representante.length) grupo.representante = base;
    } else {
      grupos.push({ representante: base, variantes: [base] });
    }
  });
  return grupos;
}

let esAdmin = false;
let miClubId = null;
let tablaRoster = null;
let ultimaBusquedaTexto = "";
let ultimaBusquedaEquipos = [];
let clubSeleccionado = null;
let modalidadSeleccionada = null;
let equiposClubSeleccionado = null;

async function protegerPagina() {
  const { data: session } = await client.auth.getSession();
  if (!session.session) { window.location.href = "index.html"; return false; }

  const { data: perfil, error } = await client
    .from("profiles").select("is_admin, is_club_admin, club_id, clubs(escudo_url)").eq("id", session.session.user.id).single();

  if (error) {
    document.body.insertAdjacentHTML("afterbegin", `<p style="background:#fef2f2;color:#dc2626;border-bottom:1px solid #fecaca;padding:10px 24px;margin:0;font-size:14px;">Error cargando tu perfil: ${error.message}</p>`);
    return false;
  }

  esAdmin = !!perfil?.is_admin;
  miClubId = perfil?.club_id || null;

  if (esAdmin) document.getElementById("btn_admin").style.display = "inline-block";
  if (perfil?.is_club_admin) document.getElementById("btn_equipo").style.display = "inline-block";
  if (perfil?.clubs?.escudo_url) {
    const img = document.getElementById("brand_escudo");
    img.src = perfil.clubs.escudo_url;
    img.style.display = "inline-block";
  }

  return true;
}

function atras() {
  if (window.history.length > 1) window.history.back();
  else window.location.href = "visor.html";
}

async function logout() {
  await client.auth.signOut();
  window.location.href = "index.html";
}

async function cargarClubsSiAdmin() {
  if (!esAdmin) return;
  document.getElementById("campo_club_wrap").style.display = "block";
  const { data: clubs } = await client.from("clubs").select("id, nombre").order("nombre");
  const sel = document.getElementById("filtro_club");
  sel.innerHTML = "";
  (clubs || []).forEach(c => sel.innerHTML += `<option value="${c.id}">${c.nombre}</option>`);
  if (clubs && clubs.length) miClubId = clubs[0].id;
}

function onClubChange() {
  miClubId = document.getElementById("filtro_club").value;
  const equipoId = new URLSearchParams(window.location.search).get("equipo_id");
  if (equipoId) abrirEquipo(equipoId);
}

function jerarquiaTexto(equipo) {
  const grupo = equipo?.grupos;
  const liga = grupo?.ligas;
  const categoria = liga?.categorias;
  return [categoria?.nombre, liga?.nombre, grupo?.nombre].filter(Boolean).join(" · ");
}

let buscarTimeout = null;
function buscarEquipos() {
  clearTimeout(buscarTimeout);
  buscarTimeout = setTimeout(ejecutarBusquedaEquipos, 300);
}

async function ejecutarBusquedaEquipos(preservarFiltros) {
  if (!preservarFiltros) {
    clubSeleccionado = null;
    modalidadSeleccionada = null;
    equiposClubSeleccionado = null;
  }
  const q = document.getElementById("buscador_equipos").value.trim();
  const aviso = document.getElementById("aviso_busqueda");
  const cont = document.getElementById("resultados_equipos");
  const clubesCont = document.getElementById("clubes_detectados");
  const modalidadesCont = document.getElementById("modalidades_detectados");

  if (!q) {
    cont.innerHTML = "";
    clubesCont.innerHTML = "";
    modalidadesCont.innerHTML = "";
    aviso.style.display = "block";
    aviso.textContent = "Escribe el nombre de un equipo para empezar a buscar.";
    return;
  }

  const palabras = normalizarTexto(q).split(/\s+/).filter(Boolean);
  let consulta = client.from("equipos")
    .select("id, nombre, grupos(nombre, ligas(nombre, categoria_edad_ffcv, categorias(nombre)))")
    .limit(50);
  palabras.forEach(p => { consulta = consulta.ilike("nombre_normalizado", `%${p}%`); });
  const { data: equipos, error } = await consulta;

  if (error) {
    aviso.style.display = "block"; aviso.textContent = "Error al buscar: " + error.message;
    cont.innerHTML = ""; clubesCont.innerHTML = ""; modalidadesCont.innerHTML = "";
    return;
  }

  if (!equipos || !equipos.length) {
    aviso.style.display = "block";
    aviso.textContent = "Sin resultados.";
    cont.innerHTML = ""; clubesCont.innerHTML = ""; modalidadesCont.innerHTML = "";
    return;
  }

  aviso.style.display = "none";
  ultimaBusquedaTexto = q;
  ultimaBusquedaEquipos = equipos;
  renderModalidadesDetectadas();

  // Al volver de la ficha de un equipo con un club ya elegido, se vuelve a
  // buscar ese mismo club (en vez de perder la selección y mostrar todo
  // mezclado otra vez).
  if (clubSeleccionado) {
    const grupo = calcularGruposClub().find(g => g.representante === clubSeleccionado);
    if (grupo) { await seleccionarClub(grupo, true); return; }
    clubSeleccionado = null;
  }

  renderClubesDetectados();
  renderizarResultadosFinales();
}

// Secciones reales: una cabecera (Amateur, Juveniles, Cadetes...) por cada
// categoría de edad presente en los resultados, en vez de un único listado.
function renderResultadosEquipos(equipos, huboLimite) {
  const cont = document.getElementById("resultados_equipos");
  cont.innerHTML = "";

  if (!equipos.length) {
    const nota = document.createElement("p");
    nota.style.cssText = "color:var(--muted);font-size:13px;margin:0 24px;";
    nota.textContent = "Sin resultados con estos filtros.";
    cont.appendChild(nota);
    return;
  }

  let seccionActual = null;
  let grid = null;
  ordenarEquipos(equipos).forEach(e => {
    const edad = edadDeEquipo(e);
    if (edad !== seccionActual) {
      const titulo = document.createElement("div");
      titulo.className = "seccion-titulo";
      titulo.textContent = ETIQUETA_EDAD_LIGAS[edad];
      cont.appendChild(titulo);
      grid = document.createElement("div");
      grid.className = "resultados";
      cont.appendChild(grid);
      seccionActual = edad;
    }
    const div = document.createElement("div");
    div.className = "resultado";
    div.onclick = () => abrirEquipo(e.id);
    div.innerHTML = `<div class="nombre">${e.nombre}</div><div class="meta">${jerarquiaTexto(e) || "Sin categoría asignada"}</div>`;
    grid.appendChild(div);
  });

  if (huboLimite) {
    const nota = document.createElement("p");
    nota.style.cssText = "color:var(--muted);font-size:12px;margin:0 24px;";
    nota.textContent = "Hay más de 50 resultados, afina la búsqueda para verlos todos.";
    cont.appendChild(nota);
  }
}

// La modalidad (Masculí F11, Futsal, Valenta...) vive en "categorias", el
// nivel más alto de la jerarquía FFCV en CaptaNET.
function modalidadDeEquipo(e) {
  return e.grupos?.ligas?.categorias?.nombre || null;
}

// Con la lista de resultados actual (antes de aplicar ningún filtro) se
// calculan dos filas de chips independientes: una por modalidad y otra por
// club. Cada una solo aparece si hace falta elegir entre más de una opción
// (p.ej. si buscas "Mislata" y solo tiene equipos de Masculí, no sale nada
// que separar; si tiene también Futsal, sí).
function renderModalidadesDetectadas() {
  const cont = document.getElementById("modalidades_detectados");
  cont.innerHTML = "";

  const modalidades = [...new Set(ultimaBusquedaEquipos.map(modalidadDeEquipo).filter(Boolean))].sort();
  if (modalidades.length < 2) return;

  const etiqueta = document.createElement("span");
  etiqueta.className = "etiqueta";
  etiqueta.textContent = "Modalidad:";
  cont.appendChild(etiqueta);

  modalidades.forEach(m => {
    const pill = document.createElement("button");
    pill.type = "button";
    pill.className = "club-pill" + (modalidadSeleccionada === m ? " active" : "");
    pill.textContent = m;
    pill.onclick = () => seleccionarModalidad(m);
    cont.appendChild(pill);
  });
}

function seleccionarModalidad(m) {
  modalidadSeleccionada = modalidadSeleccionada === m ? null : m;
  renderModalidadesDetectadas();
  renderizarResultadosFinales();
}

// A la derecha del buscador, con 5 caracteres o más, se muestran los nombres
// de club distintos entre los resultados. Al pulsar uno se filtra a sus
// equipos exactos (todas sus categorías), pidiéndolos de nuevo a la base de
// datos para no depender del límite de 50 de la búsqueda de texto libre.
function calcularGruposClub() {
  const basesUnicas = [...new Set(ultimaBusquedaEquipos.map(e => nombreBaseClub(e.nombre)))];
  return agruparClubesParecidos(basesUnicas).sort((a, b) => a.representante.localeCompare(b.representante));
}

function renderClubesDetectados() {
  const cont = document.getElementById("clubes_detectados");
  cont.innerHTML = "";
  if (normalizarTexto(ultimaBusquedaTexto).length < 5) return;

  const grupos = calcularGruposClub();
  if (grupos.length < 2) return;

  const etiqueta = document.createElement("span");
  etiqueta.className = "etiqueta";
  etiqueta.textContent = "Clubes:";
  cont.appendChild(etiqueta);

  grupos.forEach(grupo => {
    const pill = document.createElement("button");
    pill.type = "button";
    pill.className = "club-pill" + (clubSeleccionado === grupo.representante ? " active" : "");
    pill.textContent = grupo.representante;
    pill.onclick = () => seleccionarClub(grupo);
    cont.appendChild(pill);
  });
}

async function seleccionarClub(grupo, forzar) {
  const yaSeleccionado = clubSeleccionado === grupo.representante;
  clubSeleccionado = (yaSeleccionado && !forzar) ? null : grupo.representante;
  equiposClubSeleccionado = null;
  renderClubesDetectados();

  if (!clubSeleccionado) {
    renderizarResultadosFinales();
    return;
  }

  // "Empieza por" en vez de exacto, porque el nombre real del equipo añade
  // el sufijo 'A'/'B'/... que se quitó para agrupar por club. Se combinan
  // con "or" todas las variantes de nombre que se hayan agrupado en este
  // club (p.ej. "C.F. Inter San José Valencia" y "CF INTER SAN JOSE").
  const filtro = grupo.variantes.map(v => `nombre_normalizado.ilike.${normalizarTexto(v)}%`).join(",");
  const aviso = document.getElementById("aviso_busqueda");
  const { data: equipos, error } = await client.from("equipos")
    .select("id, nombre, grupos(nombre, ligas(nombre, categoria_edad_ffcv, categorias(nombre)))")
    .or(filtro);

  if (error) { aviso.style.display = "block"; aviso.textContent = "Error al buscar: " + error.message; return; }

  aviso.style.display = "none";
  equiposClubSeleccionado = equipos || [];
  renderizarResultadosFinales();
}

// Aplica el filtro de modalidad (si hay uno elegido) sobre la base que
// corresponda: los equipos del club elegido si hay uno, o si no, el
// resultado bruto de la búsqueda de texto.
function renderizarResultadosFinales() {
  const base = clubSeleccionado ? (equiposClubSeleccionado || []) : ultimaBusquedaEquipos;
  const filtrados = modalidadSeleccionada ? base.filter(e => modalidadDeEquipo(e) === modalidadSeleccionada) : base;
  const huboLimite = !clubSeleccionado && !modalidadSeleccionada && ultimaBusquedaEquipos.length === 50;
  renderResultadosEquipos(filtrados, huboLimite);
}

function tieneInforme(p) {
  return !!(p.posicion || p.contacto || p.contactado ||
    p.tecnica || p.tactica || p.fisico || p.actitud || (p.comentario && String(p.comentario).trim()));
}

const ETIQUETA_VALORACION = { descartar: "Descartar", seguir: "Seguir", interesante: "Interesante", firmar: "Firmar", firmado: "Firmado" };

async function crearTablaRoster() {
  return new Promise(resolve => {
    tablaRoster = new Tabulator("#tabla_roster", {
      data: [],
      layout: "fitData",
      height: "65vh",
      pagination: true,
      paginationSize: 60,
      paginationSizeSelector: [30, 60, 100, 200],
      paginationCounter: "rows",
      columns: [
        {
          title: "Jugador", field: "nombre", frozen: !window.matchMedia("(max-width:700px)").matches, minWidth: 160,
          formatter: cell => `<span style="color:var(--primary);cursor:pointer;text-decoration:underline;white-space:nowrap;">${cell.getValue()}</span>`,
          cellClick: (e, cell) => { window.location.href = "jugadores.html?jugador_id=" + cell.getRow().getData().jugador_id; }
        },
        { title: "Dorsal", field: "dorsal", width: 85, hozAlign: "center" },
        { title: "Posición", field: "posicion" },
        { title: "Año", field: "anio_nacimiento", sorter: "number", width: 70, hozAlign: "center" },
        { title: "Convocados", field: "partidos_convocados", sorter: "number", width: 110, hozAlign: "center" },
        { title: "Titular", field: "partidos_titular", sorter: "number", width: 90, hozAlign: "center" },
        { title: "Suplente", field: "partidos_suplente", sorter: "number", width: 95, hozAlign: "center" },
        { title: "Jugados", field: "partidos_jugados", sorter: "number", width: 90, hozAlign: "center" },
        { title: "Goles", field: "goles", sorter: "number", width: 85, hozAlign: "center" },
        { title: "Amarillas", field: "tarjetas_amarillas", sorter: "number", width: 100, hozAlign: "center" },
        { title: "Rojas", field: "tarjetas_rojas", sorter: "number", width: 80, hozAlign: "center" },
        { title: "2ª Amarilla", field: "tarjetas_doble_amarilla", sorter: "number", width: 110, hozAlign: "center" },
        { title: "Verde", field: "tarjetas_verde", sorter: "number", width: 85, hozAlign: "center" },
        { title: "Minutos", field: "minutos_jugados", sorter: "number", width: 95, hozAlign: "center" },
        { title: "Portero", field: "es_portero", formatter: "tickCross", width: 90, hozAlign: "center" },
        {
          title: "Con informe", field: "tiene_informe", width: 160, hozAlign: "center",
          formatter: cell => {
            const fila = cell.getRow().getData();
            if (!fila.tiene_informe) return `<span style="color:var(--muted);">NO</span>`;
            if (fila.valoracion) return `<span class="badge badge-${fila.valoracion}">${ETIQUETA_VALORACION[fila.valoracion] || fila.valoracion}</span>`;
            return `✅ <span style="color:var(--muted);font-size:11px;">SIN VALORACIÓN</span>`;
          }
        }
      ]
    });
    tablaRoster.on("tableBuilt", resolve);
  });
}

async function fetchPaginado(construirConsulta) {
  const filas = [];
  const TAMANO = 1000;
  let desde = 0;
  while (true) {
    const { data, error } = await construirConsulta(desde, desde + TAMANO - 1);
    if (error) { console.error("fetchPaginado:", error); break; }
    if (!data) break;
    filas.push(...data);
    if (data.length < TAMANO) break;
    desde += TAMANO;
  }
  return filas;
}

async function abrirEquipo(equipoId) {
  const { data: equipo } = await client.from("equipos")
    .select("id, nombre, escudo_url, grupos(nombre, ligas(nombre, categoria_edad_ffcv, categorias(nombre)))")
    .eq("id", equipoId).single();
  if (!equipo) {
    document.getElementById("aviso_busqueda").style.display = "block";
    document.getElementById("aviso_busqueda").textContent = "No se ha encontrado ese equipo.";
    return;
  }

  const url = new URL(window.location.href);
  url.searchParams.set("equipo_id", equipoId);
  history.replaceState(null, "", url);

  document.getElementById("resultados_equipos").style.display = "none";
  document.getElementById("aviso_busqueda").style.display = "none";
  document.getElementById("buscador_equipos").style.display = "none";
  document.getElementById("clubes_detectados").style.display = "none";
  document.getElementById("modalidades_detectados").style.display = "none";
  document.getElementById("btn_volver_busqueda").style.display = "inline-block";
  document.getElementById("vista_detalle").style.display = "block";
  document.getElementById("d_nombre").textContent = equipo.nombre;
  document.getElementById("d_meta").textContent = jerarquiaTexto(equipo) || "Sin categoría asignada";
  const escudoImg = document.getElementById("d_escudo");
  if (equipo.escudo_url) { escudoImg.src = equipo.escudo_url; escudoImg.style.display = "block"; }
  else { escudoImg.style.display = "none"; }

  const jugadores = await fetchPaginado((desde, hasta) => client
    .from("jugadores").select("*").eq("equipo_id", equipoId).range(desde, hasta));

  let privados = [];
  if (miClubId && jugadores.length) {
    const jugadorIds = jugadores.map(j => j.id);
    const { data } = await client.from("jugadores_club").select("*").eq("club_id", miClubId).in("jugador_id", jugadorIds);
    privados = data || [];
  }

  const filas = jugadores.map(j => {
    const priv = privados.find(p => p.jugador_id === j.id) || {};
    return {
      jugador_id: j.id,
      nombre: j.nombre,
      dorsal: j.dorsal,
      posicion: j.posicion,
      anio_nacimiento: j.fecha_nacimiento ? new Date(j.fecha_nacimiento).getFullYear() : "",
      partidos_convocados: j.partidos_convocados,
      partidos_titular: j.partidos_titular,
      partidos_suplente: j.partidos_suplente,
      partidos_jugados: j.partidos_jugados,
      goles: j.goles,
      tarjetas_amarillas: j.tarjetas_amarillas,
      tarjetas_rojas: j.tarjetas_rojas,
      tarjetas_doble_amarilla: j.tarjetas_doble_amarilla,
      tarjetas_verde: j.tarjetas_verde,
      minutos_jugados: j.minutos_jugados,
      es_portero: !!j.es_portero,
      tiene_informe: tieneInforme(priv),
      valoracion: priv.valoracion_scouting || null
    };
  }).sort((a, b) => a.nombre.localeCompare(b.nombre));

  await tablaRoster.setData(filas);
  tablaRoster.setPage(1);
}

function volverABusqueda() {
  const url = new URL(window.location.href);
  url.searchParams.delete("equipo_id");
  history.replaceState(null, "", url);

  document.getElementById("vista_detalle").style.display = "none";
  document.getElementById("buscador_equipos").style.display = "block";
  document.getElementById("clubes_detectados").style.display = "flex";
  document.getElementById("modalidades_detectados").style.display = "flex";
  document.getElementById("btn_volver_busqueda").style.display = "none";
  document.getElementById("resultados_equipos").style.display = "grid";
  ejecutarBusquedaEquipos(true);
}

document.addEventListener("DOMContentLoaded", async () => {
  const ok = await protegerPagina();
  if (!ok) return;

  await cargarClubsSiAdmin();
  await crearTablaRoster();

  const equipoId = new URLSearchParams(window.location.search).get("equipo_id");
  if (equipoId) {
    await abrirEquipo(equipoId);
  }
});
</script>
