<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CaptaNET - Gestión de Pruebas</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<link href="https://cdn.jsdelivr.net/npm/tabulator-tables@5.6.1/dist/css/tabulator.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tabulator-tables@5.6.1/dist/js/tabulator.min.js"></script>
<style>
:root{--primary:#2563eb;--bg:#f5f6fa;--card:#fff;--border:#e2e4eb;--text:#1f2430;--muted:#6b7280;}
*{box-sizing:border-box;}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);}
#topbar{display:flex;justify-content:space-between;align-items:center;padding:14px 24px;background:var(--card);border-bottom:1px solid var(--border);flex-wrap:wrap;gap:10px;}
#topbar .brand{font-weight:700;font-size:18px;color:var(--primary);}
button{background:var(--primary);color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:14px;}
button:hover{opacity:.9;}
button.secondary{background:#fff;color:var(--text);border:1px solid var(--border);}
button.secondary.active{background:#eff6ff;color:var(--primary);border-color:var(--primary);font-weight:700;}
button.danger{background:#fff;color:#dc2626;border:1px solid #fecaca;}
button:disabled{opacity:.5;cursor:default;}
input,select,textarea{padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:14px;font-family:inherit;}
label{font-size:12px;color:var(--muted);display:block;margin-bottom:4px;}
.barra{display:flex;gap:10px;align-items:center;flex-wrap:wrap;padding:16px 24px;}
.barra input#buscador{flex:1;min-width:180px;}
.bulk-bar{display:none;align-items:center;gap:10px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;padding:8px 14px;font-size:13px;}
.contenedor{padding:0 24px 24px;}
.badge{display:inline-block;font-size:11px;font-weight:700;padding:2px 7px;border-radius:4px;}
.badge-pendiente{background:#f1f5f9;color:#475569;}
.badge-citado{background:#dbeafe;color:#1d4ed8;}
.badge-volver_a_citar{background:#ffedd5;color:#c2410c;}
.badge-descartado{background:#fee2e2;color:#b91c1c;}
.badge-fichado{background:#dcfce7;color:#15803d;}
.badge-si{background:#dcfce7;color:#15803d;}
.badge-no{background:#fee2e2;color:#b91c1c;}
.nombre-link{color:var(--primary);cursor:pointer;text-decoration:underline;}
.ficha{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:24px;margin:0 24px 24px;}
.ficha-vacia{color:var(--muted);text-align:center;padding:40px 20px;}
.ficha-info h2{margin:0 0 4px;font-size:22px;}
.ficha-info p{margin:0;color:var(--muted);font-size:14px;}
.campos-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin:18px 0;}
.campo-full{grid-column:1 / -1;}
.status{font-weight:600;color:var(--muted);margin:12px 0 0;}
.detalle-cita{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 12px;font-size:13px;margin-bottom:6px;}
.ffcv-box{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px;margin-top:6px;}
.ffcv-resultado{border:1px solid var(--border);background:#fff;border-radius:6px;padding:8px 10px;margin-top:8px;font-size:13px;display:flex;justify-content:space-between;align-items:center;gap:8px;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:200;padding:20px;}
.modal-box{background:#fff;border-radius:10px;padding:24px;width:100%;max-width:480px;box-shadow:0 20px 50px rgba(0,0,0,.3);max-height:90vh;overflow-y:auto;}
.modal-box h3{margin:0 0 14px;}
.modal-box .field{margin-bottom:12px;}
.ayuda{color:var(--muted);font-size:11px;margin:-8px 0 12px;}
.group-header{font-weight:700;color:var(--text);background:var(--bg);}
@media (max-width:900px){
  .barra,.contenedor,.ficha{padding-left:12px;padding-right:12px;}
  .ficha{margin-left:12px;margin-right:12px;}
  .campos-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<div id="topbar">
  <div class="brand">CaptaNET · Gestión de Pruebas</div>
  <div style="display:flex;gap:10px;flex-wrap:wrap;">
    <button class="secondary" onclick="atras()">← Atrás</button>
    <button class="secondary" onclick="window.location.href='visor.html'">Visor</button>
    <button class="secondary" onclick="window.location.href='jugadores.html'">Informes</button>
    <button class="secondary" onclick="window.location.href='equipos.html'">Equipos</button>
    <button class="secondary" onclick="window.location.href='plantillas.html'">Plantillas</button>
    <button class="secondary active" onclick="window.location.href='gestion_pruebas.html'">Pruebas</button>
    <button class="secondary" onclick="window.location.href='usuario.html'">Mi perfil</button>
    <button id="btn_equipo" class="secondary" style="display:none;" onclick="window.location.href='equipo.html'">Mi equipo</button>
    <button id="btn_admin" class="secondary" style="display:none;" onclick="window.location.href='admin.html'">Panel Admin</button>
    <button class="secondary" id="btn_copiar_enlace" onclick="copiarEnlaceFormulario()">Copiar enlace del formulario</button>
    <button class="secondary" onclick="logout()">Cerrar sesión</button>
  </div>
</div>

<div class="barra">
  <div id="campo_club_wrap" style="display:none;">
    <select id="filtro_club" onchange="onClubChange()"></select>
  </div>
  <select id="filtro_anio" onchange="aplicarFiltros()">
    <option value="">Todos los años</option>
  </select>
  <select id="filtro_estado" onchange="aplicarFiltros()">
    <option value="">Todos los estados</option>
    <option value="pendiente">Pendiente</option>
    <option value="citado">Citado</option>
    <option value="volver_a_citar">Volver a citar</option>
    <option value="descartado">Descartado</option>
    <option value="fichado">Fichado</option>
  </select>
  <input id="buscador" type="text" placeholder="Buscar por nombre..." oninput="aplicarFiltros()">
  <button class="secondary" onclick="exportarExcel()">Exportar a Excel</button>
  <div class="bulk-bar" id="bulk_bar">
    <span id="bulk_texto"></span>
    <button style="font-size:12px;padding:6px 10px;" onclick="abrirModalConvocatoria()">Enviar convocatoria</button>
  </div>
</div>

<div class="contenedor">
  <div id="tabla_pruebas"></div>
</div>

<div class="ficha" id="ficha" style="display:none;">
  <div id="ficha_contenido">
    <div style="display:flex;align-items:flex-start;gap:14px;">
      <img id="f_foto" style="display:none;width:64px;height:64px;border-radius:8px;object-fit:cover;border:1px solid var(--border);flex-shrink:0;">
      <div class="ficha-info" style="flex:1;">
        <input id="f_nombre" type="text" style="font-size:20px;font-weight:700;padding:6px 8px;width:100%;max-width:420px;" oninput="guardarValoracionDebounced()">
        <p id="f_creado" style="margin:6px 0 0;"></p>
      </div>
    </div>

    <div id="f_cita" style="margin-top:14px;"></div>

    <div class="campos-grid">
      <div>
        <label>Fecha de nacimiento</label>
        <input id="f_fecha_nacimiento" type="date" oninput="guardarValoracionDebounced()">
      </div>
      <div>
        <label>Posición</label>
        <select id="f_posicion" onchange="guardarValoracion()">
          <option value="">-</option>
          <option>Portero</option>
          <option>Lateral derecho</option>
          <option>Lateral izquierdo</option>
          <option>Central (diestro)</option>
          <option>Central (zurdo)</option>
          <option>Pivote</option>
          <option>Mediocentro</option>
          <option>Interior</option>
          <option>Mediapunta</option>
          <option>Extremo (zurdo)</option>
          <option>Extremo (diestro)</option>
          <option>Delantero</option>
        </select>
      </div>
      <div>
        <label>Email</label>
        <input id="f_email" type="email" oninput="guardarValoracionDebounced()">
      </div>
      <div>
        <label>Teléfono</label>
        <input id="f_telefono" type="tel" oninput="guardarValoracionDebounced()">
      </div>
      <div>
        <label>Nombre del padre/madre/tutor</label>
        <input id="f_nombre_contacto" type="text" oninput="guardarValoracionDebounced()">
      </div>
      <div>
        <label>Club actual</label>
        <input id="f_club_actual" type="text" oninput="guardarValoracionDebounced()">
      </div>
      <div>
        <label>Equipo propuesto</label>
        <input id="f_equipo_propuesto" type="text" placeholder="Ej. Cadete A" oninput="guardarValoracionDebounced()">
      </div>
      <div>
        <label>&nbsp;</label>
        <a id="link_enviar_plantillas" onclick="abrirModalPlantillas()" style="display:inline-block;font-size:13px;color:var(--primary);cursor:pointer;text-decoration:underline;margin-top:8px;">→ Enviar a plantillas</a>
      </div>
      <div>
        <label>Estado</label>
        <select id="f_estado" onchange="guardarValoracion()">
          <option value="pendiente">Pendiente</option>
          <option value="citado">Citado</option>
          <option value="volver_a_citar">Volver a citar</option>
          <option value="descartado">Descartado</option>
          <option value="fichado">Fichado</option>
        </select>
      </div>
      <div>
        <label>Respuesta del jugador</label>
        <p id="f_respuesta" style="margin:8px 0 0;font-size:14px;"></p>
      </div>
      <div>
        <label>Técnica (1-10)</label>
        <input id="f_tecnica" type="number" min="1" max="10" oninput="guardarValoracionDebounced()">
      </div>
      <div>
        <label>Táctica (1-10)</label>
        <input id="f_tactica" type="number" min="1" max="10" oninput="guardarValoracionDebounced()">
      </div>
      <div>
        <label>Físico</label>
        <select id="f_fisico" onchange="guardarValoracion()">
          <option value="">-</option>
          <option>BAJO</option>
          <option>MEDIO-BAJO</option>
          <option>MEDIO</option>
          <option>MEDIO-ALTO</option>
          <option>ALTO</option>
          <option>MUY ALTO</option>
        </select>
      </div>
      <div>
        <label>Actitud (1-10)</label>
        <input id="f_actitud" type="number" min="1" max="10" oninput="guardarValoracionDebounced()">
      </div>
      <div class="campo-full">
        <label>Comentario del jugador (formulario)</label>
        <p id="f_comentario_jugador" style="margin:0;font-size:13px;color:var(--muted);"></p>
      </div>
      <div class="campo-full">
        <label>Comentario del jugador (conf. asistencia)</label>
        <p id="f_comentario_confirmacion" style="margin:0;font-size:13px;color:var(--muted);"></p>
      </div>
      <div class="campo-full">
        <label>Valoración del día de la prueba</label>
        <textarea id="f_valoracion" style="width:100%;min-height:100px;" oninput="guardarValoracionDebounced()"></textarea>
      </div>
      <div class="campo-full">
        <label>Jugador FFCV</label>
        <div class="ffcv-box" id="ffcv_box"></div>
      </div>
    </div>

    <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap;">
      <p id="status" class="status"></p>
      <button class="danger" style="font-size:12px;padding:6px 12px;margin-top:12px;" onclick="eliminarInscripcion()">Eliminar inscripción</button>
      <button class="secondary" style="font-size:12px;padding:6px 12px;margin-top:12px;" onclick="cerrarFicha()">Cerrar ficha</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal_plantillas">
  <div class="modal-box" style="max-width:380px;">
    <h3>Enviar a plantillas</h3>
    <p class="ayuda" style="margin-top:-8px;">Se añadirá al campograma de la plantilla elegida.</p>
    <div class="field">
      <label>Plantilla</label>
      <select id="ep_plantilla" style="width:100%;" onchange="actualizarAvisoPlantilla()"></select>
    </div>
    <p id="ep_aviso" style="display:none;color:#b45309;background:#fffbeb;border:1px solid #fde68a;border-radius:6px;padding:8px 10px;font-size:12px;margin:-4px 0 12px;"></p>
    <p id="ep_status" style="font-size:13px;color:var(--muted);min-height:18px;"></p>
    <div style="display:flex;gap:10px;justify-content:flex-end;">
      <button class="secondary" onclick="cerrarModalPlantillas()">Cancelar</button>
      <button onclick="enviarAPlantilla()">Enviar</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal_convocatoria">
  <div class="modal-box">
    <h3>Enviar convocatoria</h3>
    <p id="modal_destinatarios" class="ayuda" style="margin-top:-8px;"></p>

    <div class="field">
      <label>Día de la prueba</label>
      <input id="mc_dia" type="date" style="width:100%;" oninput="actualizarPreviaConvocatoria()">
    </div>
    <div class="field">
      <label>Hora</label>
      <input id="mc_hora" type="time" style="width:100%;" oninput="actualizarPreviaConvocatoria()">
    </div>
    <div class="field">
      <label>Lugar</label>
      <input id="mc_lugar" type="text" style="width:100%;" placeholder="Campo municipal, dirección..." oninput="actualizarPreviaConvocatoria()">
    </div>
    <div class="field">
      <label>Asunto del email</label>
      <input id="mc_asunto" type="text" style="width:100%;">
    </div>
    <div class="field">
      <label>Mensaje adicional (opcional)</label>
      <textarea id="mc_nota" style="width:100%;min-height:70px;" placeholder="Por ejemplo: trae ropa deportiva y botas de tacos." oninput="actualizarPreviaConvocatoria()"></textarea>
      <p class="ayuda">El día, la hora y el lugar se añaden solos al email — no hace falta escribirlos aquí. Este campo es solo por si quieres contarles algo más.</p>
    </div>
    <div class="field">
      <label>Así lo verá el jugador</label>
      <div id="mc_previa" style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px;font-size:13px;line-height:1.6;"></div>
    </div>

    <p id="modal_status" style="font-size:13px;color:var(--muted);min-height:18px;"></p>

    <div style="display:flex;gap:10px;justify-content:flex-end;">
      <button class="secondary" onclick="cerrarModalConvocatoria()">Cancelar</button>
      <button id="btn_enviar_convocatoria" onclick="enviarConvocatoria()">Enviar</button>
    </div>
  </div>
</div>

<script>
const client = supabase.createClient(
  "https://bnqoisjvboytiphiwosj.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJucW9pc2p2Ym95dGlwaGl3b3NqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2MDgwMTcsImV4cCI6MjA5OTE4NDAxN30.RpTr0Z17ZRFwTpBvsmNwyqtEm0nLVWxM96mxaLxDbes"
);

function normalizarTexto(s) {
  return (s || "").toString().normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
}
function coincideNombre(nombre, consulta) {
  const nombreNorm = normalizarTexto(nombre);
  const palabras = normalizarTexto(consulta).trim().split(/\s+/).filter(Boolean);
  return palabras.every(p => nombreNorm.includes(p));
}

// El código 23505 de Postgres es "unique_violation": aquí salta cuando
// el jugador ya está en la plantilla (restricción plantilla_jugadores_unicos).
function esErrorDuplicado(error) {
  return error?.code === "23505" || /plantilla_jugadores_unicos/.test(error?.message || "");
}

// El nombre lo escribe libremente quien rellena el formulario público, así
// que hay que escaparlo antes de meterlo en innerHTML (si no, alguien
// podría inyectar HTML/JS que se ejecutaría en el navegador del club).
function escapeHtml(s) {
  return (s ?? "").toString()
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;").replace(/'/g, "&#039;");
}

const ESTADOS = {
  pendiente: "Pendiente",
  citado: "Citado",
  volver_a_citar: "Volver a citar",
  descartado: "Descartado",
  fichado: "Fichado",
};

let esAdmin = false;
let miClubId = null;
let miClubSlug = null;
let tabla = null;
let inscripcionActual = null;

async function protegerPagina() {
  const { data: session } = await client.auth.getSession();
  if (!session.session) { window.location.href = "index.html"; return false; }

  const { data: perfil } = await client
    .from("profiles").select("is_admin, is_club_admin, club_id, clubs(slug)").eq("id", session.session.user.id).single();

  esAdmin = !!perfil?.is_admin;
  miClubId = perfil?.club_id || null;
  miClubSlug = perfil?.clubs?.slug || null;

  if (esAdmin) document.getElementById("btn_admin").style.display = "inline-block";
  if (perfil?.is_club_admin) document.getElementById("btn_equipo").style.display = "inline-block";

  return true;
}

function atras() {
  if (window.history.length > 1) window.history.back();
  else window.location.href = "visor.html";
}

async function logout() {
  await client.auth.signOut();
  window.location.href = "index.html";
}

async function cargarClubsSiAdmin() {
  if (!esAdmin) return;
  document.getElementById("campo_club_wrap").style.display = "block";
  const { data: clubs } = await client.from("clubs").select("id, nombre, slug").order("nombre");
  const sel = document.getElementById("filtro_club");
  sel.innerHTML = "";
  (clubs || []).forEach(c => sel.innerHTML += `<option value="${c.id}" data-slug="${c.slug || ""}">${c.nombre}</option>`);
  if (clubs && clubs.length) { miClubId = clubs[0].id; miClubSlug = clubs[0].slug || null; }
}

function onClubChange() {
  const sel = document.getElementById("filtro_club");
  miClubId = sel.value;
  miClubSlug = sel.selectedOptions[0]?.dataset.slug || null;
  cargarInscritos();
}

function copiarEnlaceFormulario() {
  if (!miClubSlug) { alert("Este club aún no tiene subdominio (slug) configurado."); return; }
  const url = `https://${miClubSlug}.captacion.net/pruebas.html`;
  navigator.clipboard.writeText(url).then(() => {
    const btn = document.getElementById("btn_copiar_enlace");
    const original = btn.textContent;
    btn.textContent = "¡Copiado!";
    setTimeout(() => { btn.textContent = original; }, 1500);
  });
}

function crearTabla() {
  return new Promise(resolve => {
    tabla = new Tabulator("#tabla_pruebas", {
      data: [],
      layout: "fitData",
      height: "60vh",
      reactiveData: true,
      selectable: true,
      pagination: true,
      paginationSize: 100,
      paginationSizeSelector: [50, 100, 200, 500],
      paginationCounter: "rows",
      groupBy: "anio_nacimiento",
      groupHeader: (value, count) => `${value || "Sin año"} (${count})`,
      initialSort: [{ column: "anio_nacimiento", dir: "desc" }],
      columns: [
        {
          formatter: "rowSelection", titleFormatter: "rowSelection", hozAlign: "center",
          headerSort: false, width: 40, cellClick: (e, cell) => cell.getRow().toggleSelect()
        },
        {
          title: "Nombre", field: "nombre", minWidth: 160,
          formatter: cell => `<span class="nombre-link">${escapeHtml(cell.getValue())}</span>`,
          cellClick: (e, cell) => abrirInscripcion(cell.getRow().getData().id)
        },
        { title: "Año", field: "anio_nacimiento", sorter: "number", width: 80, hozAlign: "center" },
        { title: "Posición", field: "posicion", width: 130 },
        { title: "Club actual", field: "club_actual", width: 160 },
        { title: "Equipo propuesto", field: "equipo_propuesto", width: 160 },
        { title: "Teléfono", field: "telefono", width: 120 },
        { title: "Email", field: "email", width: 190 },
        {
          title: "Estado", field: "estado", width: 130, editor: "list",
          editorParams: { values: ESTADOS },
          formatter: cell => `<span class="badge badge-${cell.getValue()}">${ESTADOS[cell.getValue()] || cell.getValue()}</span>`
        },
        {
          title: "Asistencia", field: "respuesta_asistencia", width: 110, hozAlign: "center",
          formatter: cell => {
            const v = cell.getValue();
            if (!v) return "";
            return `<span class="badge badge-${v}">${v === "si" ? "Sí" : "No"}</span>`;
          }
        },
        {
          title: "Cita", field: "dia_prueba", width: 150,
          formatter: cell => {
            const fila = cell.getRow().getData();
            if (!fila.dia_prueba) return "";
            const fecha = new Date(fila.dia_prueba + "T00:00:00").toLocaleDateString("es-ES");
            return fecha + (fila.hora_prueba ? " · " + fila.hora_prueba.slice(0, 5) : "");
          }
        },
        {
          title: "FFCV", field: "jugador_ffcv_id", width: 170, hozAlign: "left",
          formatter: cell => {
            if (cell.getValue()) return "✅ Vinculado";
            const sugerido = cell.getRow().getData().sugerencia_nombre;
            return sugerido ? `<span class="nombre-link">🔍 ${escapeHtml(sugerido)}</span>` : "";
          },
          cellClick: (e, cell) => {
            if (cell.getValue() || !cell.getRow().getData().sugerencia_nombre) return;
            abrirInscripcion(cell.getRow().getData().id);
          }
        },
        { title: "Liga (FFCV)", field: "liga_ffcv", width: 160 },
        { title: "Equipo (FFCV)", field: "equipo_ffcv", width: 160 },
        { title: "Goles (FFCV)", field: "goles_ffcv", sorter: "number", width: 100, hozAlign: "center" }
      ]
    });

    tabla.on("tableBuilt", resolve);
    tabla.on("cellEdited", cell => guardarEdicionCelda(cell.getRow().getData()));
    tabla.on("rowSelectionChanged", actualizarBulkBar);
  });
}

async function guardarEdicionCelda(fila) {

function actualizarBulkBar(data) {

async function cargarInscritos() {
  const { data, error } = await client.from("pruebas_inscripciones")
    .select("*").eq("club_id", miClubId).order("anio_nacimiento", { ascending: false });
  if (error) { console.error("[CaptaNET] cargarInscritos:", error); return; }

  const filas = data || [];
  const jugadorIds = [...new Set(filas.map(f => f.jugador_ffcv_id).filter(Boolean))];

  if (jugadorIds.length) {
    const { data: jugadoresFfcv, error: errJ } = await client
      .from("jugadores").select("id, goles, equipos(nombre, grupos(ligas(nombre)))").in("id", jugadorIds);
    if (errJ) { console.error("[CaptaNET] jugadores FFCV:", errJ); }
    else {
      filas.forEach(f => {
        const j = (jugadoresFfcv || []).find(x => x.id === f.jugador_ffcv_id);
        if (!j) return;
        f.liga_ffcv = j.equipos?.grupos?.ligas?.nombre || null;
        f.equipo_ffcv = j.equipos?.nombre || null;
        f.goles_ffcv = j.goles ?? null;
      });
    }
  }

  const sugeridoIds = [...new Set(filas.filter(f => !f.jugador_ffcv_id).map(f => f.jugador_ffcv_sugerido_id).filter(Boolean))];
  if (sugeridoIds.length) {
    const { data: sugeridos } = await client.from("jugadores").select("id, nombre, equipos(nombre)").in("id", sugeridoIds);
    filas.forEach(f => {
      if (f.jugador_ffcv_id || !f.jugador_ffcv_sugerido_id) return;
      const j = (sugeridos || []).find(x => x.id === f.jugador_ffcv_sugerido_id);
      if (j) f.sugerencia_nombre = `${j.nombre} · ${j.equipos?.nombre || "Sin equipo"}`;
    });
  }

  tabla.setData(filas);
  poblarFiltroAnio(filas);
}

function poblarFiltroAnio(datos) {
  const sel = document.getElementById("filtro_anio");
  const actual = sel.value;
  const anios = [...new Set(datos.map(d => d.anio_nacimiento).filter(Boolean))].sort((a, b) => b - a);
  sel.innerHTML = '<option value="">Todos los años</option>' + anios.map(a => `<option value="${a}">${a}</option>`).join("");
  if (anios.map(String).includes(actual)) sel.value = actual;
}

function aplicarFiltros() {
  const q = document.getElementById("buscador").value.trim();
  const estado = document.getElementById("filtro_estado").value;
  const anio = document.getElementById("filtro_anio").value;

  tabla.setFilter((fila) => {
    if (anio && String(fila.anio_nacimiento) !== anio) return false;
    if (estado && fila.estado !== estado) return false;
    if (q && !coincideNombre(fila.nombre, q)) return false;
    return true;
  });
}

  document.getElementById("f_creado").textContent = i.creado_at
    ? "Inscrito el " + new Date(i.creado_at).toLocaleDateString("es-ES")
    : "";

  document.getElementById("f_fecha_nacimiento").value = i.fecha_nacimiento || "";
  document.getElementById("f_posicion").value = i.posicion || "";
  document.getElementById("f_email").value = i.email || "";
  document.getElementById("f_telefono").value = i.telefono || "";
  document.getElementById("f_nombre_contacto").value = i.nombre_contacto || "";
  document.getElementById("f_club_actual").value = i.club_actual || "";
  document.getElementById("f_equipo_propuesto").value = i.equipo_propuesto || "";

  const cita = document.getElementById("f_cita");

    cita.innerHTML = `<div class="detalle-cita">📅 ${fecha || "Sin día"} ${i.hora_prueba ? "· 🕒 " + i.hora_prueba.slice(0, 5) : ""} ${i.lugar_prueba ? "· 📍 " + i.lugar_prueba : ""}${i.notificado_at ? " · <span style='color:#15803d;'>avisado</span>" : ""}</div>`;
  } else {
    cita.innerHTML = "";
  }

  document.getElementById("f_estado").value = i.estado || "pendiente";
  document.getElementById("f_tecnica").value = i.tecnica ?? "";
  document.getElementById("f_tactica").value = i.tactica ?? "";
  document.getElementById("f_fisico").value = i.fisico || "";
  document.getElementById("f_actitud").value = i.actitud ?? "";
  document.getElementById("f_comentario_jugador").textContent = i.comentario || "(sin comentario)";
  document.getElementById("f_comentario_confirmacion").textContent = i.respuesta_comentario || "(sin comentario)";
  document.getElementById("f_valoracion").value = i.valoracion_comentario || "";

  const respuesta = document.getElementById("f_respuesta");
  if (i.respuesta_asistencia) {
    respuesta.innerHTML = `<span class="badge badge-${i.respuesta_asistencia}">${i.respuesta_asistencia === "si" ? "Sí asistirá" : "No asistirá"}</span>`;
  } else {
    respuesta.innerHTML = `<span style="color:var(--muted);">Aún no ha respondido</span>`;

function cerrarFicha() {
  document.getElementById("ficha").style.display = "none";
  inscripcionActual = null;
}

function actualizarFotoPruebas(url) {
  const img = document.getElementById("f_foto");
  if (url) { img.src = url; img.style.display = "block"; }
  else { img.style.display = "none"; }
}

async function renderFfcvBox() {
  const box = document.getElementById("ffcv_box");
  if (!inscripcionActual) return;

  if (inscripcionActual.jugador_ffcv_id) {
    const { data: j } = await client.from("jugadores").select("id, nombre, foto_url, equipos(nombre)")
      .eq("id", inscripcionActual.jugador_ffcv_id).single();
    actualizarFotoPruebas(j?.foto_url || null);
    box.innerHTML = j
      ? `<div class="ffcv-resultado">
           <span>${escapeHtml(j.nombre)} · ${escapeHtml(j.equipos?.nombre || "Sin equipo")}</span>
           <span style="display:flex;gap:6px;">
             <button class="secondary" style="font-size:12px;padding:5px 10px;" onclick="window.open('jugadores.html?jugador_id=${j.id}','_blank')">Ver ficha</button>
             <button class="danger" style="font-size:12px;padding:5px 10px;" onclick="quitarVinculoFfcv()">Quitar</button>
           </span>
         </div>`
      : "<p style='color:var(--muted);font-size:13px;margin:0;'>Jugador vinculado no encontrado.</p>";
    return;
  }

  actualizarFotoPruebas(null);

  if (inscripcionActual.jugador_ffcv_sugerido_id) {
    const { data: s } = await client.from("jugadores").select("id, nombre, foto_url, equipos(nombre)")
      .eq("id", inscripcionActual.jugador_ffcv_sugerido_id).single();
    if (s) {
      box.innerHTML = `
        <p style="margin:0 0 8px;font-size:13px;color:var(--muted);">Posible coincidencia encontrada automáticamente:</p>
        <div class="ffcv-resultado">
          <span style="display:flex;align-items:center;gap:10px;">
            ${s.foto_url ? `<img src="${escapeHtml(s.foto_url)}" style="width:44px;height:44px;border-radius:6px;object-fit:cover;border:1px solid var(--border);">` : ""}
            <span>${escapeHtml(s.nombre)} · ${escapeHtml(s.equipos?.nombre || "Sin equipo")}</span>
          </span>
          <span style="display:flex;gap:6px;">
            <button style="font-size:12px;padding:5px 10px;" onclick="vincularFfcv('${s.id}')">Sí, es él</button>
            <button class="secondary" style="font-size:12px;padding:5px 10px;" onclick="buscarCoincidenciasFfcv()">No, buscar otro</button>
          </span>
        </div>
        <div id="ffcv_resultados"></div>`;
      return;
    }
  }

  box.innerHTML = `<button class="secondary" style="font-size:13px;" onclick="buscarCoincidenciasFfcv()">Buscar coincidencias en FFCV</button>
    <div id="ffcv_resultados"></div>`;
}

async function buscarCoincidenciasFfcv() {
  const cont = document.getElementById("ffcv_resultados");
  cont.innerHTML = "<p style='color:var(--muted);font-size:12px;margin-top:8px;'>Buscando...</p>";

  const palabras = normalizarTexto(inscripcionActual.nombre).split(/\s+/).filter(Boolean);
  let query = client.from("jugadores").select("id, nombre, fecha_nacimiento, equipos(nombre)").limit(10);
  palabras.forEach(p => { query = query.ilike("nombre_normalizado", `%${p}%`); });
  const { data, error } = await query;

  if (error) { cont.innerHTML = `<p style="color:#dc2626;font-size:12px;">Error: ${error.message}</p>`; return; }

  const candidatos = (data || []).filter(j => {
    if (!j.fecha_nacimiento) return true;
    return new Date(j.fecha_nacimiento).getFullYear() === inscripcionActual.anio_nacimiento;
  });

  if (!candidatos.length) { cont.innerHTML = "<p style='color:var(--muted);font-size:12px;margin-top:8px;'>Sin coincidencias.</p>"; return; }

  cont.innerHTML = "";
  candidatos.forEach(j => {
    const div = document.createElement("div");
    div.className = "ffcv-resultado";
    div.innerHTML = `<span>${escapeHtml(j.nombre)} · ${escapeHtml(j.equipos?.nombre || "Sin equipo")}</span>`;
    const btn = document.createElement("button");
    btn.textContent = "Vincular";
    btn.style.cssText = "font-size:12px;padding:5px 10px;";
    btn.onclick = () => vincularFfcv(j.id);
    div.appendChild(btn);
    cont.appendChild(div);
  });
}

async function vincularFfcv(jugadorId) {
  const { error } = await client.from("pruebas_inscripciones")
    .update({ jugador_ffcv_id: jugadorId }).eq("id", inscripcionActual.id);
  if (error) { alert("Error al vincular: " + error.message); return; }
  inscripcionActual.jugador_ffcv_id = jugadorId;
  await sincronizarInforme(inscripcionActual);
  await renderFfcvBox();
  await cargarInscritos();
}

async function quitarVinculoFfcv() {
  const { error } = await client.from("pruebas_inscripciones")
    .update({ jugador_ffcv_id: null }).eq("id", inscripcionActual.id);
  if (error) { alert("Error: " + error.message); return; }
  inscripcionActual.jugador_ffcv_id = null;
  await renderFfcvBox();
  await cargarInscritos();
}

let guardarTimeout = null;
function guardarValoracionDebounced() {
  clearTimeout(guardarTimeout);
  guardarTimeout = setTimeout(guardarValoracion, 600);
}

async function guardarValoracion() {
  if (!inscripcionActual) return;
  const status = document.getElementById("status");

  const payload = {
    estado: document.getElementById("f_estado").value,
    email: document.getElementById("f_email").value.trim() || null,
    telefono: document.getElementById("f_telefono").value.trim() || null,
    nombre_contacto: document.getElementById("f_nombre_contacto").value.trim() || null,
    posicion: document.getElementById("f_posicion").value || null,
    club_actual: document.getElementById("f_club_actual").value.trim() || null,
    equipo_propuesto: document.getElementById("f_equipo_propuesto").value.trim() || null,
    tecnica: document.getElementById("f_tecnica").value || null,
    tactica: document.getElementById("f_tactica").value || null,
    fisico: document.getElementById("f_fisico").value || null,
    actitud: document.getElementById("f_actitud").value || null,
    valoracion_comentario: document.getElementById("f_valoracion").value || null,
  };

  // Nombre y fecha de nacimiento son obligatorios en la base de datos:
  // si el campo se queda vacío, no se envía y se conserva el valor anterior.
  const nombre = document.getElementById("f_nombre").value.trim();
  if (nombre) payload.nombre = nombre;
  const fechaNac = document.getElementById("f_fecha_nacimiento").value;
  if (fechaNac) {
    payload.fecha_nacimiento = fechaNac;
    payload.anio_nacimiento = new Date(fechaNac + "T00:00:00").getFullYear();
  }

  const { data, error } = await client.from("pruebas_inscripciones")
    .update(payload).eq("id", inscripcionActual.id).select().single();

  if (error) { status.textContent = "Error guardando: " + error.message; return; }

  inscripcionActual = data;

  if (inscripcionActual.jugador_ffcv_id) await sincronizarInforme(inscripcionActual);

  status.textContent = "Guardado.";
  await cargarInscritos();
}

// Cuando la inscripción ya está vinculada a un jugador FFCV, su valoración
// se vuelca también en jugadores_club para que aparezca en Informes y se
// pueda añadir desde la pestaña "Ya valorados" de Plantillas. Contactado
// siempre es "sí" porque el contacto ya viene dado por la propia prueba.
async function sincronizarInforme(inscripcion) {
  const { data: jugador } = await client.from("jugadores")
    .select("temporada_id").eq("id", inscripcion.jugador_ffcv_id).single();
  if (!jugador) return;

  const payload = {
    jugador_id: inscripcion.jugador_ffcv_id,
    club_id: miClubId,
    temporada_id: jugador.temporada_id,
    posicion: inscripcion.posicion || null,
    contacto: inscripcion.telefono || null,
    contactado: true,
    tecnica: inscripcion.tecnica || null,
    tactica: inscripcion.tactica || null,
    fisico: inscripcion.fisico || null,
    actitud: inscripcion.actitud || null,
    comentario: inscripcion.valoracion_comentario || null,
  };

  const { error } = await client.from("jugadores_club")
    .upsert(payload, { onConflict: "jugador_id,club_id,temporada_id" });
  if (error) console.error("[CaptaNET] sincronizarInforme:", error);
}

let plantillasCacheModal = [];

async function abrirModalPlantillas() {
  if (!inscripcionActual) return;
  const { data, error } = await client.from("plantillas").select("id, nombre, anio_min, anio_max").eq("club_id", miClubId).order("created_at");
  if (error) { alert("Error cargando plantillas: " + error.message); return; }
  if (!data || !data.length) {
    alert("Este club aún no tiene ninguna plantilla creada. Créala primero en la sección Plantillas.");
    return;
  }
  plantillasCacheModal = data;
  document.getElementById("ep_plantilla").innerHTML = data.map(p => `<option value="${p.id}">${p.nombre}</option>`).join("");
  document.getElementById("ep_status").textContent = "";
  document.getElementById("modal_plantillas").style.display = "flex";
  actualizarAvisoPlantilla();
}

function cerrarModalPlantillas() {
  document.getElementById("modal_plantillas").style.display = "none";
}

function avisoAnioPlantilla(plantilla) {
  const anio = inscripcionActual?.anio_nacimiento;
  if (!anio || !plantilla) return null;
  const fueraDeRango =
    (plantilla.anio_min && anio < plantilla.anio_min) ||
    (plantilla.anio_max && anio > plantilla.anio_max);
  if (!fueraDeRango) return null;
  const rango = [plantilla.anio_min, plantilla.anio_max].filter(Boolean).join("-");
  return `⚠️ Este jugador es de ${anio}, pero la plantilla es para ${rango || "otro rango"}.`;
}

function actualizarAvisoPlantilla() {
  const plantillaId = document.getElementById("ep_plantilla").value;
  const plantilla = plantillasCacheModal.find(p => p.id === plantillaId);
  const aviso = document.getElementById("ep_aviso");
  const mensaje = avisoAnioPlantilla(plantilla);
  aviso.textContent = mensaje || "";
  aviso.style.display = mensaje ? "block" : "none";
}

async function enviarAPlantilla() {
  if (!inscripcionActual) return;
  const plantillaId = document.getElementById("ep_plantilla").value;
  const plantilla = plantillasCacheModal.find(p => p.id === plantillaId);
  const status = document.getElementById("ep_status");

  const mensajeAviso = avisoAnioPlantilla(plantilla);
  if (mensajeAviso && !confirm(mensajeAviso + " ¿Enviar de todas formas?")) return;

  const payload = { plantilla_id: plantillaId, pos_x: 50, pos_y: 50 };
  if (inscripcionActual.jugador_ffcv_id) {
    payload.jugador_id = inscripcionActual.jugador_ffcv_id;
  } else {
    payload.nombre_manual = inscripcionActual.nombre;
    payload.club_manual = inscripcionActual.equipo_propuesto || inscripcionActual.club_actual || null;
    payload.posicion_manual = inscripcionActual.posicion || null;
    payload.anio_manual = inscripcionActual.anio_nacimiento || null;
  }

  const { error } = await client.from("plantilla_jugadores").insert(payload);

  if (error) {
    status.textContent = esErrorDuplicado(error) ? "El jugador ya está añadido a la plantilla." : "Error: " + error.message;
    return;
  }

  status.textContent = "¡Añadido a la plantilla!";
  setTimeout(cerrarModalPlantillas, 1200);
}

async function eliminarInscripcion() {
  if (!inscripcionActual) return;
  if (!confirm("¿Eliminar esta inscripción? No se puede deshacer.")) return;

  const { error } = await client.from("pruebas_inscripciones").delete().eq("id", inscripcionActual.id);
  if (error) { document.getElementById("status").textContent = "Error eliminando: " + error.message; return; }

  cerrarFicha();
  await cargarInscritos();
}

// Enseña exactamente el email que se va a mandar, con el nombre del
// primer jugador seleccionado como ejemplo — así no hace falta entender
// ningún código ni marcador para saber qué van a recibir.
function actualizarPreviaConvocatoria() {
  const dia = document.getElementById("mc_dia").value;
  const hora = document.getElementById("mc_hora").value;
  const lugar = document.getElementById("mc_lugar").value.trim();
  const nota = document.getElementById("mc_nota").value.trim();

  const diaFmt = dia ? new Date(dia + "T00:00:00").toLocaleDateString("es-ES") : null;

  let html = `Hola <b>${escapeHtml(nombreEjemploConvocatoria || "Jugador")}</b>,<br>Te confirmamos tu prueba:<br>`;
  html += "<ul style='margin:6px 0;padding-left:18px;'>";
  html += `<li>📅 Día: ${diaFmt ? escapeHtml(diaFmt) : "<i>(sin indicar)</i>"}</li>`;
  html += `<li>🕒 Hora: ${hora ? escapeHtml(hora) : "<i>(sin indicar)</i>"}</li>`;
  html += `<li>📍 Lugar: ${lugar ? escapeHtml(lugar) : "<i>(sin indicar)</i>"}</li>`;
  html += "</ul>";
  if (nota) html += `${escapeHtml(nota).replace(/\n/g, "<br>")}<br>`;
  html += "<button style='margin-top:6px;font-size:12px;padding:6px 10px;' disabled>Confirmar asistencia</button>";

  document.getElementById("mc_previa").innerHTML = html;
}

async function enviarConvocatoria() {
  const btn = document.getElementById("btn_enviar_convocatoria");
  const status = document.getElementById("modal_status");
  const asunto = document.getElementById("mc_asunto").value.trim();
  if (!asunto) { status.textContent = "Falta el asunto."; return; }

  const seleccion = tabla.getSelectedData();
  if (!seleccion.length) { status.textContent = "No hay inscritos seleccionados."; return; }

  btn.disabled = true;
  status.textContent = "Enviando...";

  const { data, error } = await client.functions.invoke("pruebas-enviar-convocatoria", {
    body: {
      inscripcion_ids: seleccion.map(i => i.id),
      asunto,
      nota: document.getElementById("mc_nota").value.trim() || null,
      dia: document.getElementById("mc_dia").value || null,
      hora: document.getElementById("mc_hora").value || null,
      lugar: document.getElementById("mc_lugar").value || null,
    }
  });

  btn.disabled = false;

  if (error) { status.textContent = "Error: " + (await mensajeError(error)); return; }

  let resumen = `Enviados: ${data.enviados}.`;
  if (data.sin_email?.length) resumen += ` Sin email: ${data.sin_email.length}.`;
  if (data.fallidos?.length) resumen += ` Fallidos: ${data.fallidos.length}.`;
  status.textContent = resumen;

  tabla.deselectRow();
  await cargarInscritos();
  setTimeout(cerrarModalConvocatoria, 1800);
}

async function mensajeError(error) {
  if (!error) return "";
  if (error.context && typeof error.context.json === "function") {
    try {
      const body = await error.context.json();
      if (body?.error) return typeof body.error === "string" ? body.error : JSON.stringify(body.error);
    } catch (e) {}
  }
  return error.message || "Error desconocido";
}
