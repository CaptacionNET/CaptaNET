<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CaptaNET - Informes</title>
<!-- Modo pop-up (embebido desde la Ruta): se marca AL INSTANTE, antes de pintar
     nada, para que la navegación no aparezca ni medio segundo. -->
<script>if(new URLSearchParams(location.search).get("modal")==="1")document.documentElement.classList.add("modal-embebido");</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--primary:#2563eb;--bg:#f5f6fa;--card:#fff;--border:#e2e4eb;--text:#1f2430;--muted:#6b7280;}
*{box-sizing:border-box;}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);}
#topbar{display:flex;justify-content:space-between;align-items:center;padding:14px 24px;background:var(--card);border-bottom:1px solid var(--border);flex-wrap:wrap;gap:10px;}
#topbar .brand{font-weight:700;font-size:18px;color:var(--primary);}
button{background:var(--primary);color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:14px;}
button:hover{opacity:.9;}
button.secondary{background:#fff;color:var(--text);border:1px solid var(--border);}
button.secondary.active{background:#eff6ff;color:var(--primary);border-color:var(--primary);font-weight:700;}
button.danger{background:#fff;color:#dc2626;border:1px solid #fecaca;}
input,select,textarea{padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:14px;font-family:inherit;}
label{font-size:12px;color:var(--muted);display:block;margin-bottom:4px;}
.barra{display:flex;gap:10px;align-items:center;flex-wrap:wrap;padding:16px 24px;}
.layout{display:flex;gap:20px;padding:0 24px 24px;align-items:flex-start;}
.panel{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;width:300px;flex-shrink:0;}
.panel h3{margin:0 0 10px;font-size:15px;}
.panel-tabs{display:flex;gap:6px;margin-bottom:12px;}
.panel-tab{flex:1;padding:6px;border:1px solid var(--border);background:#fff;border-radius:6px;cursor:pointer;font-size:12px;text-align:center;}
.panel-tab.active{background:var(--primary);color:#fff;border-color:var(--primary);}
.resultado{border:1px solid var(--border);border-radius:6px;padding:8px 10px;margin-bottom:6px;font-size:13px;cursor:pointer;}
.resultado:hover{border-color:var(--primary);}
.resultado .nombre{font-weight:600;}
.resultado .meta{color:var(--muted);font-size:12px;}
.ficha{flex:1;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:24px;min-width:0;}
.ficha-vacia{color:var(--muted);text-align:center;padding:60px 20px;}
.ficha-cab{display:flex;gap:20px;margin-bottom:20px;}
.foto-wrap{width:120px;height:120px;border-radius:10px;background:#eef0f5;flex-shrink:0;overflow:hidden;position:relative;border:1px solid var(--border);}
.foto-wrap img{width:100%;height:100%;object-fit:cover;cursor:zoom-in;}
.foto-wrap .foto-placeholder{display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);font-size:12px;text-align:center;padding:8px;}
.lightbox-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);display:none;align-items:center;justify-content:center;z-index:500;cursor:zoom-out;padding:20px;}
.lightbox-overlay img{max-width:100%;max-height:100%;border-radius:8px;}
.ficha-info h2{margin:0 0 4px;font-size:22px;}
.ficha-info p{margin:0;color:var(--muted);font-size:14px;}
.campos-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px;}
.campo-full{grid-column:1 / -1;}
.status{font-weight:600;color:var(--muted);margin:12px 0 0;}
.tick{display:flex;align-items:center;gap:8px;}
.badge{display:inline-block;font-size:10px;font-weight:700;text-transform:uppercase;padding:2px 7px;border-radius:4px;margin-top:3px;}
.badge-descartar{background:#fee2e2;color:#b91c1c;}
.badge-seguir{background:#f1f5f9;color:#475569;}
.badge-interesante{background:#fef3c7;color:#a8791f;}
.badge-firmar{background:#dbeafe;color:#1d4ed8;}
.badge-firmado{background:#dcfce7;color:#15803d;}
@media (max-width:800px){
  .layout{flex-direction:column;padding:0 12px 24px;}
  .panel,.ficha{width:100%;}
  .barra{padding:12px;}
}
@media (max-width:500px){
  #topbar{padding:12px 16px;}
  .campos-grid{grid-template-columns:1fr;}
  .ficha-cab{flex-wrap:wrap;}
  .foto-wrap{width:90px;height:90px;}
}
/* Modo embebido en ventana emergente (desde la Ruta): foto arriba, campos del
   informe, historial abajo. Sin navegación, panel, nombre (va en la cabecera
   del pop-up) ni campos que no se rellenan durante el partido. */
.modal-embebido body{background:#fff;}
.modal-embebido #topbar,
.modal-embebido .barra,
.modal-embebido .panel,
.modal-embebido .ficha-info,
.modal-embebido #campo_contactado,
.modal-embebido #campo_plantillas,
.modal-embebido #campo_link_veo{display:none !important;}
.modal-embebido .layout{padding:12px;gap:0;}
.modal-embebido .ficha{border:0;padding:0;}
.modal-embebido .ficha-cab{margin-bottom:14px;}
</style>
</head>
<body>

<div id="topbar">
  <div class="brand"><img id="brand_escudo" style="display:none;height:26px;width:26px;object-fit:contain;border-radius:4px;vertical-align:middle;margin-right:6px;">CaptaNET · Informes</div>
  <div style="display:flex;gap:10px;flex-wrap:wrap;">
    <button class="secondary" onclick="atras()">← Atrás</button>
    <button class="secondary" onclick="window.location.href='visor.html'">Visor</button>
    <button class="secondary active" onclick="window.location.href='jugadores.html'">Informes</button>
    <button class="secondary" onclick="window.location.href='equipos.html'">Equipos</button>
    <button class="secondary" onclick="window.location.href='plantillas.html'">Plantillas</button>
    <button class="secondary" onclick="window.location.href='gestion_pruebas.html'">Pruebas</button>
    <button class="secondary" onclick="window.location.href='ruta.html'">Ruta</button>
    <button class="secondary" onclick="window.location.href='usuario.html'">Mi perfil</button>

    <button id="btn_admin" class="secondary" style="display:none;" onclick="window.location.href='admin.html'">Panel Admin</button>
    <button class="secondary" onclick="logout()">Cerrar sesión</button>

</div>

<div class="barra">
  <button id="btn_volver_partido" style="display:none;" onclick="volverAlPartido()">← Volver al partido</button>
  <div id="campo_club_wrap" style="display:none;">
    <select id="filtro_club" onchange="onClubChange()"></select>
  </div>
</div>

<div class="layout">
  <div class="panel">
    <div class="panel-tabs">
      <div class="panel-tab active" id="tab_informes" onclick="cambiarPanel('informes')">Mis informes</div>
      <div class="panel-tab" id="tab_nuevo" onclick="cambiarPanel('nuevo')">Nuevo informe</div>
    </div>

    <div id="panel_informes">
      <input id="buscador_informes" type="text" placeholder="Buscar..." style="width:100%;margin-bottom:10px;" oninput="filtrarInformes()">
      <div style="display:flex;gap:8px;margin-bottom:10px;">
        <select id="filtro_informes_valoracion" style="flex:1;min-width:0;" onchange="filtrarInformes()">
          <option value="">Todas las valoraciones</option>
          <option value="sin_valorar">Sin valorar</option>
          <option value="descartar">Descartar</option>
          <option value="seguir">Seguir</option>
          <option value="interesante">Interesante</option>
          <option value="firmar">Firmar</option>
          <option value="firmado">Firmado</option>
        </select>
        <select id="filtro_informes_anio" style="flex:1;min-width:0;" onchange="filtrarInformes()">
          <option value="">Todos los años</option>
        </select>
      </div>
      <div id="lista_informes"></div>
    </div>

    <div id="panel_nuevo" style="display:none;">
      <input id="buscador_nuevo" type="text" placeholder="Buscar jugador por nombre..." style="width:100%;margin-bottom:10px;" oninput="buscarNuevo()">
      <div id="resultados_nuevo"></div>

  </div>

  <div class="ficha" id="ficha">
    <div class="ficha-vacia" id="ficha_vacia">Elige un jugador de la lista, o crea un informe nuevo buscándolo por nombre.</div>

    <div id="ficha_contenido" style="display:none;">
      <div class="ficha-cab">
        <div id="foto_bloque" style="display:flex;gap:10px;flex-wrap:wrap;">
          <div>
            <div class="foto-wrap" id="foto_ffcv_wrap">
              <div class="foto-placeholder" id="foto_ffcv_placeholder">Sin foto FFCV</div>
              <img id="foto_ffcv_img" style="display:none;" onclick="abrirLightbox(this.src)">
            </div>

          </div>
          <div>

              <img id="foto_img" style="display:none;" onclick="abrirLightbox(this.src)">

            <input id="f_foto_input" type="file" accept="image/*" style="display:none;" onchange="subirFotoInforme(event)">
            <a id="btn_eliminar_foto" onclick="eliminarFotoInforme()" style="display:none;margin-top:2px;font-size:11px;color:#dc2626;cursor:pointer;text-decoration:underline;text-align:center;">🗑️ Eliminar foto</a>

        <div>

            <option>MEDIO-ALTO</option>
            <option>ALTO</option>
            <option>MUY ALTO</option>
          </select>
        </div>
        <div>
          <label>Actitud (1-10)</label>
          <input id="f_actitud" type="number" min="1" max="10" oninput="guardarInformeDebounced()">
        </div>
        <div class="campo-full" id="campo_link_veo">

</div>

<div class="modal-overlay" id="modal_plantillas" style="position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:200;padding:20px;">

<div class="lightbox-overlay" id="lightbox" onclick="cerrarLightbox()">

</div>

<script>
const client = supabase.createClient(
  "https://bnqoisjvboytiphiwosj.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJucW9pc2p2Ym95dGlwaGl3b3NqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2MDgwMTcsImV4cCI6MjA5OTE4NDAxN30.RpTr0Z17ZRFwTpBvsmNwyqtEm0nLVWxM96mxaLxDbes"
);

// Búsqueda por nombre sin distinguir acentos ni el orden de las palabras:
// "MARCOS VERA" debe encontrar a "VERA PEREZ, MARCOS".
function normalizarTexto(s) {
  return (s || "").toString().normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
}
function coincideNombre(nombre, consulta) {
  const nombreNorm = normalizarTexto(nombre);
  const palabras = normalizarTexto(consulta).trim().split(/\s+/).filter(Boolean);
  return palabras.every(p => nombreNorm.includes(p));
}

// El código 23505 de Postgres es "unique_violation": aquí salta cuando
// el jugador ya está en la plantilla (restricción plantilla_jugadores_unicos).
function esErrorDuplicado(error) {
  return error?.code === "23505" || /plantilla_jugadores_unicos/.test(error?.message || "");
}

let esAdmin = false;
let miClubId = null;
let informesCache = [];
let jugadorActual = null;

async function protegerPagina() {
  const { data: session } = await client.auth.getSession();
  if (!session.session) { window.location.href = "index.html"; return false; }

  const { data: perfil, error } = await client
    .from("profiles").select("is_admin, is_club_admin, club_id, clubs(escudo_url)").eq("id", session.session.user.id).single();

  if (error) {
    document.body.insertAdjacentHTML("afterbegin", `<p style="background:#fef2f2;color:#dc2626;border-bottom:1px solid #fecaca;padding:10px 24px;margin:0;font-size:14px;">Error cargando tu perfil: ${error.message}</p>`);
    return false;
  }

  esAdmin = !!perfil?.is_admin;
  miClubId = perfil?.club_id || null;

  if (esAdmin) document.getElementById("btn_admin").style.display = "inline-block";
  if (perfil?.is_club_admin) document.getElementById("btn_equipo").style.display = "inline-block";
  if (perfil?.clubs?.escudo_url) {
    const img = document.getElementById("brand_escudo");
    img.src = perfil.clubs.escudo_url;
    img.style.display = "inline-block";
  }

  return true;
}

function atras() {
  if (window.history.length > 1) window.history.back();
  else window.location.href = "visor.html";
}

async function logout() {
  await client.auth.signOut();
  window.location.href = "index.html";
}

async function cargarClubsSiAdmin() {
  if (!esAdmin) return;
  document.getElementById("campo_club_wrap").style.display = "block";
  const { data: clubs } = await client.from("clubs").select("id, nombre").order("nombre");
  const sel = document.getElementById("filtro_club");
  sel.innerHTML = "";
  (clubs || []).forEach(c => sel.innerHTML += `<option value="${c.id}">${c.nombre}</option>`);
  if (clubs && clubs.length) miClubId = clubs[0].id;
}

function onClubChange() {
  miClubId = document.getElementById("filtro_club").value;
  cargarInformes();
}

function cambiarPanel(nombre) {
  document.getElementById("panel_informes").style.display = nombre === "informes" ? "block" : "none";
  document.getElementById("panel_nuevo").style.display = nombre === "nuevo" ? "block" : "none";
  document.getElementById("tab_informes").classList.toggle("active", nombre === "informes");
  document.getElementById("tab_nuevo").classList.toggle("active", nombre === "nuevo");
}

function tieneDatosPrivado(p) {
  return !!(p.posicion || p.contacto || p.contactado || p.equipo_propuesto ||
    p.tecnica || p.tactica || p.fisico || p.actitud || (p.comentario && String(p.comentario).trim()) ||
    p.foto_url || p.link_veo || p.valoracion_scouting);
}

const ETIQUETA_VALORACION = { descartar: "Descartar", seguir: "Seguir", interesante: "Interesante", firmar: "Firmar", firmado: "Firmado" };

async function cargarInformes() {
  const { data: privados } = await client.from("jugadores_club").select("*").eq("club_id", miClubId);
  const conDatos = (privados || []).filter(tieneDatosPrivado);

  if (!conDatos.length) { informesCache = []; renderListaInformes([]); return; }

  const ids = conDatos.map(p => p.jugador_id);
  const { data: jugadores } = await client.from("jugadores").select("*").in("id", ids);

  const equipoIds = [...new Set((jugadores || []).map(j => j.equipo_id).filter(Boolean))];
  const { data: equipos } = equipoIds.length
    ? await client.from("equipos").select("id, nombre").in("id", equipoIds)
    : { data: [] };

  informesCache = (jugadores || []).map(j => {
    const equipo = (equipos || []).find(e => e.id === j.equipo_id);
    const priv = conDatos.find(p => p.jugador_id === j.id);
    const anio = priv?.anio_nacimiento || (j.fecha_nacimiento ? new Date(j.fecha_nacimiento).getFullYear() : null);
    return { id: j.id, nombre: j.nombre, equipo: equipo?.nombre || "", anio, valoracion: priv?.valoracion_scouting || null, equipo_propuesto: priv?.equipo_propuesto || null };
  }).sort((a, b) => a.nombre.localeCompare(b.nombre));

  poblarFiltroAnioInformes();
  filtrarInformes();
}

function poblarFiltroAnioInformes() {
  const sel = document.getElementById("filtro_informes_anio");
  const actual = sel.value;
  const anios = [...new Set(informesCache.map(j => j.anio).filter(Boolean))].sort((a, b) => b - a);
  sel.innerHTML = '<option value="">Todos los años</option>' + anios.map(a => `<option value="${a}">${a}</option>`).join("");
  if (anios.map(String).includes(actual)) sel.value = actual;
}

function renderListaInformes(lista) {
  const cont = document.getElementById("lista_informes");
  if (!lista.length) { cont.innerHTML = "<p style='color:var(--muted);font-size:12px;'>Aún no tienes informes.</p>"; return; }
  cont.innerHTML = "";
  lista.forEach(j => {
    const div = document.createElement("div");
    div.className = "resultado";
    div.onclick = () => abrirJugador(j.id);
    div.innerHTML = `<div class="nombre">${j.nombre}${j.anio ? " · " + j.anio : ""}</div><div class="meta">${j.equipo}${j.equipo_propuesto ? " → " + j.equipo_propuesto : ""}</div>` +
      (j.valoracion ? `<span class="badge badge-${j.valoracion}">${ETIQUETA_VALORACION[j.valoracion] || j.valoracion}</span>` : "");
    cont.appendChild(div);
  });
}

function filtrarInformes() {
  const q = document.getElementById("buscador_informes").value.trim();
  const valoracion = document.getElementById("filtro_informes_valoracion").value;
  const anio = document.getElementById("filtro_informes_anio").value;

  let lista = informesCache;
  if (q) lista = lista.filter(j => coincideNombre(j.nombre, q));
  if (valoracion === "sin_valorar") lista = lista.filter(j => !j.valoracion);
  else if (valoracion) lista = lista.filter(j => j.valoracion === valoracion);
  if (anio) lista = lista.filter(j => String(j.anio) === anio);

  renderListaInformes(lista);
}

let buscarNuevoTimeout = null;
function buscarNuevo() {
  clearTimeout(buscarNuevoTimeout);
  buscarNuevoTimeout = setTimeout(ejecutarBusquedaNueva, 300);
}

async function ejecutarBusquedaNueva() {
  const q = document.getElementById("buscador_nuevo").value.trim();
  const cont = document.getElementById("resultados_nuevo");
  if (!q) { cont.innerHTML = ""; return; }

  // Cada palabra debe aparecer (en cualquier orden, sin acentos) en el nombre.
  const palabras = normalizarTexto(q).split(/\s+/).filter(Boolean);
  let consulta = client.from("jugadores").select("*").limit(20);
  palabras.forEach(p => { consulta = consulta.ilike("nombre_normalizado", `%${p}%`); });
  const { data: jugadores } = await consulta;
  if (!jugadores || !jugadores.length) { cont.innerHTML = "<p style='color:var(--muted);font-size:12px;'>Sin resultados.</p>"; return; }

  const equipoIds = [...new Set(jugadores.map(j => j.equipo_id).filter(Boolean))];
  const { data: equipos } = equipoIds.length
    ? await client.from("equipos").select("id, nombre").in("id", equipoIds)
    : { data: [] };

  cont.innerHTML = "";
  jugadores.forEach(j => {
    const equipo = (equipos || []).find(e => e.id === j.equipo_id);
    const div = document.createElement("div");
    div.className = "resultado";
    div.onclick = () => abrirJugador(j.id);
    div.innerHTML = `<div class="nombre">${j.nombre}</div><div class="meta">${equipo?.nombre || "Sin equipo"}</div>`;
    cont.appendChild(div);
  });
}

async function abrirJugador(jugadorId) {
  const { data: j } = await client.from("jugadores").select("*").eq("id", jugadorId).single();
  if (!j) return;

  const equipo = j.equipo_id
    ? (await client.from("equipos").select("nombre").eq("id", j.equipo_id).single()).data
    : null;

  const { data: priv } = await client
    .from("jugadores_club").select("*").eq("club_id", miClubId).eq("jugador_id", jugadorId).maybeSingle();

  jugadorActual = { ...j, equipo: equipo?.nombre || "", privado: priv || {} };

  document.getElementById("ficha_vacia").style.display = "none";
  document.getElementById("ficha_contenido").style.display = "block";

  document.getElementById("f_nombre").textContent = j.nombre;
  document.getElementById("f_sub").textContent =
    [jugadorActual.equipo, j.posicion, j.dorsal ? "Dorsal " + j.dorsal : null,
     j.fecha_nacimiento ? new Date(j.fecha_nacimiento).getFullYear() : null]
      .filter(Boolean).join(" · ");

  document.getElementById("f_valoracion").value = priv?.valoracion_scouting || "";
  document.getElementById("f_posicion").value = priv?.posicion || "";
  document.getElementById("f_equipo_propuesto").value = priv?.equipo_propuesto || "";
  document.getElementById("f_contacto").value = priv?.contacto || "";
  document.getElementById("f_contactado").checked = !!priv?.contactado;
  document.getElementById("f_tecnica").value = priv?.tecnica ?? "";
  document.getElementById("f_tactica").value = priv?.tactica ?? "";
  document.getElementById("f_fisico").value = priv?.fisico || "";
  document.getElementById("f_actitud").value = priv?.actitud ?? "";
  document.getElementById("f_comentario").value = priv?.comentario || "";
  document.getElementById("f_link_veo").value = priv?.link_veo || "";
  document.getElementById("foto_status").textContent = "";

  // La foto de FFCV y la del club se muestran por separado: subir una
  // propia no sustituye a la de FFCV, se guarda aparte.
  actualizarFotoFfcvUI(j.foto_url || null);
  actualizarFotoUI(priv?.foto_url || null);

  document.getElementById("btn_eliminar_informe").style.display = tieneDatosPrivado(priv || {}) ? "inline-block" : "none";

  // Estadísticas de la temporada (viene de FFCV). La FFCV solo deja
  // consultar las de la temporada activa del jugador, así que en cuanto
  // empieza una temporada nueva las de la anterior se guardan aparte
  // (columnas "_anterior") la primera vez que se detecta el cambio,
  // porque después ya no se pueden volver a pedir. Se muestran plegadas
  // dentro de su propia fila del historial (la de esa misma temporada),
  // en vez de en un bloque aparte.
  const tarjetaStat = (valor, label) => `<div style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 4px;text-align:center;"><div style="font-size:18px;font-weight:700;">${valor ?? "-"}</div><div style="font-size:11px;color:var(--muted);">${label}</div></div>`;
  const gridStats = (d) =>
    "<div style='display:grid;grid-template-columns:repeat(auto-fit,minmax(70px,1fr));gap:8px;'>" +
    tarjetaStat(d.partidos_jugados, "Jugados") +
    tarjetaStat(d.partidos_titular, "Titular") +
    tarjetaStat(d.partidos_suplente, "Suplente") +
    tarjetaStat(d.goles, "Goles") +
    tarjetaStat(d.minutos_jugados, "Minutos") +
    tarjetaStat(d.tarjetas_amarillas, "Amarillas") +
    tarjetaStat(d.tarjetas_rojas, "Rojas") +
    "</div>";
  const statsAnterior = {
    partidos_jugados: j.partidos_jugados_anterior, partidos_titular: j.partidos_titular_anterior,
    partidos_suplente: j.partidos_suplente_anterior, goles: j.goles_anterior,
    minutos_jugados: j.minutos_jugados_anterior, tarjetas_amarillas: j.tarjetas_amarillas_anterior,
    tarjetas_rojas: j.tarjetas_rojas_anterior,
  };

  // Historial de clubes/categorías (viene de FFCV)
  const hist = Array.isArray(j.historial) ? j.historial.slice().reverse() : [];
  const contHist = document.getElementById("f_historial");
  if (hist.length) {
    contHist.style.display = "block";
    const filas = hist.map((h, i) => {
      let stats = null;
      if (j.temporada_stats_cod && h.cod_temporada && h.cod_temporada === j.temporada_stats_cod) stats = j;
      else if (j.temporada_anterior_cod && h.cod_temporada && h.cod_temporada === j.temporada_anterior_cod) stats = statsAnterior;

      const idFila = `hist_stats_${i}`;
      const flecha = stats
        ? `<button type="button" onclick="toggleHistorialStats('${idFila}')" title="Ver estadísticas" style="background:#eff6ff;border:1px solid var(--primary);border-radius:6px;cursor:pointer;color:var(--primary);font-size:16px;line-height:1;padding:6px 10px;flex-shrink:0;">▾</button>`
        : "";
      const principal = `<tr style='border-top:1px solid var(--border);'><td style='padding:5px 8px;'>${h.temporada || ""}</td><td style='padding:5px 8px;'>${h.equipo || ""}</td><td style='padding:5px 8px;'><div style='display:flex;align-items:center;justify-content:space-between;gap:8px;'><span>${h.categoria || ""}</span>${flecha}</div></td></tr>`;
      const desplegable = stats
        ? `<tr id="${idFila}" style="display:none;"><td colspan="3" style="padding:4px 8px 16px;background:var(--bg);">${gridStats(stats)}</td></tr>`
        : "";
      return principal + desplegable;
    }).join("");

    contHist.innerHTML =
      "<h3 style='font-size:14px;margin:18px 0 8px;'>Historial</h3>" +
      "<div style='overflow-x:auto;'><table style='width:100%;border-collapse:collapse;font-size:13px;'>" +
      "<tr style='text-align:left;color:var(--muted);'><th style='padding:5px 8px;'>Temporada</th><th style='padding:5px 8px;'>Equipo</th><th style='padding:5px 8px;'>Categoría</th></tr>" +
      filas +
      "</table></div>";
  } else {
    contHist.style.display = "none";
    contHist.innerHTML = "";
  }

  document.getElementById("status").textContent = "";
}

let guardarInformeTimeout = null;
function guardarInformeDebounced() {
  clearTimeout(guardarInformeTimeout);
  guardarInformeTimeout = setTimeout(guardarInforme, 600);
}

async function guardarInforme() {
  if (!jugadorActual) return;
  const status = document.getElementById("status");

  const payload = {
    jugador_id: jugadorActual.id,
    club_id: miClubId,
    temporada_id: jugadorActual.temporada_id,
    valoracion_scouting: document.getElementById("f_valoracion").value || null,
    posicion: document.getElementById("f_posicion").value || null,
    equipo_propuesto: document.getElementById("f_equipo_propuesto").value || null,
    contacto: document.getElementById("f_contacto").value || null,
    contactado: document.getElementById("f_contactado").checked,
    tecnica: document.getElementById("f_tecnica").value || null,
    tactica: document.getElementById("f_tactica").value || null,
    fisico: document.getElementById("f_fisico").value || null,
    actitud: document.getElementById("f_actitud").value || null,
    comentario: document.getElementById("f_comentario").value || null,
    link_veo: document.getElementById("f_link_veo").value || null
  };

  if (jugadorActual.privado?.foto_url) payload.foto_url = jugadorActual.privado.foto_url;

  const { data, error } = await client.from("jugadores_club")
    .upsert(payload, { onConflict: "jugador_id,club_id,temporada_id" }).select().single();

  if (error) { status.textContent = "Error guardando: " + error.message; return; }

  jugadorActual.privado = data;
  status.textContent = "Guardado.";
  cargarInformes();
}

let plantillasCacheModal = [];

async function abrirModalPlantillas() {
  if (!jugadorActual) return;
  const { data, error } = await client.from("plantillas").select("id, nombre, anio_min, anio_max").eq("club_id", miClubId).order("created_at");
  if (error) { alert("Error cargando plantillas: " + error.message); return; }
  if (!data || !data.length) {
    alert("Este club aún no tiene ninguna plantilla creada. Créala primero en la sección Plantillas.");
    return;
  }
  plantillasCacheModal = data;
  document.getElementById("ep_plantilla").innerHTML = data.map(p => `<option value="${p.id}">${p.nombre}</option>`).join("");
  document.getElementById("ep_status").textContent = "";
  document.getElementById("modal_plantillas").style.display = "flex";
  actualizarAvisoPlantilla();
}

function cerrarModalPlantillas() {
  document.getElementById("modal_plantillas").style.display = "none";
}

function avisoAnioPlantilla(plantilla) {
  const anio = jugadorActual?.fecha_nacimiento ? new Date(jugadorActual.fecha_nacimiento).getFullYear() : null;
  if (!anio || !plantilla) return null;
  const fueraDeRango =
    (plantilla.anio_min && anio < plantilla.anio_min) ||
    (plantilla.anio_max && anio > plantilla.anio_max);
  if (!fueraDeRango) return null;
  const rango = [plantilla.anio_min, plantilla.anio_max].filter(Boolean).join("-");
  return `⚠️ Este jugador es de ${anio}, pero la plantilla es para ${rango || "otro rango"}.`;
}

function actualizarAvisoPlantilla() {
  const plantillaId = document.getElementById("ep_plantilla").value;
  const plantilla = plantillasCacheModal.find(p => p.id === plantillaId);
  const aviso = document.getElementById("ep_aviso");
  const mensaje = avisoAnioPlantilla(plantilla);
  aviso.textContent = mensaje || "";
  aviso.style.display = mensaje ? "block" : "none";
}

async function enviarAPlantilla() {
  if (!jugadorActual) return;
  const plantillaId = document.getElementById("ep_plantilla").value;
  const plantilla = plantillasCacheModal.find(p => p.id === plantillaId);
  const status = document.getElementById("ep_status");

  const mensajeAviso = avisoAnioPlantilla(plantilla);
  if (mensajeAviso && !confirm(mensajeAviso + " ¿Enviar de todas formas?")) return;

  const { error } = await client.from("plantilla_jugadores")
    .insert({ plantilla_id: plantillaId, jugador_id: jugadorActual.id, pos_x: 50, pos_y: 50 });

  if (error) {
    status.textContent = esErrorDuplicado(error) ? "El jugador ya está añadido a la plantilla." : "Error: " + error.message;
    return;
  }

  status.textContent = "¡Añadido a la plantilla!";
  setTimeout(cerrarModalPlantillas, 1200);
}

async function eliminarInforme() {
  if (!jugadorActual) return;
  if (!confirm("¿Eliminar el informe de este jugador? Se borrará toda la valoración (posición, técnica, táctica, físico, actitud, contacto y comentario). No se puede deshacer.")) return;

  const status = document.getElementById("status");
  const { error } = await client.from("jugadores_club")
    .delete().eq("jugador_id", jugadorActual.id).eq("club_id", miClubId);

  if (error) { status.textContent = "Error eliminando: " + error.message; return; }

  jugadorActual.privado = {};
  document.getElementById("f_valoracion").value = "";
  document.getElementById("f_posicion").value = "";
  document.getElementById("f_equipo_propuesto").value = "";
  document.getElementById("f_contacto").value = "";
  document.getElementById("f_contactado").checked = false;
  document.getElementById("f_tecnica").value = "";
  document.getElementById("f_tactica").value = "";
  document.getElementById("f_fisico").value = "";
  document.getElementById("f_actitud").value = "";
  document.getElementById("f_comentario").value = "";
  document.getElementById("f_link_veo").value = "";
  document.getElementById("btn_eliminar_informe").style.display = "none";
  actualizarFotoUI(null);

  status.textContent = "Informe eliminado.";
  cargarInformes();
}

}

  if (url) {

    fotoPlaceholder.style.display = "flex";

async function eliminarFotoInforme() {
  if (!jugadorActual) return;
  if (!confirm("¿Eliminar la foto subida? No se puede deshacer.")) return;

  const status = document.getElementById("foto_status");
  const { error } = await client.from("jugadores_club")
    .update({ foto_url: null }).eq("jugador_id", jugadorActual.id).eq("club_id", miClubId);

  if (error) { status.textContent = "Error eliminando: " + error.message; return; }

  jugadorActual.privado = { ...jugadorActual.privado, foto_url: null };
  actualizarFotoUI(null);
  status.textContent = "Foto eliminada.";
  cargarInformes();
}

// Se reduce en el propio navegador antes de subirla (máx. 800px de lado,
// calidad 0.8): así la subida es rápida incluso con mala cobertura en un
// campo de fútbol, y ocupa poco en el almacenamiento.
function redimensionarImagen(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const max = 800;
      const escala = Math.min(1, max / Math.max(img.width, img.height));
      const canvas = document.createElement("canvas");
      canvas.width = Math.round(img.width * escala);
      canvas.height = Math.round(img.height * escala);
      canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
      resolve(canvas.toDataURL("image/jpeg", 0.8));
    };
    img.onerror = reject;
    img.src = URL.createObjectURL(file);
  });
}

async function subirFotoInforme(event) {
  const file = event.target.files[0];
  event.target.value = "";
  if (!file || !jugadorActual) return;

  const status = document.getElementById("foto_status");
  status.textContent = "Subiendo...";

  try {
    const dataUri = await redimensionarImagen(file);

    const { data, error } = await client.functions.invoke("subir-foto-informe", {
      body: { jugador_id: jugadorActual.id, data_uri: dataUri }
    });

    if (error || !data?.url) {
      status.textContent = "Error: " + (error ? await mensajeError(error) : "no se pudo subir la foto.");
      return;
    }

    const payload = {
      jugador_id: jugadorActual.id,
      club_id: miClubId,
      temporada_id: jugadorActual.temporada_id,
      foto_url: data.url
    };
    const { data: fila, error: errGuardar } = await client.from("jugadores_club")
      .upsert(payload, { onConflict: "jugador_id,club_id,temporada_id" }).select().single();

    if (errGuardar) { status.textContent = "Error guardando: " + errGuardar.message; return; }

    jugadorActual.privado = fila;
    actualizarFotoUI(data.url);
    document.getElementById("btn_eliminar_informe").style.display = "inline-block";
    status.textContent = "Foto actualizada.";
    cargarInformes();
  } catch (e) {
    status.textContent = "Error al procesar la imagen.";
  }
}

async function mensajeError(error) {
  if (!error) return "";
  if (error.context && typeof error.context.json === "function") {
    try {
      const body = await error.context.json();
      if (body?.error) return typeof body.error === "string" ? body.error : JSON.stringify(body.error);
    } catch (e) {}
  }
  return error.message || "Error desconocido";
}

// Cuando se llega desde un partido de la Ruta (para hacer el informe), se
// muestra un botón para volver justo a ese partido donde estabas.
function volverAlPartido() {
  const rp = new URLSearchParams(window.location.search).get("rp");
  window.location.href = rp ? "ruta.html?partido=" + rp : "ruta.html";
}

async function abrirDesdeUrl() {
  const params = new URLSearchParams(window.location.search);
  // El modo modal (clase modal-embebido) ya se activa en la cabecera, antes de
  // pintar, para que la navegación no parpadee.
  if (params.get("volver") === "ruta") {
    document.getElementById("btn_volver_partido").style.display = "inline-block";
  }
  const jugadorId = params.get("jugador_id");
  if (jugadorId) await abrirJugador(jugadorId);
}

  const ok = await protegerPagina();
  if (!ok) return;
  await cargarClubsSiAdmin();
  await cargarInformes();
  await abrirDesdeUrl();
});
