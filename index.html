<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CaptaNET - Iniciar sesión</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--primary:#2563eb;--primary-dark:#1d4ed8;--bg:#f5f6fa;--card:#fff;--border:#e2e4eb;--text:#1f2430;--muted:#6b7280;}
*{box-sizing:border-box;}
body{
  margin:0;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  background:linear-gradient(160deg,#eef1fb 0%,var(--bg) 55%);
  color:var(--text);
}
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:14px;
  box-shadow:0 20px 40px -20px rgba(30,41,59,.25);
  padding:40px 36px;
  width:100%;
  max-width:380px;
}
.logo{
  font-size:26px;
  font-weight:800;
  color:var(--primary);
  text-align:center;
  margin-bottom:4px;
}
.subtitle{
  text-align:center;
  color:var(--muted);
  font-size:14px;
  margin-bottom:28px;
}
label{
  display:block;
  font-size:13px;
  color:var(--muted);
  margin-bottom:6px;
  font-weight:600;
}
.field{margin-bottom:16px;}
input{
  width:100%;
  padding:11px 12px;
  border:1px solid var(--border);
  border-radius:8px;
  font-size:15px;
  background:#fafbfe;
  transition:border-color .15s, box-shadow .15s;
}
input:focus{
  outline:none;
  border-color:var(--primary);
  box-shadow:0 0 0 3px rgba(37,99,235,.15);
  background:#fff;
}
button{
  width:100%;
  padding:12px;
  margin-top:8px;
  border:none;
  border-radius:8px;
  background:var(--primary);
  color:#fff;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  transition:background .15s;
}
button:hover{background:var(--primary-dark);}
button:disabled{opacity:.6;cursor:default;}
.error{
  display:none;
  background:#fef2f2;
  color:#dc2626;
  border:1px solid #fecaca;
  border-radius:8px;
  padding:10px 12px;
  font-size:13px;
  margin-bottom:16px;
}
.aviso-ok{
  display:none;
  background:#f0fdf4;
  color:#15803d;
  border:1px solid #bbf7d0;
  border-radius:8px;
  padding:10px 12px;
  font-size:13px;
  margin-bottom:16px;
}
.link-secundario{
  display:block;
  text-align:center;
  margin-top:16px;
  font-size:13px;
  color:var(--primary);
  cursor:pointer;
  text-decoration:none;
}
.link-secundario:hover{text-decoration:underline;}
</style>
</head>

<body>
  <div class="card">
    <div class="logo">CaptaNET</div>
    <div class="subtitle" id="subtitle">Plataforma de scouting</div>

    <p id="error" class="error"></p>
    <p id="avisoOk" class="aviso-ok"></p>

    <form id="loginForm">
      <div class="field">
        <label for="username">Usuario</label>
        <input id="username" type="text" autocomplete="username" required>
      </div>
      <div class="field">
        <label for="password">Contraseña</label>
        <input id="password" type="password" autocomplete="current-password" required>
      </div>
      <button id="submitBtn" type="submit">Entrar</button>
      <a class="link-secundario" onclick="mostrarRecuperar()">¿Has olvidado tu contraseña?</a>
    </form>

    <form id="recuperarForm" style="display:none;">
      <p style="font-size:13px;color:var(--muted);margin:0 0 16px;">
        Escribe tu usuario y te enviaremos un enlace a tu email para elegir una contraseña nueva.
      </p>
      <div class="field">
        <label for="usuarioRecuperar">Usuario</label>
        <input id="usuarioRecuperar" type="text" autocomplete="username" required>
      </div>
      <button id="recuperarBtn" type="submit">Enviar enlace</button>
      <a class="link-secundario" onclick="mostrarLogin()">Volver a iniciar sesión</a>
    </form>

    <a class="link-secundario" onclick="abrirModalContacto()">¿Necesitas ayuda? Contacta con nosotros</a>
  </div>

  <div id="modal_contacto" style="position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:200;padding:20px;">
    <div class="card" style="box-shadow:0 20px 50px rgba(0,0,0,.3);">
      <div class="logo" style="font-size:20px;">Contacta con nosotros</div>
      <div class="subtitle" style="margin-bottom:20px;">Te responderemos lo antes posible.</div>

      <p id="contactoError" class="error"></p>
      <p id="contactoOk" class="aviso-ok"></p>

      <form id="contactoForm">
        <div class="field">
          <label for="c_nombre">Nombre</label>
          <input id="c_nombre" type="text" required>
        </div>
        <div class="field">
          <label for="c_email">Email</label>
          <input id="c_email" type="email" required>
        </div>
        <div class="field">
          <label for="c_mensaje">Mensaje</label>
          <textarea id="c_mensaje" required rows="4" style="width:100%;padding:11px 12px;border:1px solid var(--border);border-radius:8px;font-size:15px;background:#fafbfe;font-family:inherit;resize:vertical;"></textarea>
        </div>
        <div style="position:absolute;left:-9999px;" aria-hidden="true">
          <label for="c_web">Deja este campo vacío</label>
          <input id="c_web" type="text" tabindex="-1" autocomplete="off">
        </div>
        <button id="contactoBtn" type="submit">Enviar</button>
        <a class="link-secundario" onclick="cerrarModalContacto()">Cancelar</a>
      </form>
    </div>
  </div>

  <script>
    const client = supabase.createClient(
      "https://bnqoisjvboytiphiwosj.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJucW9pc2p2Ym95dGlwaGl3b3NqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2MDgwMTcsImV4cCI6MjA5OTE4NDAxN30.RpTr0Z17ZRFwTpBvsmNwyqtEm0nLVWxM96mxaLxDbes"
    );

    const form = document.getElementById("loginForm");
    const recuperarForm = document.getElementById("recuperarForm");
    const errorBox = document.getElementById("error");
    const avisoOk = document.getElementById("avisoOk");
    const submitBtn = document.getElementById("submitBtn");
    const recuperarBtn = document.getElementById("recuperarBtn");

    function mostrarError(msg) {
      avisoOk.style.display = "none";
      errorBox.textContent = msg;
      errorBox.style.display = "block";
    }

    function mostrarAviso(msg) {
      errorBox.style.display = "none";
      avisoOk.textContent = msg;
      avisoOk.style.display = "block";
    }

    function mostrarRecuperar() {
      errorBox.style.display = "none";
      avisoOk.style.display = "none";
      form.style.display = "none";
      recuperarForm.style.display = "block";
    }

    function mostrarLogin() {
      errorBox.style.display = "none";
      avisoOk.style.display = "none";
      recuperarForm.style.display = "none";
      form.style.display = "block";
    }

    function getClubSlug() {
      const partes = window.location.hostname.split(".");
      if (partes.length >= 3 && partes[0] !== "www") return partes[0];
      return null;
    }

    async function aplicarBrandingClub() {
      const slug = getClubSlug();
      if (!slug) return;

      const { data: nombre, error } = await client.rpc("get_club_nombre_by_slug", { p_slug: slug });
      if (error) { console.error("[CaptaNET] get_club_nombre_by_slug:", error); return; }
      if (nombre) {
        document.getElementById("subtitle").textContent = nombre;
        document.title = "CaptaNET - " + nombre;
      }
    }

    aplicarBrandingClub();

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorBox.style.display = "none";

      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value;

      submitBtn.disabled = true;
      submitBtn.textContent = "Entrando...";

      const { data: login, error: loginError } = await client
        .functions.invoke("login-usuario", { body: { username, password } });

      if (loginError || !login?.session) {
        mostrarError("Usuario o contraseña incorrectos.");
        submitBtn.disabled = false;
        submitBtn.textContent = "Entrar";
        return;
      }

      await client.auth.setSession({
        access_token: login.session.access_token,
        refresh_token: login.session.refresh_token
      });

      const slug = getClubSlug();
      const { data: { user } } = await client.auth.getUser();
      const { data: perfil } = await client
        .from("profiles").select("is_admin, club_id").eq("id", user.id).single();

      if (!perfil?.is_admin) {
        if (!slug) {
          await client.auth.signOut();
          mostrarError("Entra desde la dirección de tu club (tuclub.captacion.net).");
          submitBtn.disabled = false;
          submitBtn.textContent = "Entrar";
          return;
        }

        const { data: club } = await client.from("clubs").select("id").eq("slug", slug).single();

        if (!club || club.id !== perfil?.club_id) {
          await client.auth.signOut();
          mostrarError("Esta cuenta no pertenece a este club.");
          submitBtn.disabled = false;
          submitBtn.textContent = "Entrar";
          return;
        }
      }

      window.location.href = "visor.html";
    });

    recuperarForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorBox.style.display = "none";
      avisoOk.style.display = "none";

      const username = document.getElementById("usuarioRecuperar").value.trim();
      recuperarBtn.disabled = true;
      recuperarBtn.textContent = "Enviando...";

      // El email nunca vuelve al navegador (ni siquiera al comprobar si
      // el usuario existe): la función siempre responde igual, exista o
      // no ese nombre de usuario.
      await client.functions.invoke("recuperar-password", {
        body: { username, redirectTo: window.location.origin + "/restablecer.html" }
      });

      mostrarAviso("Si el usuario existe, te hemos enviado un email con un enlace para elegir una contraseña nueva.");
      recuperarBtn.disabled = false;
      recuperarBtn.textContent = "Enviar enlace";
      recuperarForm.reset();
    });

    const contactoForm = document.getElementById("contactoForm");
    const contactoError = document.getElementById("contactoError");
    const contactoOk = document.getElementById("contactoOk");
    const contactoBtn = document.getElementById("contactoBtn");

    function abrirModalContacto() {
      contactoForm.reset();
      contactoForm.style.display = "block";
      contactoError.style.display = "none";
      contactoOk.style.display = "none";
      document.getElementById("modal_contacto").style.display = "flex";
    }

    function cerrarModalContacto() {
      document.getElementById("modal_contacto").style.display = "none";
    }

    contactoForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      contactoError.style.display = "none";
      contactoOk.style.display = "none";

      contactoBtn.disabled = true;
      contactoBtn.textContent = "Enviando...";

      const { data, error } = await client.functions.invoke("enviar-contacto", {
        body: {
          nombre: document.getElementById("c_nombre").value.trim(),
          email: document.getElementById("c_email").value.trim(),
          mensaje: document.getElementById("c_mensaje").value.trim(),
          honeypot: document.getElementById("c_web").value,
        }
      });

      contactoBtn.disabled = false;
      contactoBtn.textContent = "Enviar";

      if (error || !data?.ok) {
        contactoError.textContent = "No se ha podido enviar. Inténtalo de nuevo.";
        contactoError.style.display = "block";
        return;
      }

      contactoForm.style.display = "none";
      contactoOk.textContent = "¡Mensaje enviado! Te responderemos lo antes posible.";
      contactoOk.style.display = "block";
    });
  </script>
</body>
</html>
