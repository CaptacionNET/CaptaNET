<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>CaptaNET - Login</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <h2>CaptaNET</h2>
  <h3>Iniciar sesión</h3>

  <input id="username" type="text" placeholder="Usuario">
  <input id="password" type="password" placeholder="Contraseña">
  <button onclick="login()">Entrar</button>

  <script>
    const supabaseClient = supabase.createClient(
      "https://bnqoisjvboytiphiwosj.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJucW9pc2p2Ym95dGlwaGl3b3NqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2MDgwMTcsImV4cCI6MjA5OTE4NDAxN30.RpTr0Z17ZRFwTpBvsmNwyqtEm0nLVWxM96mxaLxDbes"
    );

    async function login() {
      const username = document.getElementById("username").value;
      const password = document.getElementById("password").value;

      // Buscar email por username
      const { data: perfil, error: perfilError } = await supabaseClient
        .from("profiles")
        .select("email")
        .eq("username", username)
        .single();

      if (perfilError || !perfil) {
        alert("Usuario no encontrado");
        return;
      }

      const email = perfil.email;

      // Login con email real
      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        alert("Error: " + error.message);
        return;
      }

      // Obtener perfil completo
      const { data: perfilCompleto } = await supabaseClient
        .from("profiles")
        .select("*")
        .eq("id", data.user.id)
        .single();

      if (perfilCompleto.is_admin) {
        window.location.href = "admin.html";
      } else {
        window.location.href = "usuario.html";
      }
    }
  </script>
</body>
</html>
