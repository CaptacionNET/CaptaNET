<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CaptaNET - Mi perfil</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--primary:#2563eb;--bg:#f5f6fa;--card:#fff;--border:#e2e4eb;--text:#1f2430;--muted:#6b7280;}
*{box-sizing:border-box;}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);}
#topbar{display:flex;justify-content:space-between;align-items:center;padding:14px 24px;background:var(--card);border-bottom:1px solid var(--border);flex-wrap:wrap;gap:10px;}
#topbar .brand{font-weight:700;font-size:18px;color:var(--primary);}
button{background:var(--primary);color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:14px;}
button:hover{opacity:.9;}
button.secondary{background:#fff;color:var(--text);border:1px solid var(--border);}
.card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;margin:20px 24px;max-width:420px;}
.fila{display:flex;justify-content:space-between;padding:8px 0;border-top:1px solid var(--border);font-size:14px;}
.fila:first-child{border-top:none;}
.fila span{color:var(--muted);}
.fila b{color:var(--text);text-align:right;}
@media (max-width:600px){
  .card{margin:16px;max-width:none;}
}
</style>
</head>

<body>
  <div id="topbar">
    <div class="brand">CaptaNET · Mi perfil</div>
    <div style="display:flex;gap:10px;flex-wrap:wrap;">
      <button class="secondary" onclick="atras()">← Atrás</button>
      <button class="secondary" onclick="window.location.href='visor.html'">Visor</button>
      <button class="secondary" onclick="window.location.href='jugadores.html'">Jugadores</button>
      <button class="secondary" onclick="window.location.href='equipos.html'">Equipos</button>
      <button class="secondary" onclick="window.location.href='plantillas.html'">Plantillas</button>
      <button class="secondary" onclick="window.location.href='gestion_pruebas.html'">Pruebas</button>
      <button class="secondary" onclick="window.location.href='usuario.html'">Mi perfil</button>
      <button id="btn_equipo" class="secondary" style="display:none;" onclick="window.location.href='equipo.html'">Mi equipo</button>
      <button id="btn_admin" class="secondary" style="display:none;" onclick="window.location.href='admin.html'">Panel Admin</button>
      <button class="secondary" onclick="logout()">Cerrar sesión</button>
    </div>
  </div>

  <div class="card" id="perfil"></div>

  <script>
    const client = supabase.createClient(
      "https://bnqoisjvboytiphiwosj.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJucW9pc2p2Ym95dGlwaGl3b3NqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2MDgwMTcsImV4cCI6MjA5OTE4NDAxN30.RpTr0Z17ZRFwTpBvsmNwyqtEm0nLVWxM96mxaLxDbes"
    );

    cargarPerfil();

    async function cargarPerfil() {
      const { data: session } = await client.auth.getSession();

      if (!session || !session.session) {
        window.location.href = "index.html";
        return;
      }

      const user = session.session.user;

      const { data: perfil } = await client
        .from("profiles")
        .select("*, clubs(nombre)")
        .eq("id", user.id)
        .single();

      document.getElementById("perfil").innerHTML = `
        <div class="fila"><span>Usuario</span><b>${perfil.username || ""}</b></div>
        <div class="fila"><span>Nombre</span><b>${perfil.nombre || ""}</b></div>
        <div class="fila"><span>Email</span><b>${perfil.email || ""}</b></div>
        <div class="fila"><span>Club</span><b>${perfil.clubs?.nombre || "(sin asignar)"}</b></div>
        <div class="fila"><span>Admin</span><b>${perfil.is_admin ? "Sí" : "No"}</b></div>
      `;

      if (perfil.is_admin) document.getElementById("btn_admin").style.display = "inline-block";
      if (perfil.is_club_admin) document.getElementById("btn_equipo").style.display = "inline-block";
    }

    function atras() {
      if (window.history.length > 1) window.history.back();
      else window.location.href = "visor.html";
    }

    async function logout() {
      await client.auth.signOut();
      window.location.href = "index.html";
    }
  </script>
</body>
</html>
