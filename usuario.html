<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>CaptaNET - Usuario</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
  <h2>Panel Usuario</h2>

  <button onclick="logout()">Cerrar sesión</button>

  <h3>Mi perfil</h3>
  <div id="perfil"></div>

  <script>
    const supabaseClient = supabase.createClient(
      "https://bnqoisjvboytiphiwosj.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJucW9pc2p2Ym95dGlwaGl3b3NqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2MDgwMTcsImV4cCI6MjA5OTE4NDAxN30.RpTr0Z17ZRFwTpBvsmNwyqtEm0nLVWxM96mxaLxDbes"
    );

    cargarPerfil();

    async function cargarPerfil() {
      const { data: session } = await supabaseClient.auth.getSession();

      if (!session || !session.session) {
        window.location.href = "index.html";
        return;
      }

      const user = session.session.user;

      const { data: perfil } = await supabaseClient
        .from("profiles")
        .select("*")
        .eq("id", user.id)
        .single();

      document.getElementById("perfil").innerHTML =
        `<p>Usuario: ${perfil.username}</p>
         <p>Nombre: ${perfil.nombre}</p>
         <p>Club: ${perfil.club}</p>`;
    }

    async function logout() {
      await supabaseClient.auth.signOut();
      window.location.href = "index.html";
    }
  </script>
</body>
</html>
