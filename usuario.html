<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>CaptaNET - Usuario</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
  <h2>Mi perfil</h2>

  <button onclick="volver()">Volver al visor</button>
  <button onclick="logout()">Cerrar sesión</button>

  <h3>Datos del usuario</h3>
  <div id="perfil"></div>

  <script>
    const client = supabase.createClient(
      "https://bnqoisjvboytiphiwosj.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJucW9pc2p2Ym95dGlwaGl3b3NqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2MDgwMTcsImV4cCI6MjA5OTE4NDAxN30.RpTr0Z17ZRFwTpBvsmNwyqtEm0nLVWxM96mxaLxDbes"
    );

    cargarPerfil();

    async function cargarPerfil() {
      const { data: session } = await client.auth.getSession();

      if (!session || !session.session) {
        window.location.href = "index.html";
        return;
      }

      const user = session.session.user;

      const { data: perfil } = await client
        .from("profiles")
        .select("*, clubs(nombre)")
        .eq("id", user.id)
        .single();

      document.getElementById("perfil").innerHTML =
        `<p>Usuario: ${perfil.username}</p>
         <p>Nombre: ${perfil.nombre || ""}</p>
         <p>Email: ${perfil.email || ""}</p>
         <p>Club: ${perfil.clubs?.nombre || "(sin asignar)"}</p>
         <p>Admin: ${perfil.is_admin ? "Sí" : "No"}</p>`;
    }

    function volver() {
      window.location.href = "visor.html";
    }

    async function logout() {
      await client.auth.signOut();
      window.location.href = "index.html";
    }
  </script>
</body>
</html>
