<!DOCTYPE html>

<head>

  <h2>Contenido público para usuarios registrados</h2>

    <div style="border: 1px solid #ccc; padding: 20px; max-width: 500px;">
      <h3>Seleccionar contenido</h3>

      <label>Categoría</label>
      <select id="categoria" style="width: 100%; margin-bottom: 10px;" onchange="cargarLigas()">
        <option value="">Selecciona categoría</option>
      </select>

      <label>Competición</label>
      <select id="liga" style="width: 100%; margin-bottom: 10px;" onchange="cargarGrupos()">
        <option value="">Selecciona competición</option>
      </select>

      <label>Grupo</label>
      <select id="grupo" style="width: 100%; margin-bottom: 10px;" onchange="cargarEquipos()">
        <option value="">Selecciona grupo</option>
      </select>

      <label>Equipo</label>
      <select id="equipo" style="width: 100%; margin-bottom: 10px;" onchange="cargarJugadores()">
        <option value="">Selecciona equipo</option>
      </select>

      <label>Jugador</label>
      <select id="jugador" style="width: 100%; margin-bottom: 10px;">
        <option value="">Selecciona jugador</option>
      </select>
    </div>

    <button onclick="logout()">Cerrar sesión</button>

  </div>

    // ============================
    // PROTEGER LA PÁGINA
    // ============================
    async function protegerPagina() {
      const { data: session } = await supabaseClient.auth.getSession();

      if (!session.session) {
        window.location.href = "index.html";
        return;
      }

      document.getElementById("contenido").style.display = "block";
      cargarCategorias();
    }

    protegerPagina();

    // ============================
    // CARGAR CATEGORÍAS
    // ============================
    async function cargarCategorias() {
      const { data } = await supabaseClient
        .from("categorias")
        .select("*")
        .order("nombre");

      const sel = document.getElementById("categoria");
      sel.innerHTML = '<option value="">Selecciona categoría</option>';

      data.forEach(c => {
        sel.innerHTML += `<option value="${c.id}">${c.nombre}</option>`;
      });
    }

    // ============================
    // CARGAR LIGAS SEGÚN CATEGORÍA
    // ============================
    async function cargarLigas() {
      const categoria = document.getElementById("categoria").value;

      const { data } = await supabaseClient
        .from("ligas")
        .select("*")
        .eq("categoria_id", categoria)
        .order("nombre");

      const sel = document.getElementById("liga");
      sel.innerHTML = '<option value="">Selecciona competición</option>';

      data.forEach(l => {
        sel.innerHTML += `<option value="${l.id}">${l.nombre}</option>`;
      });

      document.getElementById("grupo").innerHTML = '<option value="">Selecciona grupo</option>';
      document.getElementById("equipo").innerHTML = '<option value="">Selecciona equipo</option>';
      document.getElementById("jugador").innerHTML = '<option value="">Selecciona jugador</option>';
    }
