<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>CaptaNET - Contenido</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>

<body>
  <h2>Contenido público para usuarios registrados</h2>

  <div id="contenido" style="display:none;">

    <div style="border: 1px solid #ccc; padding: 20px; max-width: 500px;">
      <h3>Seleccionar contenido</h3>

      <label>Categoría</label>
      <select id="categoria" style="width: 100%; margin-bottom: 10px;" onchange="cargarLigas()">
        <option value="">Selecciona categoría</option>
      </select>

      <label>Competición</label>
      <select id="liga" style="width: 100%; margin-bottom: 10px;" onchange="cargarGrupos()">
        <option value="">Selecciona competición</option>
      </select>

      <label>Grupo</label>
      <select id="grupo" style="width: 100%; margin-bottom: 10px;" onchange="cargarEquipos()">
        <option value="">Selecciona grupo</option>
      </select>

      <label>Equipo</label>
      <select id="equipo" style="width: 100%; margin-bottom: 10px;" onchange="cargarJugadores()">
        <option value="">Selecciona equipo</option>
      </select>

      <label>Jugador</label>
      <select id="jugador" style="width: 100%; margin-bottom: 10px;">
        <option value="">Selecciona jugador</option>
      </select>
    </div>

    <button onclick="logout()">Cerrar sesión</button>

    <hr>

    <h3>Importar datos desde Excel</h3>

    <button onclick="document.getElementById('excelInput').click()">
      Importar Excel
    </button>

    <input type="file" id="excelInput" accept=".xlsx,.xls" style="display:none" onchange="importarExcel()">

    <p id="excelStatus"></p>

  </div>

  <script>
    const supabaseClient = supabase.createClient(
      "https://bnqoisjvboytiphiwosj.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJucW9pc2p2Ym95dGlwaGl3b3NqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2MDgwMTcsImV4cCI6MjA5OTE4NDAxN30.RpTr0Z17ZRFwTpBvsmNwyqtEm0nLVWxM96mxaLxDbes"
    );

    // ============================
    // PROTEGER LA PÁGINA
    // ============================
    async function protegerPagina() {
      const { data: session } = await supabaseClient.auth.getSession();

      if (!session.session) {
        window.location.href = "index.html";
        return;
      }

      document.getElementById("contenido").style.display = "block";
      cargarCategorias();
    }

    protegerPagina();

    // ============================
    // CARGAR CATEGORÍAS
    // ============================
    async function cargarCategorias() {
      const { data } = await supabaseClient
        .from("categorias")
        .select("*")
        .order("nombre");

      const sel = document.getElementById("categoria");
      sel.innerHTML = '<option value="">Selecciona categoría</option>';

      data.forEach(c => {
        sel.innerHTML += `<option value="${c.id}">${c.nombre}</option>`;
      });
    }

    // ============================
    // CARGAR LIGAS SEGÚN CATEGORÍA
    // ============================
    async function cargarLigas() {
      const categoria = document.getElementById("categoria").value;

      const { data } = await supabaseClient
        .from("ligas")
        .select("*")
        .eq("categoria_id", categoria)
        .order("nombre");

      const sel = document.getElementById("liga");
      sel.innerHTML = '<option value="">Selecciona competición</option>';

      data.forEach(l => {
        sel.innerHTML += `<option value="${l.id}">${l.nombre}</option>`;
      });

      document.getElementById("grupo").innerHTML = '<option value="">Selecciona grupo</option>';
      document.getElementById("equipo").innerHTML = '<option value="">Selecciona equipo</option>';
      document.getElementById("jugador").innerHTML = '<option value="">Selecciona jugador</option>';
    }

    // ============================
    // CARGAR GRUPOS SEGÚN LIGA
    // ============================
    async function cargarGrupos() {
      const liga = document.getElementById("liga").value;

      const { data } = await supabaseClient
        .from("grupos")
        .select("*")
        .eq("liga_id", liga)
        .order("nombre");

      const sel = document.getElementById("grupo");
      sel.innerHTML = '<option value="">Selecciona grupo</option>';

      data.forEach(g => {
        sel.innerHTML += `<option value="${g.id}">${g.nombre}</option>`;
      });

      document.getElementById("equipo").innerHTML = '<option value="">Selecciona equipo</option>';
      document.getElementById("jugador").innerHTML = '<option value="">Selecciona jugador</option>';
    }

    // ============================
    // CARGAR EQUIPOS SEGÚN GRUPO
    // ============================
    async function cargarEquipos() {
      const grupo = document.getElementById("grupo").value;

      const { data } = await supabaseClient
        .from("equipos")
        .select("*")
        .eq("grupo_id", grupo)
        .order("nombre");

      const sel = document.getElementById("equipo");
      sel.innerHTML = '<option value="">Selecciona equipo</option>';

      data.forEach(e => {
        sel.innerHTML += `<option value="${e.id}">${e.nombre}</option>`;
      });

      document.getElementById("jugador").innerHTML = '<option value="">Selecciona jugador</option>';
    }

    // ============================
    // CARGAR JUGADORES SEGÚN EQUIPO
    // ============================
    async function cargarJugadores() {
      const equipo = document.getElementById("equipo").value;

      const { data } = await supabaseClient
        .from("jugadores")
        .select("*")
        .eq("equipo_id", equipo)
        .order("nombre");

      const sel = document.getElementById("jugador");
      sel.innerHTML = '<option value="">Selecciona jugador</option>';

      data.forEach(j => {
        sel.innerHTML += `<option value="${j.id}">${j.nombre} ${j.apellido}</option>`;
      });
    }

    // ============================
    // IMPORTAR EXCEL
    // ============================
    async function importarExcel() {
      const file = document.getElementById("excelInput").files[0];
      if (!file) return;

      const reader = new FileReader();

      reader.onload = async (e) => {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, { type: "array" });

        const sheetName = workbook.SheetNames[0];
        const sheet = workbook.Sheets[sheetName];

        const json = XLSX.utils.sheet_to_json(sheet);

        document.getElementById("excelStatus").textContent =
          "Procesando " + json.length + " filas...";

        await procesarExcel(json);
      };

      reader.readAsArrayBuffer(file);
    }

    // ============================
    // PROCESAR EXCEL → INSERTAR EN SUPABASE
    // ============================
    async function procesarExcel(json) {
      const tabla = "jugadores_club"; // Puedes cambiarlo si quieres importar otra tabla

      const datos = json.map(row => ({
        jugador_id: row.jugador_id,
        club_id: row.club_id,
        anio_nacimiento: row.anio_nacimiento,
        posicion: row.posicion,
        comentario: row.comentario,
        valoracion: row.valoracion,
        contacto: row.contacto,
        contactado: row.contactado === "SI"
      }));

      const { error } = await supabaseClient
        .from(tabla)
        .upsert(datos);

      if (error) {
        document.getElementById("excelStatus").textContent =
          "Error: " + error.message;
      } else {
        document.getElementById("excelStatus").textContent =
          "Importación completada correctamente.";
      }
    }

    // ============================
    // LOGOUT
    // ============================
    async function logout() {
      await supabaseClient.auth.signOut();
      window.location.href = "index.html";
    }
  </script>

</body>
</html>
