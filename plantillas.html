<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CaptaNET - Plantillas</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--primary:#2563eb;--bg:#f5f6fa;--card:#fff;--border:#e2e4eb;--text:#1f2430;--muted:#6b7280;}
*{box-sizing:border-box;}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);}
#topbar{display:flex;justify-content:space-between;align-items:center;padding:14px 24px;background:var(--card);border-bottom:1px solid var(--border);flex-wrap:wrap;gap:10px;}
#topbar .brand{font-weight:700;font-size:18px;color:var(--primary);}
button{background:var(--primary);color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:14px;}
button:hover{opacity:.9;}
button.secondary{background:#fff;color:var(--text);border:1px solid var(--border);}
button.danger{background:#dc2626;}
input,select{padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:14px;}
label{font-size:12px;color:var(--muted);display:block;margin-bottom:4px;}
.barra{display:flex;gap:10px;align-items:center;flex-wrap:wrap;padding:16px 24px;}
.layout{display:flex;gap:20px;padding:0 24px 24px;align-items:flex-start;}
.panel{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;width:280px;flex-shrink:0;}
.panel h3{margin:0 0 10px;font-size:15px;}
.panel-tabs{display:flex;gap:6px;margin-bottom:12px;}
.panel-tab{flex:1;padding:6px;border:1px solid var(--border);background:#fff;border-radius:6px;cursor:pointer;font-size:11px;text-align:center;}
.panel-tab.active{background:var(--primary);color:#fff;border-color:var(--primary);}
.resultado{border:1px solid var(--border);border-radius:6px;padding:8px;margin-bottom:6px;font-size:13px;}
.resultado .nombre{font-weight:600;}
.resultado .meta{color:var(--muted);font-size:12px;}
.resultado button{width:100%;margin-top:6px;padding:5px;font-size:12px;}
.campo-wrap{flex:1;display:flex;justify-content:center;}
.campo{
  position:relative;width:100%;max-width:1180px;aspect-ratio:1180/620;
  background:#fff;
  border:3px solid var(--border);border-radius:10px;overflow:visible;
  box-shadow:0 10px 30px -10px rgba(0,0,0,.15);
}
.campo .linea-medio{position:absolute;left:50%;top:0;bottom:0;width:2px;background:var(--border);}
.campo .circulo{position:absolute;top:50%;left:50%;width:130px;height:130px;margin:-65px 0 0 -65px;border:2px solid var(--border);border-radius:50%;}
.campo .area-arriba{position:absolute;left:0;top:18%;bottom:18%;width:100px;border:2px solid var(--border);border-left:none;}
.campo .area-abajo{position:absolute;right:0;top:18%;bottom:18%;width:100px;border:2px solid var(--border);border-right:none;}
.tarjeta{
  position:absolute;transform:translate(-50%,-50%);
  cursor:grab;user-select:none;touch-action:none;
}
.tarjeta.arrastrando{cursor:grabbing;z-index:20;}
.tarjeta .avatar{
  max-width:190px;padding:9px 18px;border-radius:8px;color:var(--text);
  box-shadow:0 2px 6px rgba(0,0,0,.2);border:2px solid var(--primary);
  text-align:center;
}
.tarjeta .avatar-nombre{font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tarjeta .avatar-sub{font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.tarjeta .avatar.origen-manual{border-color:#f59e0b;}
.tarjeta .avatar.origen-club{border-color:#16a34a;}
.tarjeta .avatar.color-blanco{background:#fff;}
.tarjeta .avatar.color-azul{background:#dbeafe;}
.tarjeta .avatar.color-amarillo{background:#fef9c3;}
.tarjeta .avatar.color-verde{background:#dcfce7;}
.tarjeta .quitar{
  position:absolute;top:-8px;right:-8px;width:18px;height:18px;border-radius:50%;
  background:#dc2626;color:#fff;font-size:11px;line-height:18px;text-align:center;
  cursor:pointer;display:none;z-index:10;
}
.tarjeta .colores{
  display:none;position:absolute;bottom:-28px;left:50%;transform:translateX(-50%);
  gap:4px;background:#fff;border:1px solid var(--border);border-radius:12px;
  padding:4px 6px;box-shadow:0 2px 8px rgba(0,0,0,.2);white-space:nowrap;z-index:10;
}
.tarjeta .colores span{width:15px;height:15px;border-radius:50%;border:1px solid var(--border);cursor:pointer;display:inline-block;}
.panel-detalle{width:300px;flex-shrink:0;}
.panel-izda{display:flex;flex-direction:column;gap:16px;flex-shrink:0;}
.barra{margin-bottom:12px;}
.barra .barra-cab{font-size:12px;color:var(--muted);margin-bottom:4px;}
.barra .barra-cab b{color:var(--text);}
.barra .barra-fondo{background:#eef0f5;border-radius:6px;height:9px;overflow:hidden;}
.barra .barra-relleno{background:var(--primary);height:100%;}
.det-fila{padding:5px 0;font-size:13px;border-top:1px solid var(--border);}
.det-fila span{color:var(--muted);}
.det-fila b{color:var(--text);}
.leyenda-fila{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.leyenda-dot{width:16px;height:16px;border-radius:50%;border:1px solid var(--border);flex-shrink:0;}
.leyenda-fila input{flex:1;font-size:12px;padding:6px 8px;min-width:0;}
.tooltip{
  position:fixed;z-index:100;background:#fff;border:1px solid var(--border);border-radius:8px;
  padding:12px 14px;font-size:12px;box-shadow:0 10px 25px rgba(0,0,0,.2);width:220px;
  display:none;pointer-events:none;
}
.tooltip .t-nombre{font-weight:700;font-size:14px;margin-bottom:6px;}
.tooltip .t-row{display:flex;justify-content:space-between;padding:2px 0;color:var(--muted);}
.tooltip .t-row b{color:var(--text);}
.status{font-weight:600;color:var(--muted);margin:0 24px 12px;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;z-index:200;}
.modal-box{background:#fff;border-radius:10px;padding:24px;width:320px;box-shadow:0 20px 50px rgba(0,0,0,.3);}
.modal-box h3{margin:0 0 14px;}

@media (hover:none){
  .tarjeta .quitar{display:block !important;}
  .tarjeta .colores{display:flex !important;}
}

@media (max-width:900px){
  .layout{flex-direction:column;padding:0 12px 24px;}
  .panel-izda,.panel-detalle,.panel{width:100%;}
  .barra{padding:12px;}
  .status{margin:0 12px 12px;}
  .notas-wrap{margin:0 12px 24px !important;}
}
@media (max-width:500px){
  #topbar{padding:12px 16px;}
  .modal-box{width:calc(100vw - 40px);}
}
</style>
</head>
<body>

<div id="topbar">
  <div class="brand">CaptaNET · Plantillas</div>
  <div style="display:flex;gap:10px;">
    <button class="secondary" onclick="window.location.href='visor.html'">Volver al visor</button>
    <button class="secondary" onclick="logout()">Cerrar sesión</button>
  </div>
</div>

<div class="barra">
  <div id="campo_club_wrap" style="display:none;">
    <select id="filtro_club" onchange="onClubChange()"></select>
  </div>
  <select id="selector_plantilla" onchange="onPlantillaChange()" style="min-width:220px;"></select>
  <span id="rango_label" style="color:var(--muted);font-size:13px;"></span>
  <button class="secondary" onclick="crearPlantilla()">+ Nueva plantilla</button>
  <button class="secondary" id="btn_editar_plantilla" style="display:none;" onclick="editarPlantilla()">Editar plantilla</button>
  <button class="danger" id="btn_eliminar_plantilla" style="display:none;" onclick="eliminarPlantilla()">Eliminar plantilla</button>
</div>

<p id="status" class="status"></p>

<div class="layout">
  <div class="panel-izda">
    <div class="panel">
      <h3>Añadir jugador</h3>
      <div class="panel-tabs">
        <div class="panel-tab active" id="tab_buscar" onclick="cambiarPanel('buscar')">Ya valorados</div>
        <div class="panel-tab" id="tab_club" onclick="cambiarPanel('club')">Mi club</div>
        <div class="panel-tab" id="tab_manual" onclick="cambiarPanel('manual')">Manual</div>
      </div>

      <div id="panel_buscar">
        <input id="buscador" type="text" placeholder="Buscar por nombre..." style="width:100%;margin-bottom:10px;" oninput="buscarJugadores()">
        <div id="resultados_busqueda"></div>
      </div>

      <div id="panel_club" style="display:none;">
        <input id="buscador_club" type="text" placeholder="Buscar en mi club..." style="width:100%;margin-bottom:10px;" oninput="buscarClub()">
        <div id="resultados_club"></div>
        <hr style="margin:14px 0;border:none;border-top:1px solid var(--border);">
        <p style="font-size:12px;color:var(--muted);margin-bottom:8px;">¿No está en la lista? Añádelo a tu club:</p>
        <label>Nombre</label>
        <input id="club_nombre" type="text" style="width:100%;margin-bottom:8px;">
        <label>Posición</label>
        <input id="club_posicion" type="text" style="width:100%;margin-bottom:8px;">
        <label>Año de nacimiento</label>
        <input id="club_anio" type="number" style="width:100%;margin-bottom:10px;">
        <button style="width:100%;" onclick="crearJugadorClub()">+ Crear y añadir</button>
      </div>

      <div id="panel_manual" style="display:none;">
        <label>Nombre</label>
        <input id="manual_nombre" type="text" style="width:100%;margin-bottom:8px;">
        <label>Club actual</label>
        <input id="manual_club" type="text" style="width:100%;margin-bottom:8px;">
        <label>Posición (opcional)</label>
        <input id="manual_posicion" type="text" style="width:100%;margin-bottom:8px;">
        <label>Año (opcional)</label>
        <input id="manual_anio" type="number" style="width:100%;margin-bottom:10px;">
        <button style="width:100%;" onclick="anadirManual()">Añadir al campo</button>
      </div>
    </div>

    <div class="panel" id="panel_leyenda">
      <h3>Leyenda de colores</h3>
      <div class="leyenda-fila">
        <span class="leyenda-dot" style="background:#fff;"></span>
        <input id="leyenda_blanco" type="text" placeholder="Blanco significa..." oninput="guardarLeyendaDebounced()">
      </div>
      <div class="leyenda-fila">
        <span class="leyenda-dot" style="background:#bfdbfe;"></span>
        <input id="leyenda_azul" type="text" placeholder="Azul significa..." oninput="guardarLeyendaDebounced()">
      </div>
      <div class="leyenda-fila">
        <span class="leyenda-dot" style="background:#fef08a;"></span>
        <input id="leyenda_amarillo" type="text" placeholder="Amarillo significa..." oninput="guardarLeyendaDebounced()">
      </div>
      <div class="leyenda-fila">
        <span class="leyenda-dot" style="background:#bbf7d0;"></span>
        <input id="leyenda_verde" type="text" placeholder="Verde significa..." oninput="guardarLeyendaDebounced()">
      </div>
    </div>
  </div>

  <div class="campo-wrap">
    <div class="campo" id="campo">
      <div class="linea-medio"></div>
      <div class="circulo"></div>
      <div class="area-arriba"></div>
      <div class="area-abajo"></div>
    </div>
  </div>

  <div class="panel panel-detalle">
    <h3>Ficha</h3>
    <div id="detalle_vacio" style="color:var(--muted);font-size:13px;padding:20px 4px;">Haz clic en un jugador del campo para ver su ficha aquí.</div>
    <div id="detalle_contenido" style="display:none;">
      <h2 id="det_nombre" style="margin:0 0 4px;font-size:20px;"></h2>
      <p id="det_sub" style="margin:0 0 16px;color:var(--muted);font-size:13px;"></p>
      <div id="det_barras"></div>
      <div id="det_extra"></div>
    </div>
  </div>
</div>

<div class="notas-wrap" style="margin:0 24px 24px;">
  <label>Notas de la plantilla</label>
  <textarea id="notas_plantilla" style="width:100%;min-height:90px;padding:10px;border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:14px;resize:vertical;" oninput="guardarNotasDebounced()"></textarea>
</div>

<div class="tooltip" id="tooltip"></div>

<div class="modal-overlay" id="modal_nueva_plantilla">
  <div class="modal-box">
    <h3 id="modal_plantilla_titulo">Nueva plantilla</h3>
    <label>Nombre</label>
    <input id="np_nombre" type="text" style="width:100%;margin-bottom:12px;">
    <div style="display:flex;gap:10px;">
      <div style="flex:1;">
        <label>Año mínimo</label>
        <input id="np_anio_min" type="number" style="width:100%;">
      </div>
      <div style="flex:1;">
        <label>Año máximo</label>
        <input id="np_anio_max" type="number" style="width:100%;">
      </div>
    </div>
    <p style="font-size:12px;color:var(--muted);margin-top:8px;">Opcional: limita qué jugadores aparecen al buscar en esta plantilla.</p>
    <div style="display:flex;gap:10px;margin-top:16px;">
      <button class="secondary" style="flex:1;" onclick="cerrarModalPlantilla()">Cancelar</button>
      <button style="flex:1;" id="modal_plantilla_confirmar" onclick="confirmarNuevaPlantilla()">Crear</button>
    </div>
  </div>
</div>

<script>
const client = supabase.createClient(
  "https://bnqoisjvboytiphiwosj.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJucW9pc2p2Ym95dGlwaGl3b3NqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2MDgwMTcsImV4cCI6MjA5OTE4NDAxN30.RpTr0Z17ZRFwTpBvsmNwyqtEm0nLVWxM96mxaLxDbes"
);

let esAdmin = false;
let miClubId = null;
let plantillaActualId = null;
let plantillaActual = null;
let plantillasCache = [];
let filasTablero = [];

async function protegerPagina() {
  const { data: session } = await client.auth.getSession();
  if (!session.session) { window.location.href = "index.html"; return false; }

  const { data: perfil } = await client
    .from("profiles").select("is_admin, club_id").eq("id", session.session.user.id).single();

  esAdmin = !!perfil?.is_admin;
  miClubId = perfil?.club_id || null;
  return true;
}

async function logout() {
  await client.auth.signOut();
  window.location.href = "index.html";
}

async function cargarClubsSiAdmin() {
  if (!esAdmin) return;
  document.getElementById("campo_club_wrap").style.display = "block";
  const { data: clubs } = await client.from("clubs").select("id, nombre").order("nombre");
  const sel = document.getElementById("filtro_club");
  sel.innerHTML = "";
  (clubs || []).forEach(c => sel.innerHTML += `<option value="${c.id}">${c.nombre}</option>`);
  if (clubs && clubs.length) miClubId = clubs[0].id;
}

function onClubChange() {
  miClubId = document.getElementById("filtro_club").value;
  cargarPlantillas();
}

function cambiarPanel(nombre) {
  document.getElementById("panel_buscar").style.display = nombre === "buscar" ? "block" : "none";
  document.getElementById("panel_club").style.display = nombre === "club" ? "block" : "none";
  document.getElementById("panel_manual").style.display = nombre === "manual" ? "block" : "none";
  document.getElementById("tab_buscar").classList.toggle("active", nombre === "buscar");
  document.getElementById("tab_club").classList.toggle("active", nombre === "club");
  document.getElementById("tab_manual").classList.toggle("active", nombre === "manual");
}

function actualizarRangoLabel() {
  const el = document.getElementById("rango_label");
  if (plantillaActual && (plantillaActual.anio_min || plantillaActual.anio_max)) {
    el.textContent = `(nacidos ${plantillaActual.anio_min || "?"}–${plantillaActual.anio_max || "?"})`;
  } else {
    el.textContent = "";
  }
}

function rangoActual() {
  if (!plantillaActual) return null;
  const min = plantillaActual.anio_min, max = plantillaActual.anio_max;
  if (!min && !max) return null;
  return { min: min || 0, max: max || 9999 };
}

function cargarLeyendaYNotas() {
  document.getElementById("leyenda_blanco").value = plantillaActual?.leyenda_blanco || "";
  document.getElementById("leyenda_azul").value = plantillaActual?.leyenda_azul || "";
  document.getElementById("leyenda_amarillo").value = plantillaActual?.leyenda_amarillo || "";
  document.getElementById("leyenda_verde").value = plantillaActual?.leyenda_verde || "";
  document.getElementById("notas_plantilla").value = plantillaActual?.notas || "";
}

let guardarLeyendaTimeout = null;
function guardarLeyendaDebounced() {
  clearTimeout(guardarLeyendaTimeout);
  guardarLeyendaTimeout = setTimeout(guardarLeyenda, 600);
}

async function guardarLeyenda() {
  if (!plantillaActualId) return;
  const payload = {
    leyenda_blanco: document.getElementById("leyenda_blanco").value || null,
    leyenda_azul: document.getElementById("leyenda_azul").value || null,
    leyenda_amarillo: document.getElementById("leyenda_amarillo").value || null,
    leyenda_verde: document.getElementById("leyenda_verde").value || null
  };
  await client.from("plantillas").update(payload).eq("id", plantillaActualId);
  if (plantillaActual) Object.assign(plantillaActual, payload);
}

let guardarNotasTimeout = null;
function guardarNotasDebounced() {
  clearTimeout(guardarNotasTimeout);
  guardarNotasTimeout = setTimeout(guardarNotas, 600);
}

async function guardarNotas() {
  if (!plantillaActualId) return;
  const notas = document.getElementById("notas_plantilla").value;
  await client.from("plantillas").update({ notas }).eq("id", plantillaActualId);
  if (plantillaActual) plantillaActual.notas = notas;
}

async function cargarPlantillas() {
  const sel = document.getElementById("selector_plantilla");
  if (!miClubId) { sel.innerHTML = "<option value=''>Sin club asignado</option>"; return; }

  const { data } = await client.from("plantillas").select("*").eq("club_id", miClubId).order("created_at");
  plantillasCache = data || [];
  sel.innerHTML = "";
  plantillasCache.forEach(p => sel.innerHTML += `<option value="${p.id}">${p.nombre}</option>`);

  if (plantillasCache.length) {
    plantillaActual = plantillasCache[0];
    plantillaActualId = plantillaActual.id;
    sel.value = plantillaActualId;
    document.getElementById("btn_eliminar_plantilla").style.display = "inline-block";
    document.getElementById("btn_editar_plantilla").style.display = "inline-block";
    actualizarRangoLabel();
    cargarLeyendaYNotas();
    cargarTablero();
  } else {
    plantillaActual = null;
    plantillaActualId = null;
    document.getElementById("btn_eliminar_plantilla").style.display = "none";
    document.getElementById("btn_editar_plantilla").style.display = "none";
    actualizarRangoLabel();
    cargarLeyendaYNotas();
    renderTablero([]);
  }
}

function onPlantillaChange() {
  plantillaActualId = document.getElementById("selector_plantilla").value;
  plantillaActual = plantillasCache.find(p => p.id === plantillaActualId) || null;
  actualizarRangoLabel();
  cargarLeyendaYNotas();
  cargarTablero();
}

let modoModalPlantilla = "crear";

function crearPlantilla() {
  if (!miClubId) { alert("No hay un club seleccionado."); return; }
  modoModalPlantilla = "crear";
  document.getElementById("modal_plantilla_titulo").textContent = "Nueva plantilla";
  document.getElementById("modal_plantilla_confirmar").textContent = "Crear";
  document.getElementById("np_nombre").value = "";
  document.getElementById("np_anio_min").value = "";
  document.getElementById("np_anio_max").value = "";
  document.getElementById("modal_nueva_plantilla").style.display = "flex";
}

function editarPlantilla() {
  if (!plantillaActual) return;
  modoModalPlantilla = "editar";
  document.getElementById("modal_plantilla_titulo").textContent = "Editar plantilla";
  document.getElementById("modal_plantilla_confirmar").textContent = "Guardar";
  document.getElementById("np_nombre").value = plantillaActual.nombre || "";
  document.getElementById("np_anio_min").value = plantillaActual.anio_min || "";
  document.getElementById("np_anio_max").value = plantillaActual.anio_max || "";
  document.getElementById("modal_nueva_plantilla").style.display = "flex";
}

function cerrarModalPlantilla() {
  document.getElementById("modal_nueva_plantilla").style.display = "none";
}

async function confirmarNuevaPlantilla() {
  const nombre = document.getElementById("np_nombre").value.trim();
  if (!nombre) { alert("Escribe un nombre."); return; }

  const anio_min = document.getElementById("np_anio_min").value || null;
  const anio_max = document.getElementById("np_anio_max").value || null;

  if (modoModalPlantilla === "editar") {
    const { data, error } = await client.from("plantillas")
      .update({ nombre, anio_min, anio_max }).eq("id", plantillaActualId).select("*").single();

    if (error) { alert("Error guardando la plantilla: " + error.message); return; }

    cerrarModalPlantilla();
    await cargarPlantillas();
    document.getElementById("selector_plantilla").value = data.id;
    plantillaActualId = data.id;
    plantillaActual = data;
    actualizarRangoLabel();
    cargarLeyendaYNotas();
    return;
  }

  const { data, error } = await client.from("plantillas")
    .insert({ club_id: miClubId, nombre, anio_min, anio_max }).select("*").single();

  if (error) { alert("Error creando la plantilla: " + error.message); return; }

  cerrarModalPlantilla();
  await cargarPlantillas();
  document.getElementById("selector_plantilla").value = data.id;
  plantillaActualId = data.id;
  plantillaActual = data;
  actualizarRangoLabel();
  cargarLeyendaYNotas();
  cargarTablero();
}

async function eliminarPlantilla() {
  if (!plantillaActualId) return;
  if (!confirm("¿Eliminar esta plantilla y todos sus jugadores del tablero? No se puede deshacer.")) return;
  await client.from("plantillas").delete().eq("id", plantillaActualId);
  await cargarPlantillas();
}

async function cargarTablero() {
  const status = document.getElementById("status");
  if (!plantillaActualId) { renderTablero([]); return; }

  const { data: filas, error } = await client
    .from("plantilla_jugadores").select("*").eq("plantilla_id", plantillaActualId);

  if (error) { status.textContent = "Error cargando el tablero: " + error.message; return; }
  status.textContent = "";

  const jugadorIds = (filas || []).filter(f => f.jugador_id).map(f => f.jugador_id);
  const clubJugadorIds = (filas || []).filter(f => f.club_jugador_id).map(f => f.club_jugador_id);

  let jugadores = [], equipos = [], privados = [], clubJugadores = [];

  if (jugadorIds.length) {
    const [j, p] = await Promise.all([
      client.from("jugadores").select("*").in("id", jugadorIds),
      client.from("jugadores_club").select("*").eq("club_id", miClubId).in("jugador_id", jugadorIds)
    ]);
    jugadores = j.data || [];
    privados = p.data || [];

    const equipoIds = [...new Set(jugadores.map(j => j.equipo_id).filter(Boolean))];
    if (equipoIds.length) {
      const e = await client.from("equipos").select("id, nombre").in("id", equipoIds);
      equipos = e.data || [];
    }
  }

  if (clubJugadorIds.length) {
    const { data } = await client.from("club_jugadores").select("*").in("id", clubJugadorIds);
    clubJugadores = data || [];
  }

  filasTablero = (filas || []).map(f => {
    if (f.jugador_id) {
      const j = jugadores.find(x => x.id === f.jugador_id) || {};
      const priv = privados.find(x => x.jugador_id === f.jugador_id) || {};
      const equipo = equipos.find(e => e.id === j.equipo_id);
      return {
        ...f,
        nombre: j.nombre || "(jugador)",
        equipo: equipo?.nombre || "",
        posicion_oficial: j.posicion || "",
        anio_oficial: j.fecha_nacimiento ? new Date(j.fecha_nacimiento).getFullYear() : "",
        anio_nacimiento: priv.anio_nacimiento,
        posicion: priv.posicion,
        contacto: priv.contacto,
        contactado: priv.contactado,
        tecnica: priv.tecnica,
        tactica: priv.tactica,
        fisico: priv.fisico,
        actitud: priv.actitud,
        comentario: priv.comentario,
        origen: "valorado"
      };
    }
    if (f.club_jugador_id) {
      const cj = clubJugadores.find(x => x.id === f.club_jugador_id) || {};
      return { ...f, nombre: cj.nombre || "(jugador)", posicion: cj.posicion, anio_nacimiento: cj.anio_nacimiento, origen: "club" };
    }
    return { ...f, nombre: f.nombre_manual, posicion: f.posicion_manual, anio_nacimiento: f.anio_manual, club_manual: f.club_manual, origen: "manual" };
  });

  renderTablero(filasTablero);
}

function subTextoTarjeta(fila) {
  if (fila.origen === "valorado") return fila.equipo || "";
  if (fila.origen === "club") return "Mi club";
  return fila.club_manual || fila.posicion || "";
}

function renderTablero(filas) {
  const campo = document.getElementById("campo");
  campo.querySelectorAll(".tarjeta").forEach(t => t.remove());

  filas.forEach(fila => {
    const tarjeta = document.createElement("div");
    tarjeta.className = "tarjeta";
    tarjeta.style.left = fila.pos_x + "%";
    tarjeta.style.top = fila.pos_y + "%";
    tarjeta.innerHTML = `
      <div class="avatar origen-${fila.origen} color-${fila.color || "blanco"}" title="${fila.nombre}">
        <div class="avatar-nombre">${fila.nombre}</div>
        <div class="avatar-sub">${subTextoTarjeta(fila)}</div>
      </div>
      <span class="quitar" onmousedown="event.stopPropagation()" ontouchstart="event.stopPropagation()" onclick="quitarDelTablero(event, ${fila.id})">×</span>
      <div class="colores">
        <span onmousedown="event.stopPropagation()" ontouchstart="event.stopPropagation()" onclick="cambiarColor(event, ${fila.id}, 'blanco')" style="background:#fff"></span>
        <span onmousedown="event.stopPropagation()" ontouchstart="event.stopPropagation()" onclick="cambiarColor(event, ${fila.id}, 'azul')" style="background:#bfdbfe"></span>
        <span onmousedown="event.stopPropagation()" ontouchstart="event.stopPropagation()" onclick="cambiarColor(event, ${fila.id}, 'amarillo')" style="background:#fef08a"></span>
        <span onmousedown="event.stopPropagation()" ontouchstart="event.stopPropagation()" onclick="cambiarColor(event, ${fila.id}, 'verde')" style="background:#bbf7d0"></span>
      </div>
    `;
    campo.appendChild(tarjeta);

    tarjeta.addEventListener("mouseenter", e => { mostrarTooltip(e, fila); mostrarControles(tarjeta); });
    tarjeta.addEventListener("mousemove", posicionarTooltip);
    tarjeta.addEventListener("mouseleave", () => { ocultarTooltip(); ocultarControlesConRetraso(tarjeta); });
    tarjeta.addEventListener("mousedown", e => iniciarArrastre(e, tarjeta, fila));
    tarjeta.addEventListener("touchstart", e => iniciarArrastre(e, tarjeta, fila), { passive: false });
    tarjeta.addEventListener("click", () => { if (!seDeslizoBastante) mostrarDetalle(fila); });
  });
}

let ocultarControlesTimeout = null;

function mostrarControles(tarjeta) {
  clearTimeout(ocultarControlesTimeout);
  tarjeta.querySelector(".quitar").style.display = "block";
  tarjeta.querySelector(".colores").style.display = "flex";
}

function ocultarControlesConRetraso(tarjeta) {
  ocultarControlesTimeout = setTimeout(() => {
    tarjeta.querySelector(".quitar").style.display = "none";
    tarjeta.querySelector(".colores").style.display = "none";
  }, 500);
}

async function cambiarColor(e, id, color) {
  e.stopPropagation();
  ocultarTooltip();
  await client.from("plantilla_jugadores").update({ color }).eq("id", id);
  cargarTablero();
}

const NIVELES_FISICO_MAP = { "BAJO": 1, "MEDIO-BAJO": 2, "MEDIO": 3, "MEDIO-ALTO": 4, "ALTO": 5, "MUY ALTO": 6 };

function barraHtml(etiqueta, valor, max = 10) {
  const pct = valor ? Math.min(100, (valor / max) * 100) : 0;
  return `
    <div class="barra">
      <div class="barra-cab"><span>${etiqueta}: </span><b>${valor ?? "-"}</b></div>
      <div class="barra-fondo"><div class="barra-relleno" style="width:${pct}%;"></div></div>
    </div>
  `;
}

function barraFisicoHtml(valor) {
  const nivel = NIVELES_FISICO_MAP[valor] || 0;
  const pct = (nivel / 6) * 100;
  return `
    <div class="barra">
      <div class="barra-cab"><span>Físico: </span><b>${valor || "-"}</b></div>
      <div class="barra-fondo"><div class="barra-relleno" style="width:${pct}%;"></div></div>
    </div>
  `;
}

function mostrarDetalle(fila) {
  document.getElementById("detalle_vacio").style.display = "none";
  document.getElementById("detalle_contenido").style.display = "block";
  document.getElementById("det_nombre").textContent = fila.nombre;

  const barras = document.getElementById("det_barras");
  const extra = document.getElementById("det_extra");

  if (fila.origen === "manual" || fila.origen === "club") {
    document.getElementById("det_sub").textContent =
      [fila.origen === "club" ? "Jugador de mi club" : "Añadido manualmente", fila.club_manual, fila.posicion, fila.anio_nacimiento]
        .filter(Boolean).join(" · ");
    barras.innerHTML = "";
    extra.innerHTML = "";
    return;
  }

  document.getElementById("det_sub").textContent =
    [fila.equipo, fila.posicion, fila.anio_nacimiento || fila.anio_oficial].filter(Boolean).join(" · ");

  barras.innerHTML =
    barraHtml("Técnica", fila.tecnica) +
    barraHtml("Táctica", fila.tactica) +
    barraFisicoHtml(fila.fisico) +
    barraHtml("Actitud", fila.actitud);

  extra.innerHTML = `
    <div class="det-fila"><span>Contactado: </span><b>${fila.contactado ? "Sí" : "No"}</b></div>
    ${fila.contacto ? `<div class="det-fila"><span>Teléfono: </span><b>${fila.contacto}</b></div>` : ""}
    ${fila.comentario ? `<p style="margin-top:12px;font-size:13px;">${fila.comentario}</p>` : ""}
  `;
}

function mostrarTooltip(e, fila) {
  const tt = document.getElementById("tooltip");

  if (fila.origen === "manual") {
    tt.innerHTML = `
      <div class="t-nombre">${fila.nombre}</div>
      <div class="t-row"><span>Club</span><b>${fila.club_manual || "-"}</b></div>
      <div class="t-row"><span>Posición</span><b>${fila.posicion || "-"}</b></div>
      <div class="t-row"><span>Año</span><b>${fila.anio_nacimiento || "-"}</b></div>
      <div class="t-row"><span>Origen</span><b>Añadido manualmente</b></div>
    `;
  } else if (fila.origen === "club") {
    tt.innerHTML = `
      <div class="t-nombre">${fila.nombre}</div>
      <div class="t-row"><span>Posición</span><b>${fila.posicion || "-"}</b></div>
      <div class="t-row"><span>Año</span><b>${fila.anio_nacimiento || "-"}</b></div>
      <div class="t-row"><span>Origen</span><b>Jugador de mi club</b></div>
    `;
  } else {
    tt.innerHTML = `
      <div class="t-nombre">${fila.nombre}</div>
      <div class="t-row"><span>Equipo</span><b>${fila.equipo || "-"}</b></div>
      <div class="t-row"><span>Posición</span><b>${fila.posicion || "-"}</b></div>
      <div class="t-row"><span>Año</span><b>${fila.anio_nacimiento || fila.anio_oficial || "-"}</b></div>
      <div class="t-row"><span>Técnica</span><b>${fila.tecnica ?? "-"}</b></div>
      <div class="t-row"><span>Táctica</span><b>${fila.tactica ?? "-"}</b></div>
      <div class="t-row"><span>Físico</span><b>${fila.fisico || "-"}</b></div>
      <div class="t-row"><span>Actitud</span><b>${fila.actitud ?? "-"}</b></div>
      <div class="t-row"><span>Contactado</span><b>${fila.contactado ? "Sí" : "No"}</b></div>
      ${fila.comentario ? `<div class="t-row" style="display:block;margin-top:6px;"><span>${fila.comentario}</span></div>` : ""}
    `;
  }

  tt.style.display = "block";
  posicionarTooltip(e);
}

function posicionarTooltip(e) {
  const tt = document.getElementById("tooltip");
  let x = e.clientX + 16, y = e.clientY + 16;
  if (x + 230 > window.innerWidth) x = e.clientX - 236;
  if (y + 180 > window.innerHeight) y = e.clientY - 190;
  tt.style.left = x + "px";
  tt.style.top = y + "px";
}

function ocultarTooltip() {
  document.getElementById("tooltip").style.display = "none";
}

let arrastreActivo = null;
let seDeslizoBastante = false;

function coordenadas(e) {
  if (e.touches && e.touches.length) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  if (e.changedTouches && e.changedTouches.length) return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
  return { x: e.clientX, y: e.clientY };
}

function iniciarArrastre(e, tarjeta, fila) {
  e.preventDefault();
  ocultarTooltip();
  seDeslizoBastante = false;
  const { x, y } = coordenadas(e);
  arrastreActivo = { tarjeta, fila, startX: x, startY: y };
  tarjeta.classList.add("arrastrando");
  document.addEventListener("mousemove", moverArrastre);
  document.addEventListener("mouseup", soltarArrastre);
  document.addEventListener("touchmove", moverArrastre, { passive: false });
  document.addEventListener("touchend", soltarArrastre);
  document.addEventListener("touchcancel", soltarArrastre);
}

function moverArrastre(e) {
  if (!arrastreActivo) return;
  e.preventDefault();
  const { x: cx, y: cy } = coordenadas(e);
  if (Math.abs(cx - arrastreActivo.startX) > 4 || Math.abs(cy - arrastreActivo.startY) > 4) {
    seDeslizoBastante = true;
  }
  const campo = document.getElementById("campo");
  const rect = campo.getBoundingClientRect();
  let x = ((cx - rect.left) / rect.width) * 100;
  let y = ((cy - rect.top) / rect.height) * 100;
  x = Math.max(3, Math.min(97, x));
  y = Math.max(3, Math.min(97, y));
  arrastreActivo.tarjeta.style.left = x + "%";
  arrastreActivo.tarjeta.style.top = y + "%";
  arrastreActivo.nuevaX = x;
  arrastreActivo.nuevaY = y;
}

async function soltarArrastre() {
  document.removeEventListener("mousemove", moverArrastre);
  document.removeEventListener("mouseup", soltarArrastre);
  document.removeEventListener("touchmove", moverArrastre);
  document.removeEventListener("touchend", soltarArrastre);
  document.removeEventListener("touchcancel", soltarArrastre);
  if (!arrastreActivo) return;

  arrastreActivo.tarjeta.classList.remove("arrastrando");
  const { fila, nuevaX, nuevaY } = arrastreActivo;
  arrastreActivo = null;

  if (nuevaX === undefined) return;
  fila.pos_x = nuevaX;
  fila.pos_y = nuevaY;
  await client.from("plantilla_jugadores").update({ pos_x: nuevaX, pos_y: nuevaY }).eq("id", fila.id);
}

async function quitarDelTablero(e, id) {
  e.stopPropagation();
  await client.from("plantilla_jugadores").delete().eq("id", id);
  cargarTablero();
}

function tieneDatosPrivado(p) {
  return !!(p.anio_nacimiento || p.posicion || p.contacto || p.contactado ||
    p.tecnica || p.tactica || p.fisico || p.actitud || (p.comentario && String(p.comentario).trim()));
}

let buscarTimeout = null;
function buscarJugadores() {
  clearTimeout(buscarTimeout);
  buscarTimeout = setTimeout(ejecutarBusqueda, 300);
}

async function ejecutarBusqueda() {
  const q = document.getElementById("buscador").value.trim();
  const cont = document.getElementById("resultados_busqueda");
  if (!miClubId) { cont.innerHTML = ""; return; }

  const { data: privados } = await client.from("jugadores_club").select("*").eq("club_id", miClubId);
  const conDatos = (privados || []).filter(tieneDatosPrivado);

  if (!conDatos.length) {
    cont.innerHTML = "<p style='color:var(--muted);font-size:12px;'>Aún no has valorado a ningún jugador.</p>";
    return;
  }

  const ids = conDatos.map(p => p.jugador_id);
  let query = client.from("jugadores").select("*").in("id", ids);
  if (q) query = query.ilike("nombre", `%${q}%`);
  const { data: jugadores } = await query.limit(30);

  const rango = rangoActual();
  const filtrados = (jugadores || []).filter(j => {
    if (!rango) return true;
    const priv = conDatos.find(p => p.jugador_id === j.id);
    const anio = priv?.anio_nacimiento || (j.fecha_nacimiento ? new Date(j.fecha_nacimiento).getFullYear() : null);
    if (!anio) return true;
    return anio >= rango.min && anio <= rango.max;
  });

  if (!filtrados.length) {
    cont.innerHTML = "<p style='color:var(--muted);font-size:12px;'>Sin resultados.</p>";
    return;
  }

  const equipoIds = [...new Set(filtrados.map(j => j.equipo_id).filter(Boolean))];
  const { data: equipos } = equipoIds.length
    ? await client.from("equipos").select("id, nombre").in("id", equipoIds)
    : { data: [] };

  cont.innerHTML = "";
  filtrados.forEach(j => {
    const equipo = (equipos || []).find(e => e.id === j.equipo_id);
    const div = document.createElement("div");
    div.className = "resultado";
    div.innerHTML = `
      <div class="nombre">${j.nombre}</div>
      <div class="meta">${equipo?.nombre || "Sin equipo"}</div>
      <button onclick="anadirExistente('${j.id}')">+ Añadir al campo</button>
    `;
    cont.appendChild(div);
  });
}

let buscarClubTimeout = null;
function buscarClub() {
  clearTimeout(buscarClubTimeout);
  buscarClubTimeout = setTimeout(ejecutarBusquedaClub, 300);
}

async function ejecutarBusquedaClub() {
  const q = document.getElementById("buscador_club").value.trim();
  const cont = document.getElementById("resultados_club");
  if (!miClubId) { cont.innerHTML = ""; return; }

  let query = client.from("club_jugadores").select("*").eq("club_id", miClubId);
  if (q) query = query.ilike("nombre", `%${q}%`);
  const { data } = await query.order("nombre").limit(30);

  const rango = rangoActual();
  const filtrados = (data || []).filter(j => {
    if (!rango || !j.anio_nacimiento) return true;
    return j.anio_nacimiento >= rango.min && j.anio_nacimiento <= rango.max;
  });

  if (!filtrados.length) {
    cont.innerHTML = "<p style='color:var(--muted);font-size:12px;'>Sin jugadores propios todavía.</p>";
    return;
  }

  cont.innerHTML = "";
  filtrados.forEach(j => {
    const div = document.createElement("div");
    div.className = "resultado";
    div.innerHTML = `
      <div class="nombre">${j.nombre}</div>
      <div class="meta">${[j.posicion, j.anio_nacimiento].filter(Boolean).join(" · ")}</div>
      <button onclick="anadirClubJugador('${j.id}')">+ Añadir al campo</button>
    `;
    cont.appendChild(div);
  });
}

async function crearJugadorClub() {
  const nombre = document.getElementById("club_nombre").value.trim();
  const posicion = document.getElementById("club_posicion").value.trim();
  const anio = document.getElementById("club_anio").value || null;
  if (!nombre) { alert("Escribe un nombre."); return; }
  if (!miClubId) { alert("No hay un club seleccionado."); return; }

  const { data, error } = await client.from("club_jugadores")
    .insert({ club_id: miClubId, nombre, posicion: posicion || null, anio_nacimiento: anio })
    .select("id").single();

  if (error) { alert("Error creando jugador: " + error.message); return; }

  document.getElementById("club_nombre").value = "";
  document.getElementById("club_posicion").value = "";
  document.getElementById("club_anio").value = "";

  await ejecutarBusquedaClub();
  if (plantillaActualId) await anadirClubJugador(data.id);
}

function siguientePosicion() {
  const n = filasTablero.length;
  return { pos_x: 30 + (n % 3) * 20, pos_y: 15 + Math.floor(n / 3) * 18 };
}

async function anadirExistente(jugadorId) {
  if (!plantillaActualId) { alert("Crea o selecciona una plantilla primero."); return; }
  const { pos_x, pos_y } = siguientePosicion();

  const { error } = await client.from("plantilla_jugadores").insert({
    plantilla_id: plantillaActualId, jugador_id: jugadorId, pos_x, pos_y
  });
  if (error) { alert("Error añadiendo: " + error.message); return; }
  cargarTablero();
}

async function anadirClubJugador(clubJugadorId) {
  if (!plantillaActualId) { alert("Crea o selecciona una plantilla primero."); return; }
  const { pos_x, pos_y } = siguientePosicion();

  const { error } = await client.from("plantilla_jugadores").insert({
    plantilla_id: plantillaActualId, club_jugador_id: clubJugadorId, pos_x, pos_y
  });
  if (error) { alert("Error añadiendo: " + error.message); return; }
  cargarTablero();
}

async function anadirManual() {
  const nombre = document.getElementById("manual_nombre").value.trim();
  const club = document.getElementById("manual_club").value.trim();
  const posicion = document.getElementById("manual_posicion").value.trim();
  const anio = document.getElementById("manual_anio").value || null;
  if (!nombre) { alert("Escribe un nombre."); return; }
  if (!plantillaActualId) { alert("Crea o selecciona una plantilla primero."); return; }

  const { pos_x, pos_y } = siguientePosicion();

  const { error } = await client.from("plantilla_jugadores").insert({
    plantilla_id: plantillaActualId, nombre_manual: nombre, club_manual: club || null,
    posicion_manual: posicion || null, anio_manual: anio, pos_x, pos_y
  });
  if (error) { alert("Error añadiendo: " + error.message); return; }

  document.getElementById("manual_nombre").value = "";
  document.getElementById("manual_club").value = "";
  document.getElementById("manual_posicion").value = "";
  document.getElementById("manual_anio").value = "";
  cargarTablero();
}

document.addEventListener("DOMContentLoaded", async () => {
  const ok = await protegerPagina();
  if (!ok) return;
  await cargarClubsSiAdmin();
  await cargarPlantillas();
});
