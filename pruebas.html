<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CaptaNET - Inscripción a pruebas</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--primary:#2563eb;--primary-dark:#1d4ed8;--bg:#f5f6fa;--card:#fff;--border:#e2e4eb;--text:#1f2430;--muted:#6b7280;}
*{box-sizing:border-box;}
body{
  margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
  background:linear-gradient(160deg,#eef1fb 0%,var(--bg) 55%);color:var(--text);padding:24px 0;
}
.card{
  background:var(--card);border:1px solid var(--border);border-radius:14px;
  box-shadow:0 20px 40px -20px rgba(30,41,59,.25);padding:40px 36px;width:100%;max-width:460px;
}
.logo{font-size:26px;font-weight:800;color:var(--primary);text-align:center;margin-bottom:4px;}
.subtitle{text-align:center;color:var(--muted);font-size:14px;margin-bottom:28px;}
label{display:block;font-size:13px;color:var(--muted);margin-bottom:6px;font-weight:600;}
.field{margin-bottom:16px;}
input,select,textarea{
  width:100%;padding:11px 12px;border:1px solid var(--border);border-radius:8px;
  font-size:15px;background:#fafbfe;font-family:inherit;transition:border-color .15s, box-shadow .15s;
}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.15);}
textarea{resize:vertical;min-height:70px;}
.fila-doble{display:flex;gap:12px;}
.fila-doble .field{flex:1;}
button{
  width:100%;background:var(--primary);color:#fff;border:none;padding:12px;border-radius:8px;
  font-size:15px;font-weight:600;cursor:pointer;
}
button:hover{background:var(--primary-dark);}
button:disabled{opacity:.6;cursor:default;}
.error{
  display:none;background:#fef2f2;color:#dc2626;border:1px solid #fecaca;border-radius:8px;
  padding:10px 12px;font-size:13px;margin-bottom:16px;
}
.aviso-ok{
  text-align:center;padding:20px 4px;
}
.aviso-ok h2{color:#15803d;margin:0 0 8px;}
.aviso-ok p{color:var(--muted);font-size:14px;margin:0;}
</style>
</head>

<body>
  <div class="card">
    <div class="logo">CaptaNET</div>
    <div class="subtitle" id="subtitle">Inscripción a pruebas</div>

    <p id="error" class="error"></p>

    <div id="sinClub" style="display:none;color:var(--muted);font-size:14px;text-align:center;">
      No se ha encontrado el club. Accede desde el enlace que te ha facilitado tu club.
    </div>

    <form id="inscripcionForm">
      <div class="field">
        <label for="nombre">Nombre completo *</label>
        <input id="nombre" type="text" required>
      </div>
      <div class="fila-doble">
        <div class="field">
          <label for="fecha_nacimiento">Fecha de nacimiento *</label>
          <input id="fecha_nacimiento" type="date" required>
        </div>
        <div class="field">
          <label for="posicion">Posición</label>
          <select id="posicion">
            <option value="">-</option>
            <option>Portero</option>
            <option>Defensa</option>
            <option>Centrocampista</option>
            <option>Delantero</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label for="email">Email *</label>
        <input id="email" type="email" required>
      </div>
      <div class="field">
        <label for="telefono">Teléfono</label>
        <input id="telefono" type="tel">
      </div>
      <div class="field">
        <label for="nombre_contacto">Nombre del padre/madre/tutor (si es menor)</label>
        <input id="nombre_contacto" type="text">
      </div>
      <div class="field">
        <label for="club_actual">Club actual</label>
        <input id="club_actual" type="text">
      </div>
      <div class="field">
        <label for="comentario">Cuéntanos algo sobre ti (opcional)</label>
        <textarea id="comentario"></textarea>
      </div>
      <button id="submitBtn" type="submit">Inscribirme</button>
    </form>

    <div id="okBox" class="aviso-ok" style="display:none;">
      <h2>¡Inscripción recibida!</h2>
      <p>Nos pondremos en contacto contigo para confirmarte el día y la hora de la prueba.</p>
    </div>
  </div>

  <script>
    const client = supabase.createClient(
      "https://bnqoisjvboytiphiwosj.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJucW9pc2p2Ym95dGlwaGl3b3NqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2MDgwMTcsImV4cCI6MjA5OTE4NDAxN30.RpTr0Z17ZRFwTpBvsmNwyqtEm0nLVWxM96mxaLxDbes"
    );

    const form = document.getElementById("inscripcionForm");
    const errorBox = document.getElementById("error");
    const submitBtn = document.getElementById("submitBtn");

    function getClubSlug() {
      const partes = window.location.hostname.split(".");
      if (partes.length >= 3 && partes[0] !== "www") return partes[0];
      return null;
    }

    const clubSlug = getClubSlug();

    function mostrarError(msg) {
      errorBox.textContent = msg;
      errorBox.style.display = "block";
    }

    async function aplicarBrandingClub() {
      if (!clubSlug) {
        form.style.display = "none";
        document.getElementById("sinClub").style.display = "block";
        return;
      }
      const { data: nombre, error } = await client.rpc("get_club_nombre_by_slug", { p_slug: clubSlug });
      if (error) { console.error("[CaptaNET] get_club_nombre_by_slug:", error); return; }
      if (nombre) {
        document.getElementById("subtitle").textContent = "Inscripción a pruebas de " + nombre;
        document.title = "CaptaNET - Pruebas " + nombre;
      } else {
        form.style.display = "none";
        document.getElementById("sinClub").style.display = "block";
      }
    }

    aplicarBrandingClub();

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errorBox.style.display = "none";

      submitBtn.disabled = true;
      submitBtn.textContent = "Enviando...";

      const { error } = await client.rpc("pruebas_inscribir", {
        p_slug: clubSlug,
        p_nombre: document.getElementById("nombre").value.trim(),
        p_fecha_nacimiento: document.getElementById("fecha_nacimiento").value,
        p_email: document.getElementById("email").value.trim(),
        p_telefono: document.getElementById("telefono").value.trim(),
        p_nombre_contacto: document.getElementById("nombre_contacto").value.trim(),
        p_posicion: document.getElementById("posicion").value,
        p_club_actual: document.getElementById("club_actual").value.trim(),
        p_comentario: document.getElementById("comentario").value.trim(),
      });

      if (error) {
        mostrarError("No se ha podido enviar la inscripción. Inténtalo de nuevo.");
        console.error("[CaptaNET] pruebas_inscribir:", error);
        submitBtn.disabled = false;
        submitBtn.textContent = "Inscribirme";
        return;
      }

      form.style.display = "none";
      document.getElementById("okBox").style.display = "block";
    });
  </script>
</body>
</html>
