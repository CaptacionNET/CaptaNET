<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CaptaNET - Mi equipo</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://cdn.jsdelivr.net/npm/tabulator-tables@5.6.1/dist/css/tabulator.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tabulator-tables@5.6.1/dist/js/tabulator.min.js"></script>
<style>
:root{--primary:#2563eb;--bg:#f5f6fa;--card:#fff;--border:#e2e4eb;--text:#1f2430;--muted:#6b7280;}
*{box-sizing:border-box;}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);}
#topbar{display:flex;justify-content:space-between;align-items:center;padding:14px 24px;background:var(--card);border-bottom:1px solid var(--border);flex-wrap:wrap;gap:10px;}
#topbar .brand{font-weight:700;font-size:18px;color:var(--primary);}
button{background:var(--primary);color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:14px;}
button:hover{opacity:.9;}
button.secondary{background:#fff;color:var(--text);border:1px solid var(--border);}
button.secondary.active{background:#eff6ff;color:var(--primary);border-color:var(--primary);font-weight:700;}
input,select,textarea{padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:14px;}
.status{font-weight:600;margin:8px 24px;color:var(--muted);}
.tabla-scroll{margin:0 24px;overflow-x:auto;}
@media (max-width:600px){
  #topbar{padding:12px 16px;}
  .tabla-scroll{margin:0 12px;}
}
</style>
</head>
<body>

<div id="topbar">
  <div class="brand">CaptaNET · Mi equipo</div>
  <div style="display:flex;gap:10px;flex-wrap:wrap;">
    <button class="secondary" onclick="atras()">← Atrás</button>
    <button class="secondary" onclick="window.location.href='visor.html'">Visor</button>
    <button class="secondary" onclick="window.location.href='jugadores.html'">Informes</button>
    <button class="secondary" onclick="window.location.href='equipos.html'">Equipos</button>
    <button class="secondary" onclick="window.location.href='plantillas.html'">Plantillas</button>
    <button class="secondary" onclick="window.location.href='gestion_pruebas.html'">Pruebas</button>
    <button class="secondary" onclick="window.location.href='usuario.html'">Mi perfil</button>
    <button class="secondary active" onclick="window.location.href='equipo.html'">Mi equipo</button>
    <button id="btn_admin" class="secondary" style="display:none;" onclick="window.location.href='admin.html'">Panel Admin</button>
    <button class="secondary" onclick="logout()">Cerrar sesión</button>
  </div>
</div>

<p style="color:var(--muted);font-size:14px;margin:16px 24px 0;">
  Aquí gestionas las cuentas de tu propio club. Para crear una, añade una fila y rellena al menos Email y Nueva contraseña.
</p>
<div style="margin:16px 24px;">
  <button onclick="anadirFilaUsuario()">+ Añadir usuario</button>
</div>
<div class="tabla-scroll"><div id="tabla-usuarios"></div></div>
<p id="usuarios_status" class="status"></p>

<script>
const client = supabase.createClient(
  "https://bnqoisjvboytiphiwosj.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJucW9pc2p2Ym95dGlwaGl3b3NqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2MDgwMTcsImV4cCI6MjA5OTE4NDAxN30.RpTr0Z17ZRFwTpBvsmNwyqtEm0nLVWxM96mxaLxDbes"
);

let miClubId = null;
let tablaUsuarios = null;

async function mensajeError(error) {
  if (!error) return "";
  if (error.context && typeof error.context.json === "function") {
    try {
      const body = await error.context.json();
      if (body?.error) return typeof body.error === "string" ? body.error : JSON.stringify(body.error);
    } catch (e) {}
  }
  return error.message || "Error desconocido";
}

async function protegerPagina() {
  const { data: session } = await client.auth.getSession();
  if (!session.session) { window.location.href = "index.html"; return false; }

  const { data: perfil } = await client
    .from("profiles").select("is_admin, is_club_admin, club_id").eq("id", session.session.user.id).single();

  if (!perfil?.is_club_admin) { window.location.href = "visor.html"; return false; }

  miClubId = perfil.club_id;
  if (perfil?.is_admin) document.getElementById("btn_admin").style.display = "inline-block";
  return true;
}

function atras() {
  if (window.history.length > 1) window.history.back();
  else window.location.href = "visor.html";
}

async function logout() {
  await client.auth.signOut();
  window.location.href = "index.html";
}

function formatearFechaHora(iso) {
  if (!iso) return "Nunca";
  return new Date(iso).toLocaleString("es-ES", { day: "2-digit", month: "2-digit", year: "numeric", hour: "2-digit", minute: "2-digit" });
}

async function cargarUsuarios() {
  const status = document.getElementById("usuarios_status");
  const { data, error } = await client.from("profiles").select("*").eq("club_id", miClubId).order("username");
  if (error) { status.textContent = "Error cargando usuarios: " + error.message; return; }
  status.textContent = "";

  let accesos = {};
  try {
    const { data: d } = await client.functions.invoke("ultimo-acceso");
    accesos = d?.accesos || {};
  } catch { /* si falla, la columna simplemente sale vacía */ }

  tablaUsuarios = new Tabulator("#tabla-usuarios", {
    data: (data || []).map(u => ({ ...u, contrasena: "", ultimo_acceso: accesos[u.id] || null })),
    layout: window.matchMedia("(max-width:700px)").matches ? "fitData" : "fitColumns",
    // "collapse" metía Email y Contraseña dentro de un desplegable de
    // solo lectura en móvil, sin poder editarlos. Con scroll horizontal
    // basta para estas pocas columnas.
    responsiveLayout: false,
    reactiveData: true,
    height: "600px",
    columns: [
      { title: "Nombre", field: "nombre", editor: "input" },
      { title: "Username", field: "username", editor: "input" },
      { title: "Email", field: "email", editor: "input" },
      {
        title: "Último acceso", field: "ultimo_acceso", sorter: "datetime",
        formatter: cell => formatearFechaHora(cell.getValue())
      },
      {
        title: "Nueva contraseña", field: "contrasena", editor: "input",
        editorParams: { elementAttributes: { type: "password", autocomplete: "new-password" } }
      },
      {
        title: "Eliminar", formatter: "buttonCross", width: 90, hozAlign: "center",
        cellClick: async (e, cell) => {
          const row = cell.getRow().getData();
          if (!row.id) { cell.getRow().delete(); return; }
          if (!confirm(`¿Eliminar a ${row.username || row.email}? No se puede deshacer.`)) return;
          const { error } = await client.functions.invoke("admin-delete-user", { body: { id: row.id } });
          if (error) { alert("Error eliminando: " + await mensajeError(error)); return; }
          cell.getRow().delete();
        }
      }
    ]
  });

  tablaUsuarios.on("cellEdited", cell => guardarUsuario(cell));
}

async function guardarUsuario(cell) {
  const row = cell.getRow().getData();
  const campo = cell.getField();
  const status = document.getElementById("usuarios_status");

  if (!row.id) {
    if (row.email && row.contrasena) await crearUsuarioDesdeFila(cell.getRow());
    return;
  }

  if (campo === "contrasena") {
    if (!row.contrasena) return;
    const { error } = await client.functions.invoke("admin-update-password", {
      body: { id: row.id, password: row.contrasena }
    });
    if (error) { status.textContent = "Error cambiando contraseña: " + await mensajeError(error); return; }
    row.contrasena = "";
    cell.getRow().update(row);
    status.textContent = "Contraseña actualizada.";
    return;
  }

  const { error } = await client.functions.invoke("admin-update-profile", {
    body: { id: row.id, email: row.email, username: row.username, nombre: row.nombre }
  });
  status.textContent = error ? "Error actualizando: " + await mensajeError(error) : "Guardado.";
}

async function crearUsuarioDesdeFila(row) {
  const d = row.getData();
  const status = document.getElementById("usuarios_status");

  const { error } = await client.functions.invoke("create-user", {
    body: { email: d.email, password: d.contrasena, username: d.username || d.email, nombre: d.nombre }
  });

  if (error) { status.textContent = "Error creando usuario: " + await mensajeError(error); return; }
  status.textContent = "Usuario creado.";
  await cargarUsuarios();
}

function anadirFilaUsuario() {
  tablaUsuarios.addRow({ nombre: "", username: "", email: "", contrasena: "" }, true);
}

document.addEventListener("DOMContentLoaded", async () => {
  const ok = await protegerPagina();
  if (!ok) return;
  await cargarUsuarios();
});
</script>
</body>
</html>
