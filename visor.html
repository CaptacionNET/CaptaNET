<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CaptaNET - Visor</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://cdn.jsdelivr.net/npm/tabulator-tables@5.6.1/dist/css/tabulator.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tabulator-tables@5.6.1/dist/js/tabulator.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.js"></script>
<style>
:root{--primary:#2563eb;--bg:#f5f6fa;--card:#fff;--border:#e2e4eb;--text:#1f2430;--muted:#6b7280;}
*{box-sizing:border-box;}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);}
#topbar{display:flex;justify-content:space-between;align-items:center;padding:14px 24px;background:var(--card);border-bottom:1px solid var(--border);}
#topbar .brand{font-weight:700;font-size:18px;color:var(--primary);}
button{background:var(--primary);color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;font-size:14px;}
button:hover{opacity:.9;}
button.secondary{background:#fff;color:var(--text);border:1px solid var(--border);}
input,select,textarea{padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:14px;}
.filtros{display:flex;gap:10px;flex-wrap:wrap;margin:16px 24px;align-items:end;}
.field label{font-size:12px;color:var(--muted);display:block;margin-bottom:4px;}
.field select,.field input{min-width:160px;}
.aviso{margin:24px;color:var(--muted);}
</style>
</head>
<body>

<div id="topbar">
  <div class="brand">CaptaNET <span id="brand_extra" style="color:var(--muted);font-weight:400;"></span></div>
  <div style="display:flex;gap:10px;">
    <button class="secondary" onclick="window.location.href='usuario.html'">Mi perfil</button>
    <button class="secondary" onclick="logout()">Cerrar sesión</button>
    <button id="btn_equipo" class="secondary" style="display:none;" onclick="window.location.href='equipo.html'">Mi equipo</button>
    <button id="btn_admin" class="secondary" style="display:none;" onclick="window.location.href='admin.html'">Panel Admin</button>
  </div>
</div>

<div class="filtros">
  <div class="field" id="campo_club" style="display:none;">
    <label>Club (vista admin)</label>
    <select id="filtro_club" onchange="onClubChange()"></select>
  </div>
  <div class="field">
    <label>Temporada</label>
    <select id="filtro_temporada" onchange="onTemporadaChange()"></select>
  </div>
  <div class="field">
    <label>Categoría</label>
    <select id="filtro_categoria" onchange="onCategoriaChange()"><option value="">Selecciona categoría</option></select>
  </div>
  <div class="field">
    <label>Liga</label>
    <select id="filtro_liga" onchange="onLigaChange()"><option value="">Todas</option></select>
  </div>
  <div class="field">
    <label>Grupo</label>
    <select id="filtro_grupo" onchange="onGrupoChange()"><option value="">Todos</option></select>
  </div>
  <div class="field">
    <label>Equipo</label>
    <select id="filtro_equipo" onchange="cargarJugadores()"><option value="">Todos</option></select>
  </div>
  <div class="field">
    <label>Buscar jugador</label>
    <input id="filtro_nombre" type="text" placeholder="Nombre..." oninput="aplicarFiltrosLocales()">
  </div>
  <div class="field">
    <label>&nbsp;</label>
    <label style="display:flex;align-items:center;gap:6px;font-size:14px;color:var(--text);">
      <input id="filtro_solo_vistos" type="checkbox" onchange="aplicarFiltrosLocales()" style="width:auto;">
      Solo vistos
    </label>
  </div>
  <div class="field">
    <label>&nbsp;</label>
    <div style="display:flex;gap:10px;">
      <button class="secondary" onclick="exportarExcel()">Exportar a Excel</button>
      <button class="secondary" onclick="exportarPDF()">Exportar a PDF</button>
    </div>
  </div>
</div>

<p id="aviso" class="aviso" style="display:none;"></p>
<div id="tabla" style="margin:0 24px;"></div>

<script>
const client = supabase.createClient(
  "https://bnqoisjvboytiphiwosj.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJucW9pc2p2Ym95dGlwaGl3b3NqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2MDgwMTcsImV4cCI6MjA5OTE4NDAxN30.RpTr0Z17ZRFwTpBvsmNwyqtEm0nLVWxM96mxaLxDbes"
);

const CAMPOS_PRIVADOS = ["anio_nacimiento", "posicion", "contacto", "contactado", "tecnica", "tactica", "fisico", "actitud", "comentario"];
const NIVELES_FISICO = ["BAJO", "MEDIO-BAJO", "MEDIO", "MEDIO-ALTO", "ALTO", "MUY ALTO"];

let esAdmin = false;
let miClubId = null;
let temporadasCache = [], categoriasCache = [], ligasCache = [], gruposCache = [], equiposCache = [];
let tabla = null;
let basefilas = [];

async function protegerPagina() {
  const { data: session } = await client.auth.getSession();
  if (!session.session) { window.location.href = "index.html"; return false; }

  const { data: perfil } = await client
    .from("profiles").select("is_admin, is_club_admin, club_id, clubs(nombre)").eq("id", session.session.user.id).single();

  esAdmin = !!perfil?.is_admin;
  miClubId = perfil?.club_id || null;

  if (esAdmin) document.getElementById("btn_admin").style.display = "inline-block";
  if (perfil?.is_club_admin) document.getElementById("btn_equipo").style.display = "inline-block";

  document.getElementById("brand_extra").textContent =
    esAdmin ? "· ADMIN" : (perfil?.clubs?.nombre ? "· " + perfil.clubs.nombre : "");

  return true;
}

async function logout() {
  await client.auth.signOut();
  window.location.href = "index.html";
}

async function cargarCaches() {
  const [t, c, l, g, e] = await Promise.all([
    client.from("temporadas").select("*").order("nombre"),
    client.from("categorias").select("*").order("nombre"),
    client.from("ligas").select("*").order("nombre"),
    client.from("grupos").select("*").order("nombre"),
    client.from("equipos").select("*").order("nombre"),
  ]);
  temporadasCache = t.data || [];
  categoriasCache = c.data || [];
  ligasCache = l.data || [];
  gruposCache = g.data || [];
  equiposCache = e.data || [];
}

async function cargarClubsSiAdmin() {
  if (!esAdmin) return;
  document.getElementById("campo_club").style.display = "block";
  const { data: clubs } = await client.from("clubs").select("id, nombre").order("nombre");
  const sel = document.getElementById("filtro_club");
  sel.innerHTML = "";
  (clubs || []).forEach(c => sel.innerHTML += `<option value="${c.id}">${c.nombre}</option>`);
  if (clubs && clubs.length) miClubId = clubs[0].id;
}

function onClubChange() {
  miClubId = document.getElementById("filtro_club").value;
  cargarJugadores();
}

function poblarTemporadas() {
  const sel = document.getElementById("filtro_temporada");
  sel.innerHTML = "";
  temporadasCache.forEach(t => sel.innerHTML += `<option value="${t.id}">${t.nombre}</option>`);
  const activa = temporadasCache.find(t => t.activa);
  if (activa) sel.value = activa.id;
}

function selNum(id) {
  const v = document.getElementById(id).value;
  return v === "" ? "" : Number(v);
}

function poblarCategorias() {
  const temporadaId = document.getElementById("filtro_temporada").value;
  const sel = document.getElementById("filtro_categoria");
  sel.innerHTML = '<option value="">Selecciona categoría</option>';
  categoriasCache.filter(c => c.temporada_id === temporadaId)
    .forEach(c => sel.innerHTML += `<option value="${c.id}">${c.nombre}</option>`);
}

function poblarLigas() {
  const categoriaId = selNum("filtro_categoria");
  const sel = document.getElementById("filtro_liga");
  sel.innerHTML = '<option value="">Todas</option>';
  ligasCache.filter(l => l.categoria_id === categoriaId)
    .forEach(l => sel.innerHTML += `<option value="${l.id}">${l.nombre}</option>`);
}

function poblarGrupos() {
  const ligaId = selNum("filtro_liga");
  const sel = document.getElementById("filtro_grupo");
  sel.innerHTML = '<option value="">Todos</option>';
  gruposCache.filter(g => !ligaId || g.liga_id === ligaId)
    .forEach(g => sel.innerHTML += `<option value="${g.id}">${g.nombre}</option>`);
}

function poblarEquipos() {
  const grupoId = selNum("filtro_grupo");
  const ligaId = selNum("filtro_liga");
  const sel = document.getElementById("filtro_equipo");
  sel.innerHTML = '<option value="">Todos</option>';
  equiposCache.filter(e => {
    if (grupoId) return e.grupo_id === grupoId;
    if (ligaId) { const g = gruposCache.find(x => x.id === e.grupo_id); return g && g.liga_id === ligaId; }
    return true;
  }).forEach(e => sel.innerHTML += `<option value="${e.id}">${e.nombre}</option>`);
}

function onTemporadaChange() { poblarCategorias(); poblarLigas(); poblarGrupos(); poblarEquipos(); cargarJugadores(); }
function onCategoriaChange() { poblarLigas(); poblarGrupos(); poblarEquipos(); cargarJugadores(); }
function onLigaChange() { poblarGrupos(); poblarEquipos(); cargarJugadores(); }
function onGrupoChange() { poblarEquipos(); cargarJugadores(); }

function equiposFiltrados() {
  const temporadaId = document.getElementById("filtro_temporada").value;
  const categoriaId = selNum("filtro_categoria");
  const ligaId = selNum("filtro_liga");
  const grupoId = selNum("filtro_grupo");
  const equipoId = selNum("filtro_equipo");

  return equiposCache.filter(e => {
    if (equipoId) return e.id === equipoId;
    if (grupoId) return e.grupo_id === grupoId;
    const g = gruposCache.find(x => x.id === e.grupo_id);
    if (!g) return false;
    if (ligaId) return g.liga_id === ligaId;
    const l = ligasCache.find(x => x.id === g.liga_id);
    if (!l) return false;
    if (categoriaId) return l.categoria_id === categoriaId;
    return e.temporada_id === temporadaId;
  });
}

if (window.jspdf) window.jsPDF = window.jspdf.jsPDF;

function exportarExcel() {
  tabla.download("xlsx", "jugadores.xlsx", { sheetName: "Jugadores" });
}

function exportarPDF() {
  tabla.download("pdf", "jugadores.pdf", {
    orientation: "landscape",
    title: "CaptaNET - Jugadores"
  });
}

function crearTabla() {
  return new Promise(resolve => {
    tabla = new Tabulator("#tabla", {
      data: [],
      layout: "fitColumns",
      height: "70vh",
      reactiveData: true,
      columns: [
      { title: "Jugador", field: "nombre", frozen: true },
      { title: "Equipo", field: "equipo" },
      { title: "Dorsal", field: "dorsal" },
      { title: "Año", field: "anio_nacimiento", editor: "number" },
      { title: "Posición", field: "posicion", editor: "input" },
      { title: "Teléfono", field: "contacto", editor: "input" },
      { title: "Contactado", field: "contactado", editor: "tickCross", formatter: "tickCross" },
      { title: "Técnica", field: "tecnica", editor: "number" },
      { title: "Táctica", field: "tactica", editor: "number" },
      {
        title: "Físico", field: "fisico", editor: "list",
        editorParams: { values: NIVELES_FISICO }
      },
      { title: "Actitud", field: "actitud", editor: "number" },
      { title: "Comentario", field: "comentario", editor: "textarea", formatter: "textarea" }
      ]
    });

    // En Tabulator 5.x los eventos de tabla solo funcionan vía .on(),
    // no como opciones del constructor (ahí se ignoran en silencio).
    tabla.on("tableBuilt", resolve);
    tabla.on("cellEdited", cell => {
      if (CAMPOS_PRIVADOS.includes(cell.getField())) {
        guardarPrivado(cell.getRow().getData());
      }
    });
  });
}

async function cargarJugadores() {
  const aviso = document.getElementById("aviso");
  const categoriaId = document.getElementById("filtro_categoria").value;

  if (!miClubId) {
    aviso.style.display = "block";
    aviso.textContent = "Tu cuenta no tiene un club asignado. Contacta con el administrador.";
    tabla.setData([]);
    return;
  }
  if (!categoriaId) {
    aviso.style.display = "block";
    aviso.textContent = "Selecciona al menos una categoría para ver jugadores.";
    tabla.setData([]);
    return;
  }
  aviso.style.display = "none";

  const equipoIds = equiposFiltrados().map(e => e.id);
  if (equipoIds.length === 0) { tabla.setData([]); return; }

  const { data: jugadores } = await client.from("jugadores").select("*").in("equipo_id", equipoIds);
  const jugadorIds = (jugadores || []).map(j => j.id);

  let privados = [];
  if (jugadorIds.length) {
    const { data } = await client.from("jugadores_club").select("*").eq("club_id", miClubId).in("jugador_id", jugadorIds);
    privados = data || [];
  }

  basefilas = (jugadores || []).map(j => {
    const priv = privados.find(p => p.jugador_id === j.id) || {};
    const equipo = equiposCache.find(e => e.id === j.equipo_id);
    return {
      jugador_id: j.id,
      nombre: j.nombre,
      equipo: equipo?.nombre || "",
      dorsal: j.dorsal,
      anio_nacimiento: priv.anio_nacimiento ?? "",
      posicion: priv.posicion ?? "",
      contacto: priv.contacto ?? "",
      contactado: priv.contactado ?? false,
      tecnica: priv.tecnica ?? "",
      tactica: priv.tactica ?? "",
      fisico: priv.fisico ?? "",
      actitud: priv.actitud ?? "",
      comentario: priv.comentario ?? ""
    };
  });

  aplicarFiltrosLocales();
}

function tieneDatosClub(f) {
  return !!(f.anio_nacimiento || f.posicion || f.contacto || f.contactado ||
    f.tecnica || f.tactica || f.fisico || f.actitud || (f.comentario && String(f.comentario).trim()));
}

function aplicarFiltrosLocales() {
  const nombreFiltro = document.getElementById("filtro_nombre").value.toLowerCase();
  const soloVistos = document.getElementById("filtro_solo_vistos").checked;

  let filas = basefilas;
  if (nombreFiltro) filas = filas.filter(f => f.nombre.toLowerCase().includes(nombreFiltro));
  if (soloVistos) filas = filas.filter(tieneDatosClub);

  tabla.setData(filas);
}

async function guardarPrivado(row) {
  const temporadaId = document.getElementById("filtro_temporada").value;
  const aviso = document.getElementById("aviso");
  const payload = {
    jugador_id: row.jugador_id,
    club_id: miClubId,
    temporada_id: temporadaId,
    anio_nacimiento: row.anio_nacimiento || null,
    posicion: row.posicion || null,
    contacto: row.contacto || null,
    contactado: !!row.contactado,
    tecnica: row.tecnica || null,
    tactica: row.tactica || null,
    fisico: row.fisico || null,
    actitud: row.actitud || null,
    comentario: row.comentario || null
  };

  try {
    const { error } = await client.from("jugadores_club")
      .upsert(payload, { onConflict: "jugador_id,club_id,temporada_id" })
      .select();

    aviso.style.display = "block";
    if (error) {
      aviso.style.color = "#dc2626";
      aviso.textContent = "No se pudo guardar: " + error.message;
    } else {
      aviso.style.color = "#16a34a";
      aviso.textContent = "Guardado.";
      setTimeout(() => { aviso.style.display = "none"; aviso.style.color = ""; }, 1500);
    }
  } catch (e) {
    aviso.style.display = "block";
    aviso.style.color = "#dc2626";
    aviso.textContent = "Excepción al guardar: " + e.message;
  }
}

document.addEventListener("DOMContentLoaded", async () => {
  const ok = await protegerPagina();
  if (!ok) return;

  await cargarCaches();
  await cargarClubsSiAdmin();
  poblarTemporadas();
  poblarCategorias();
  poblarLigas();
  poblarGrupos();
  poblarEquipos();
  await crearTabla();
  cargarJugadores();
});
</script>
</body>
</html>
