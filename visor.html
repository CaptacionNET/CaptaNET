// Búsqueda por nombre sin distinguir acentos ni el orden de las palabras:
// "MARCOS VERA" debe encontrar a "VERA PEREZ, MARCOS".
function normalizarTexto(s) {
  return (s || "").toString().normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
}
function coincideNombre(nombre, consulta) {
  const nombreNorm = normalizarTexto(nombre);
  const palabras = normalizarTexto(consulta).trim().split(/\s+/).filter(Boolean);
  return palabras.every(p => nombreNorm.includes(p));
}

// Las ligas se agrupan en secciones reales por categoría de edad (de mayor
// a menor), y dentro de cada una, alfabético. Se usa el nombre de categoría
// que da la propia FFCV por competición (categoria_edad_ffcv, p.ej.
// "Querubines") cuando existe, porque es más fiable que adivinar por el
// nombre de la liga: "Escola de Gegants" no menciona ninguna edad en su
// nombre, pero la FFCV la cataloga como "Querubines". Si no hay ese dato
// (liga creada a mano, o pendiente de la próxima importación), se sigue
// adivinando por el nombre de la liga como hasta ahora.
// Las claves de texto están recortadas a la raíz común entre castellano y
// valenciano (la FFCV nombra algunas ligas en valenciano: "Cadet", "Benjamí",
// "Querubí", sin la "e"/"n" final del castellano "Cadete", "Benjamín", "Querubín").
const ORDEN_EDAD_LIGAS = ["AMATEUR", "JUVENIL", "CADETE", "INFANTIL", "ALEVIN", "BENJAMIN", "PREBENJAMIN", "QUERUBIN"];
const ETIQUETA_EDAD_LIGAS = {
  AMATEUR: "AMATEUR", JUVENIL: "JUVENILES", CADETE: "CADETES", INFANTIL: "INFANTILES",
  ALEVIN: "ALEVINES", BENJAMIN: "BENJAMINES", PREBENJAMIN: "PREBENJAMINES", QUERUBIN: "QUERUBINES"
};
function edadDeLiga(nombreLiga, categoriaEdadFfcv) {
  const nombreN = normalizarTexto(nombreLiga);
  if (nombreN.includes("gegant")) return "QUERUBIN"; // "Escola de Gegants" (F5) = Querubines
  const n = normalizarTexto(categoriaEdadFfcv) || nombreN;
  if (n.includes("querubi")) return "QUERUBIN";
  if (n.includes("prebenjami")) return "PREBENJAMIN";
  if (n.includes("benjami")) return "BENJAMIN";
  if (n.includes("alevi")) return "ALEVIN";
  if (n.includes("infantil")) return "INFANTIL";
  if (n.includes("cadet")) return "CADETE";
  if (n.includes("juvenil")) return "JUVENIL";
  return "AMATEUR";
}
function ordenarLigasPorEdad(ligas) {
  return [...ligas].sort((a, b) => {
    const rangoA = ORDEN_EDAD_LIGAS.indexOf(edadDeLiga(a.nombre, a.categoria_edad_ffcv));
    const rangoB = ORDEN_EDAD_LIGAS.indexOf(edadDeLiga(b.nombre, b.categoria_edad_ffcv));
    return rangoA !== rangoB ? rangoA - rangoB : a.nombre.localeCompare(b.nombre);
  });
}

// Con miles de equipos importados de FFCV, cargarlos TODOS de golpe en cada
// visita es lento (y Supabase igualmente corta en 1000 filas por defecto).
// En vez de precargar todo, cada nivel se pide a la base de datos ya filtrado
// por el nivel anterior (Temporada -> Categoría -> Liga -> Grupo -> Equipo),
// así cada consulta es pequeña y rápida sin importar cuántos datos haya en total.

// Trae TODas las filas de una consulta paginando de 1000 en 1000 (para los
// pocos casos donde sí puede haber más de 1000 resultados, como los jugadores
// de una selección muy amplia).
async function fetchPaginado(construirConsulta) {
  const filas = [];
  const TAMANO = 1000;
  let desde = 0;
  while (true) {
    const { data, error } = await construirConsulta(desde, desde + TAMANO - 1);
    if (error) { console.error("fetchPaginado:", error); break; }
    if (!data) break;
    filas.push(...data);
    if (data.length < TAMANO) break;
    desde += TAMANO;
  }
  return filas;
}

// Trocea un array en trozos de tamaño fijo.
function enLotes(arr, tamano) {
  const lotes = [];
  for (let i = 0; i < arr.length; i += tamano) lotes.push(arr.slice(i, i + tamano));
  return lotes;
}

// Cuando hay muchos equipos seleccionados (p.ej. toda una temporada), pedirlos
// todos en un solo "in (...)" puede generar una URL demasiado larga y que la
// consulta falle en silencio. Se pide en lotes pequeños, todos a la vez (no
// uno detrás de otro: con una liga grande, esperar cada lote por turnos es lo
// que hacía que la carga se notara lenta).
async function fetchJugadoresPorEquipos(equipoIds) {
  const resultados = await Promise.all(enLotes(equipoIds, 200).map(lote =>
    fetchPaginado((desde, hasta) => client
      .from("jugadores")
      .select("*, equipos(nombre, grupos(nombre, ligas(nombre, categorias(nombre))))")
      .in("equipo_id", lote)
      .range(desde, hasta))));
  return resultados.flat();
}

// Igual que fetchJugadoresPorEquipos pero genérico: trocea los ids (para no
// generar una URL enorme), pide todos los lotes a la vez, y pagina cada uno
// (por si un solo trozo ya supera las 1000 filas). Se usa en cualquier
// "dame los X de estos Y" con muchos Y.
async function fetchPorIds(tabla, columnaFiltro, ids, columnas = "id") {
  const resultados = await Promise.all(enLotes(ids, 200).map(lote =>
    fetchPaginado((desde, hasta) => client
      .from(tabla).select(columnas).in(columnaFiltro, lote).range(desde, hasta))));
  return resultados.flat();
}

async function cargarCaches() {

async function gruposDeLiga(ligaId) {

async function poblarCategorias() {

async function poblarLigas() {
  const categoriaId = selNum("filtro_categoria");
  const sel = document.getElementById("filtro_liga");
  sel.innerHTML = '<option value="">Todas</option>';
  if (!categoriaId) return;
  const { data } = await client.from("ligas").select("id,nombre,categoria_edad_ffcv").eq("categoria_id", categoriaId);

  // Secciones reales (optgroup) por categoría de edad, no solo orden.
  let html = "";
  let seccionActual = null;
  ordenarLigasPorEdad(data || []).forEach(l => {
    const edad = edadDeLiga(l.nombre, l.categoria_edad_ffcv);
    if (edad !== seccionActual) {
      if (seccionActual !== null) html += "</optgroup>";
      html += `<optgroup label="${ETIQUETA_EDAD_LIGAS[edad]}">`;
      seccionActual = edad;
    }
    html += `<option value="${l.id}">${l.nombre}</option>`;
  });
  if (seccionActual !== null) html += "</optgroup>";
  sel.innerHTML += html;
}

async function poblarGrupos() {

async function poblarEquipos() {
  const grupoId = selNum("filtro_grupo");
  const ligaId = selNum("filtro_liga");
  const sel = document.getElementById("filtro_equipo");
  sel.innerHTML = '<option value="">Todos</option>';

  let equipos = [];
  if (grupoId) {
    const { data } = await client.from("equipos").select("id,nombre").eq("grupo_id", grupoId).order("nombre");
    equipos = data || [];
  } else if (ligaId) {
    const grupoIds = await gruposDeLiga(ligaId);
    if (grupoIds.length) {
      equipos = await fetchPorIds("equipos", "grupo_id", grupoIds, "id,nombre");
      equipos.sort((a, b) => a.nombre.localeCompare(b.nombre));
    }
  }
  equipos.forEach(e => sel.innerHTML += `<option value="${e.id}">${e.nombre}</option>`);
}

// Determina qué equipos entran en la selección actual, pidiendo cada paso
// a la base de datos en vez de filtrar en el navegador sobre miles de filas.
async function equipoIdsFiltrados() {
  const temporadaId = document.getElementById("filtro_temporada").value;
  const categoriaId = selNum("filtro_categoria");
  const ligaId = selNum("filtro_liga");
  const grupoId = selNum("filtro_grupo");
  const equipoId = selNum("filtro_equipo");

  if (equipoId) return [equipoId];

  if (grupoId) {
    const filas = await fetchPaginado((desde, hasta) => client
      .from("equipos").select("id").eq("grupo_id", grupoId).range(desde, hasta));
    return filas.map(e => e.id);
  }

  let grupoIds = null;
  if (ligaId) {
    grupoIds = await gruposDeLiga(ligaId);
  } else if (categoriaId) {
    const ligas = await fetchPaginado((desde, hasta) => client
      .from("ligas").select("id").eq("categoria_id", categoriaId).range(desde, hasta));
    const ligaIds = ligas.map(l => l.id);
    if (!ligaIds.length) return [];
    const grupos = await fetchPorIds("grupos", "liga_id", ligaIds);
    grupoIds = grupos.map(g => g.id);
  }

  if (grupoIds !== null) {
    if (!grupoIds.length) return [];
    const equipos = await fetchPorIds("equipos", "grupo_id", grupoIds);
    return equipos.map(e => e.id);
  }

  if (temporadaId) {
    const filas = await fetchPaginado((desde, hasta) => client
      .from("equipos").select("id").eq("temporada_id", temporadaId).range(desde, hasta));
    return filas.map(e => e.id);
  }

  return [];
}

function crearTabla() {

    const columnas = [

      {
        title: "Equipo", field: "equipo",
        formatter: cell => `<span style="color:var(--primary);cursor:pointer;text-decoration:underline;white-space:nowrap;">${cell.getValue()}</span>`,
        cellClick: (e, cell) => { window.location.href = "equipos.html?equipo_id=" + cell.getRow().getData().equipo_id; }
      },
      { title: "Año", field: "anio_nacimiento", sorter: "number", width: 70, hozAlign: "center" },
      { title: "Dorsal", field: "dorsal", width: 85, hozAlign: "center" },
      { title: "Goles", field: "goles", sorter: "number", width: 85, hozAlign: "center" },
      {
        title: "Con informe", field: "tiene_informe", width: 160, hozAlign: "center",
        formatter: cell => {
          const fila = cell.getRow().getData();
          if (!fila.tiene_informe) return `<span style="color:var(--muted);">NO</span>`;
          if (fila.valoracion) return `<span class="badge badge-${fila.valoracion}">${ETIQUETA_VALORACION[fila.valoracion] || fila.valoracion}</span>`;
          return `✅ <span style="color:var(--muted);font-size:11px;">SIN VALORACIÓN</span>`;
        }
      }
    ];

    tabla = new Tabulator("#tabla", {
      data: [],
      // "fitData": cada columna toma el ancho de su contenido real (nunca corta
      // el nombre) y la tabla se desliza en horizontal si no cabe todo a la vez.
      layout: "fitData",
      height: "70vh",
      reactiveData: true,
      pagination: true,
      paginationSize: 60,
      paginationSizeSelector: [30, 60, 100, 200],
      paginationCounter: "rows",
      columns: columnas
    });

    // En Tabulator 5.x los eventos de tabla solo funcionan vía .on(),
    // no como opciones del constructor (ahí se ignoran en silencio).
    tabla.on("tableBuilt", resolve);
  });
}

async function cargarJugadores() {
  const aviso = document.getElementById("aviso");

  if (!miClubId) {
    aviso.style.display = "block";
    aviso.textContent = "Tu cuenta no tiene un club asignado. Contacta con el administrador.";
    tabla.setData([]);
    return;
  }
  aviso.style.display = "none";

  const equipoIds = await equipoIdsFiltrados();
  if (equipoIds.length === 0) { tabla.setData([]); return; }

  const jugadores = await fetchJugadoresPorEquipos(equipoIds);
  const jugadorIds = jugadores.map(j => j.id);

  // En una selección amplia (una liga entera) esto puede ser cientos de ids:
  // sin trocear, la URL se hace demasiado larga y Supabase devuelve un 400
  // que dejaba la tabla vacía en silencio.
  let privados = [];
  if (jugadorIds.length) {
    const resultados = await Promise.all(enLotes(jugadorIds, 200).map(lote =>
      fetchPaginado((desde, hasta) => client
        .from("jugadores_club").select("*").eq("club_id", miClubId).in("jugador_id", lote).range(desde, hasta))));
    privados = resultados.flat();
  }

  basefilas = jugadores.map(j => {
    const priv = privados.find(p => p.jugador_id === j.id) || {};
    const equipo = j.equipos;
    const grupo = equipo?.grupos;
    const liga = grupo?.ligas;
    const categoria = liga?.categorias;
    return {
      jugador_id: j.id,
      equipo_id: j.equipo_id,
      nombre: j.nombre,
      categoria: categoria?.nombre || "",
      liga: liga?.nombre || "",
      grupo: grupo?.nombre || "",
      equipo: equipo?.nombre || "",
      dorsal: j.dorsal,
      anio_nacimiento: j.fecha_nacimiento ? new Date(j.fecha_nacimiento).getFullYear() : (priv.anio_nacimiento || ""),
      goles: j.goles ?? "",
      tiene_informe: tieneInforme(priv),
      valoracion: priv.valoracion_scouting || null
    };
  });

  aplicarFiltrosLocales();
}

const ETIQUETA_VALORACION = { descartar: "Descartar", seguir: "Seguir", interesante: "Interesante", firmar: "Firmar", firmado: "Firmado" };

function tieneInforme(p) {
  return !!(p.posicion || p.contacto || p.contactado ||
    p.tecnica || p.tactica || p.fisico || p.actitud || (p.comentario && String(p.comentario).trim()));
}

function poblarAniosRango() {
  const desde = document.getElementById("filtro_anio_desde");
  const hasta = document.getElementById("filtro_anio_hasta");
  for (let y = ANIO_MIN; y <= ANIO_MAX; y++) {
    desde.innerHTML += `<option value="${y}">${y}</option>`;
    hasta.innerHTML += `<option value="${y}">${y}</option>`;
  }
}

let filtrosLocalesTimeout = null;
function aplicarFiltrosLocalesDebounced() {
  clearTimeout(filtrosLocalesTimeout);
  filtrosLocalesTimeout = setTimeout(aplicarFiltrosLocales, 250);
}

async function aplicarFiltrosLocales() {
  const nombreFiltro = document.getElementById("filtro_nombre").value;
  const conInforme = document.getElementById("filtro_con_informe").checked;
  const anioDesde = document.getElementById("filtro_anio_desde").value;
  const anioHasta = document.getElementById("filtro_anio_hasta").value;
  const minGoles = document.getElementById("filtro_min_goles").value;
  const valoracion = document.getElementById("filtro_valoracion").value;

  let filas = basefilas;
  if (nombreFiltro) filas = filas.filter(f => coincideNombre(f.nombre, nombreFiltro));
  if (conInforme) filas = filas.filter(f => f.tiene_informe);
  if (anioDesde) filas = filas.filter(f => f.anio_nacimiento && Number(f.anio_nacimiento) >= Number(anioDesde));
  if (anioHasta) filas = filas.filter(f => f.anio_nacimiento && Number(f.anio_nacimiento) <= Number(anioHasta));
  if (minGoles) filas = filas.filter(f => Number(f.goles || 0) >= Number(minGoles));
  if (valoracion === "sin_valorar") filas = filas.filter(f => f.tiene_informe && !f.valoracion);
  else if (valoracion) filas = filas.filter(f => f.valoracion === valoracion);

  await tabla.setData(filas);
  // Sin esto, si estabas en la página 3 y el nuevo filtro solo tiene un
  // resultado, se queda en una página que ya no existe y parece que "no está".
  tabla.setPage(1);
}

document.addEventListener("DOMContentLoaded", async () => {
  const ok = await protegerPagina();
  if (!ok) return;

  await cargarCaches();
  await cargarClubsSiAdmin();
  poblarTemporadas();
  await poblarCategorias();
  await poblarLigas();
  await poblarGrupos();
  await poblarEquipos();
  poblarAniosRango();
  await crearTabla();
  cargarJugadores();
});
</script>
