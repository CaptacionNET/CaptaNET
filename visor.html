<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CaptaNET – Visor</title>

<link href="https://cdn.jsdelivr.net/npm/tabulator-tables@5.4.4/dist/css/tabulator.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/tabulator-tables@5.4.4/dist/js/tabulator.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { font-family: Arial; margin: 0; padding: 0; }
#topbar { display:flex; justify-content:space-between; padding:10px; background:#eee; }
#left-buttons { display:flex; gap:10px; }
#right-buttons { display:flex; gap:10px; }
button { padding:8px 14px; cursor:pointer; }
#filtros { padding:10px; background:#f7f7f7; display:flex; gap:10px; }
#tabla { margin:10px; }
.modal {
  display:none; position:fixed; top:0; left:0; width:100%; height:100%;
  background:rgba(0,0,0,0.5); justify-content:center; align-items:center;
}
.modal-content {
  background:white; padding:20px; width:400px; border-radius:6px;
}
</style>
</head>

<body>

<div id="topbar">
  <div id="left-buttons">
    <button onclick="modoCompeticiones()">Competiciones</button>
    <button onclick="modoValoraciones()">Valoraciones</button>
    <button onclick="modoBuscador()">Buscador</button>
  </div>

  <div id="right-buttons">
    <button onclick="irPerfil()">Mi perfil</button>
    <button onclick="logout()">Cerrar sesión</button>
    <button onclick="window.location.href='/admin'">Panel Admin</button>
  </div>
</div>

<!-- FILTROS -->
<div id="filtros">
  <input id="filtroNombre" placeholder="Nombre" oninput="aplicarFiltros()">
  <input id="filtroPosicion" placeholder="Posición" oninput="aplicarFiltros()">
  <input id="filtroAnio" placeholder="Año" type="number" oninput="aplicarFiltros()">
  <input id="filtroValoracion" placeholder="Valoración mínima" type="number" oninput="aplicarFiltros()">
</div>

<div id="tabla"></div>

<div id="modalComentario" class="modal">
  <div class="modal-content">
    <h3>Comentario</h3>
    <textarea id="comentarioInput" style="width:100%;height:120px;"></textarea>
    <br><br>
    <button onclick="guardarComentario()">Guardar</button>
    <button onclick="cerrarModal()">Cerrar</button>
  </div>
</div>

<script>
const client = supabase.createClient(
  "https://bnqoisjvboytiphiwosj.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJucW9pc2p2Ym95dGlwaGl3b3NqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM2MDgwMTcsImV4cCI6MjA5OTE4NDAxN30.RpTr0Z17ZRFwTpBvsmNwyqtEm0nLVWxM96mxaLxDbes"
);

async function irPerfil() {
  window.location.href = "/usuario";
}

async function logout() {
  await client.auth.signOut();
  window.location.href = "/index";
}

let tabla;
let filaComentario = null;

/* --- DETECTAR ADMIN --- */
let esAdmin = false;
(async () => {
  const session = await client.auth.getSession();
  const email = session.data.session?.user?.email;
  esAdmin = (email === "TU_CORREO_ADMIN");   // <-- CAMBIA ESTO
})();

/* --- TABLA --- */
function crearTabla() {
  tabla = new Tabulator("#tabla", {
    layout:"fitColumns",
    height:"80vh",
    columns:[
      {title:"Jugador", field:"jugador_nombre", editor: esAdmin ? "input" : false},
      {title:"Año", field:"anio_nacimiento", editor: esAdmin ? "number" : false},
      {title:"Posición", field:"posicion", editor: esAdmin ? "input" : false},
      {title:"Valoración", field:"valoracion", editor: esAdmin ? "number" : false},
      {title:"Contacto", field:"contacto", editor: esAdmin ? "input" : false},
      {title:"Contactado", field:"contactado", editor: esAdmin ? "tickCross" : false},
      {
        title:"Comentario",
        field:"comentario",
        formatter:"buttonClick",
        formatterParams:{label:"Ver"},
        width:120,
        cellClick:function(e, cell){
          filaComentario = cell.getRow().getData();
          document.getElementById("comentarioInput").value = filaComentario.comentario || "";
          abrirModal();
        }
      }
    ],
    cellEdited: async function(cell){
      if (!esAdmin) return;
      const d = cell.getRow().getData();
      await client.from("jugadores_club")
        .update({ [cell.getField()]: cell.getValue() })
        .eq("id", d.id);
    }
  });
}

/* --- CARGA DE DATOS --- */
async function cargarDatos() {
  const { data, error } = await client
    .from("jugadores_club")
    .select("*");

  if (error) {
    console.error("Error cargando datos:", error);
    return;
  }

  tabla.setData(data);
}

crearTabla();
cargarDatos();

/* --- FILTROS --- */
function aplicarFiltros() {
  const nombre = document.getElementById("filtroNombre").value.toLowerCase();
  const posicion = document.getElementById("filtroPosicion").value.toLowerCase();
  const anio = document.getElementById("filtroAnio").value;
  const valoracion = document.getElementById("filtroValoracion").value;

  tabla.setFilter([
    nombre ? { field:"jugador_nombre", type:"like", value:nombre } : null,
    posicion ? { field:"posicion", type:"like", value:posicion } : null,
    anio ? { field:"anio_nacimiento", type:"=", value:parseInt(anio) } : null,
    valoracion ? { field:"valoracion", type:">=", value:parseInt(valoracion) } : null
  ].filter(x => x));
}

/* --- MODAL --- */
function abrirModal(){ document.getElementById("modalComentario").style.display="flex"; }
function cerrarModal(){ document.getElementById("modalComentario").style.display="none"; }

async function guardarComentario(){
  const nuevo = document.getElementById("comentarioInput").value;

  await client.from("jugadores_club")
    .update({ comentario:nuevo })
    .eq("id", filaComentario.id);

  filaComentario.comentario = nuevo;
  tabla.updateData([filaComentario]);
  cerrarModal();
}

/* --- OTROS --- */
function modoCompeticiones(){}
function modoValoraciones(){}
function modoBuscador(){}

function fillSelect(id, arr){
  const s = document.getElementById(id);
  s.innerHTML = "";
  arr.forEach(x => {
    const o = document.createElement("option");
    o.value = x.id;
    o.textContent = x.nombre;
    s.appendChild(o);
  });
}
</script>

</body>
</html>
